<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IIQE 練習題庫 · 卷一 + 卷三</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#159a9c; --teal-d:#0c7173; --ink:#1c2b2d; --muted:#7b8a8c;
  --bg:#f3f6f6; --card:#ffffff; --line:#e3eaea;
  --green:#1aa463; --green-bg:#e7f6ee; --red:#d8453e; --red-bg:#fbeceb;
  --amber:#e0a106;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;overscroll-behavior:none;
}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:24px;}
.serif{font-family:"Noto Serif TC",serif;}

/* ---- Top bar ---- */
.topbar{
  position:sticky;top:0;z-index:20;background:var(--teal);color:#fff;
  padding:14px 18px;display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 14px rgba(12,113,115,.25);
}
.topbar .back{font-size:22px;width:30px;cursor:pointer;line-height:1;}
.topbar .ttl{font-weight:700;font-size:17px;flex:1;}
.topbar .timer{font-variant-numeric:tabular-nums;font-size:14px;opacity:.9;font-weight:500;}

/* ---- Home ---- */
.hero{
  background:linear-gradient(135deg,var(--teal),var(--teal-d));color:#fff;
  padding:26px 22px 30px;border-radius:0 0 26px 26px;position:relative;overflow:hidden;
}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:170px;height:170px;
  border:18px solid rgba(255,255,255,.08);border-radius:50%;}
.hero .badge{display:inline-block;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);
  font-size:11px;letter-spacing:2px;padding:4px 10px;border-radius:20px;font-weight:700;}
.hero h1{font-size:27px;margin:12px 0 4px;font-weight:900;}
.hero p{font-size:13px;opacity:.85;}
.hero .stat{display:flex;gap:18px;margin-top:18px;}
.hero .stat div{background:rgba(255,255,255,.12);border-radius:14px;padding:10px 14px;flex:1;}
.hero .stat b{font-size:22px;display:block;font-weight:900;}
.hero .stat span{font-size:11px;opacity:.8;}

.section-h{font-size:13px;color:var(--muted);font-weight:700;letter-spacing:1px;margin:24px 20px 10px;}

.menu{padding:0 16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.menu .tile{
  background:var(--card);border-radius:18px;padding:18px 16px;cursor:pointer;
  border:1px solid var(--line);transition:.18s;display:flex;flex-direction:column;gap:6px;
}
.menu .tile:active{transform:scale(.97);}
.menu .tile.wide{grid-column:span 2;flex-direction:row;align-items:center;}
.menu .tile .ico{font-size:24px;}
.menu .tile .nm{font-weight:700;font-size:15px;}
.menu .tile .sub{font-size:12px;color:var(--muted);}
.menu .tile.accent{background:var(--teal);color:#fff;border-color:var(--teal);}
.menu .tile.accent .sub{color:rgba(255,255,255,.8);}

/* chapter list */
.chaps{padding:6px 16px;}
.chap{
  background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;
  margin-bottom:11px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.15s;
}
.chap:active{transform:scale(.98);}
.chap .num{width:38px;height:38px;border-radius:11px;background:var(--teal);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;flex-shrink:0;}
.chap .info{flex:1;min-width:0;}
.chap .info .t{font-weight:700;font-size:15px;}
.chap .info .d{font-size:11.5px;color:var(--muted);margin-top:2px;}
.chap .bar{height:6px;background:var(--line);border-radius:6px;margin-top:7px;overflow:hidden;}
.chap .bar i{display:block;height:100%;background:var(--green);border-radius:6px;transition:.4s;}
.chap .pct{font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0;}

/* ---- Quiz ---- */
.qwrap{padding:16px;}
.qmeta{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--muted);margin-bottom:10px;}
.qmeta .tag{background:#e6f2f2;color:var(--teal-d);padding:3px 9px;border-radius:8px;font-weight:700;}
.progressline{height:5px;background:var(--line);border-radius:5px;margin-bottom:16px;overflow:hidden;}
.progressline i{display:block;height:100%;background:var(--teal);transition:.3s;}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px 18px;}
.qno{display:inline-block;background:var(--ink);color:#fff;font-size:12px;font-weight:700;border-radius:7px;padding:3px 9px;margin-bottom:10px;}
.qtext{font-size:16.5px;line-height:1.65;font-weight:500;white-space:pre-line;}
.opts{margin-top:16px;display:flex;flex-direction:column;gap:10px;}
.opt{
  display:flex;gap:12px;align-items:flex-start;background:#fafcfc;border:1.5px solid var(--line);
  border-radius:14px;padding:13px 14px;cursor:pointer;transition:.13s;font-size:14.5px;line-height:1.5;
}
.opt:active{transform:scale(.99);}
.opt .lab{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--muted);color:var(--muted);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;transition:.13s;}
.opt .txt{flex:1;padding-top:2px;white-space:pre-line;}
.opt.correct{background:var(--green-bg);border-color:var(--green);}
.opt.correct .lab{background:var(--green);border-color:var(--green);color:#fff;}
.opt.correct .txt{color:#137a4b;font-weight:700;}
.opt.wrong{background:var(--red-bg);border-color:var(--red);}
.opt.wrong .lab{background:var(--red);border-color:var(--red);color:#fff;}
.opt.wrong .txt{color:#b5322c;font-weight:700;}
.opt.disabled{cursor:default;}

/* analysis */
.analysis{margin-top:16px;border-top:1px dashed var(--line);padding-top:16px;animation:fade .3s;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.analysis h3{font-size:14px;color:var(--muted);font-weight:700;margin-bottom:12px;letter-spacing:.5px;}
.arow{display:flex;gap:8px;font-size:14px;margin-bottom:9px;line-height:1.6;}
.arow .k{color:var(--muted);flex-shrink:0;min-width:74px;}
.arow .v{font-weight:700;}
.arow .v.ok{color:var(--green);} .arow .v.no{color:var(--red);}
.arow .v.exp{font-weight:400;color:var(--ink);}
.verdict{display:flex;align-items:center;gap:8px;font-weight:900;font-size:16px;margin-bottom:14px;}
.verdict.ok{color:var(--green);} .verdict.no{color:var(--red);}
.fav{margin-left:auto;font-size:13px;color:var(--muted);font-weight:500;cursor:pointer;border:1px solid var(--line);
  border-radius:8px;padding:4px 10px;}
.fav.on{color:var(--amber);border-color:var(--amber);background:#fdf6e3;}

.navbtns{display:flex;gap:10px;margin-top:16px;}
.btn{flex:1;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:.13s;}
.btn:active{transform:scale(.98);}
.btn.primary{background:var(--teal);color:#fff;}
.btn.ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line);}
.btn:disabled{opacity:.4;cursor:default;}

/* result */
.result{padding:30px 22px;text-align:center;}
.result .ring{width:150px;height:150px;margin:10px auto 18px;position:relative;}
.result .ring svg{transform:rotate(-90deg);}
.result .ring .mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.result .ring .mid b{font-size:38px;font-weight:900;line-height:1;}
.result .ring .mid span{font-size:12px;color:var(--muted);margin-top:4px;}
.result h2{font-size:22px;font-weight:900;margin-bottom:6px;}
.result p{color:var(--muted);font-size:14px;margin-bottom:22px;}
.result .rstats{display:flex;gap:12px;margin-bottom:22px;}
.result .rstats div{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;}
.result .rstats b{font-size:24px;font-weight:900;display:block;}
.result .rstats span{font-size:12px;color:var(--muted);}

/* learn / content */
.content{padding:16px;}
.ccard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px;}
.ccard h3{font-size:16px;font-weight:900;color:var(--teal-d);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.ccard h3 .n{background:var(--teal);color:#fff;width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.ccard table{width:100%;border-collapse:collapse;font-size:13.5px;}
.ccard td{padding:8px 6px;border-bottom:1px solid var(--line);vertical-align:top;line-height:1.5;}
.ccard td.h{font-weight:700;color:var(--teal-d);width:34%;white-space:nowrap;}
.ccard td:last-child{color:#3a4a4c;}
.ccard tr:last-child td{border-bottom:none;}
.tip{background:#fdf8ec;border:1px solid #f0e2bd;border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.6;color:#6b5a1f;margin-bottom:12px;}
.tip b{color:#9a7a10;}

.empty{text-align:center;color:var(--muted);padding:60px 30px;font-size:14px;line-height:1.7;}
.empty .big{font-size:42px;margin-bottom:12px;}
.hidden{display:none!important;}

/* paper picker + switch */
.papersel{padding:40px 22px 0;}
.papersel .lead{text-align:center;margin-bottom:26px;}
.papersel .lead h1{font-size:25px;font-weight:900;}
.papersel .lead p{color:var(--muted);font-size:13px;margin-top:6px;}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px 20px;margin-bottom:16px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:16px;}
.pcard:active{transform:scale(.98);}
.pcard .pico{width:54px;height:54px;border-radius:16px;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;flex-shrink:0;}
.pcard.p3 .pico{background:#e07b1a;}
.pcard .pinfo .pt{font-weight:900;font-size:18px;}
.pcard .pinfo .pd{color:var(--muted);font-size:12.5px;margin-top:3px;line-height:1.5;}
.pcard .parr{margin-left:auto;font-size:24px;color:var(--muted);}
.switch{margin-left:auto;font-size:12px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.32);color:#fff;border-radius:9px;padding:5px 10px;font-weight:700;cursor:pointer;}
.hero.p3{background:linear-gradient(135deg,#e8851f,#c4640c);}
.hero::after{pointer-events:none;}
.switch{position:relative;z-index:3;}
.chap .num.p3,.menu .tile.accent.p3{background:#e07b1a;}
.menu .tile.accent.p3{border-color:#e07b1a;}
.toggle{display:flex;gap:8px;align-items:center;font-size:12.5px;color:var(--muted);margin:0 4px 14px;}
.toggle b{color:var(--ink);}
.sw{position:relative;width:42px;height:24px;background:var(--line);border-radius:24px;cursor:pointer;transition:.2s;flex-shrink:0;}
.sw.on{background:var(--teal);}
.sw i{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;}
.sw.on i{left:21px;}
</style>
</head>

機風險", "既非處理純粹風險也非處理投機風險"], 2, ""], [916, 1, "1.2", "一名被保險人死亡後，保險人向其受養人支付死亡保險金，這做法顯示：", ["人壽保險的唯一好處", "人壽保險的基本功能", "壽險的唯一好處及功能", "並非壽險的好處及功能"], 1, ""], [917, 1, "1.2", "以下哪項或哪幾項是保險的基本的好處？", ["為保單持有人提供財務補償", "增加就業機會", "以人壽保險及年金作為儲蓄", "金融服務的發展"], 0, ""], [918, 1, "1.2", "「風險轉移的機制」的概念：", ["與保險沒有關係", "只是保險內的一種輔助功能", "是保險內的一個主要功能", "只是保險內的意外功能"], 2, ""], [919, 1, "1.2", "以下哪項可視為保險為香港帶來的輔助功能/好處?\ni)作為儲蓄途徑\nii)提供就業機會\niii)鼓勵經濟發展\niv)減低意外／損失的次數", ["i，ii", "i，ii，iii", "ii，iii，iv", "以上全部都是"], 3, ""], [920, 1, "1.2", "以下哪項不應被視為保險對社會的間接益處:", ["為不少人提供就業機會", "協助損失控制", "促進經濟發展", "對受保項目的受害人提供財務上的補償"], 3, ""], [921, 1, "1.2", "提供就業機會，損失防範，協助儲蓄及投資，可被形容為：", ["與保險全無關係", "是保險的基本功能", "是保險的輔助功能而非基本功能", "是保險基本目的而非副產品"], 2, ""], [922, 1, "1.2", "下列哪項不是保險的輔助功能?", ["增加就業機會", "幫助經濟增長及發展", "把金錢上的損失轉移到保險公司身上", "作為儲蓄途徑"], 2, ""], [923, 1, "1.2", "保險對社會有益處嗎？", ["是有的，通過保險人要求而進行的風險防範或風險降低措施(統稱風險控制)", "是有的，保險是社會的一種手段", "沒有，僅僅是私人的安排", "沒有，除非是強制的"], 0, ""], [924, 1, "1.2", "以下哪項是保險的輔助功能？", ["風險轉移", "提高就業率", "為損失作財務上的補償", "以上各項皆是"], 1, ""], [925, 1, "1.2", "以下哪項是保險的基本功能／好處而非輔助功能？\ni)把個人的潛在財務損失轉移給保險人\nii)損失的控制/防範\niii)儲蓄／投資\niv)使商家倖免由於嚴重的火災、沉重的法律責任等情況而造成的巨大損失", ["i,ii", "ii,iii", "i,iv", "iii,iv"], 2, ""], [926, 2, "2.1.3", "以下哪項可視為「有缺陷的合約」?", ["簡單合約", "不能強制執行的合約", "行為推斷的合約", "反要約"], 1, ""], [927, 2, "2.1.2", "以下哪項陳述是正確的?", ["保險合約屬於契據", "大部分的保險合約屬簡單合約，因它可以用口頭或書面形式訂立", "保險合約有效性必須以書面合約為證", "保險合約屬於簡單合約，因內容淺白令一般人易於明白"], 1, ""], [928, 2, "2.2.1", "一名母親指使其小孩到一家雜貨店購買雞蛋，意味著:", ["商店與該名母親之間訂立了一份銷售合約", "小孩與該名母親之間訂立了一份銷售合約", "小孩負上轉承責任", "代理法約束著小孩的行為"], 0, ""], [929, 2, "2.2.2", "代理關係可以透過以下哪些途徑產生?\ni.明示協議\nii.隱含協議\niii.追認\niv.代理人出錯", ["i,ii", "i,ii,iii", "iii,iv", "以上皆是"], 1, ""], [930, 2, "2.1.3(a)", "以下哪項有關保單的要約描述是正確的？", ["根據普通法規定，投保人寫投保書給被遞交表格的保險人已構成要約的行為", "適用於保險合約的要約法，明顯有別於非保險合約的要約法", "沒有要約就沒有合約", "非人壽保險的要約法已匯入保險業條例之中"], 2, ""], [931, 2, "2.1.3(d)", "訂約的行爲能力是簡單合約其中一項要求，其意義是:", ["未成的人沒有能力訂立合約", "其含義是指訂立合約的法律能力", "精神錯亂的人完全沒有能力訂立合約", "以上各項皆不是"], 1, ""], [932, 2, "2.1.3(f)", "以下哪幾項是構成有效合約的「合約元素」?\ni.要約及承約\nii.公平性\niii.代價\niv.訂立法律關係的意向", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "i,ii,iii,iv"], 2, ""], [933, 2, "2.1.4", "“非合約的一方第三者，便沒有責任履行該合約的條款”，這描述普通法中的\n哪一種?", ["合約法", "合約的相對性", "訂約的行為能力", "合法性"], 1, ""], [934, 2, "2.2", "以下哪項對代理法的描述是正確的?\ni.委託人受其代理人的行為所約束\nii.代理人受其委託人的行為所約束\niii.委託人受其代理人的行為而須負起轉承責任\niv.代理法只適用於保險代理人及經紀", ["i,ii,iii", "i,iii", "ii,iii", "i,ii,iii,iv"], 1, ""], [935, 2, "2.2", "以下哪項對代理法的描述是正確的?\ni.保險人透過保險代理人行事與親自執行沒有分別\nii.委託人需對代理人行為負起轉承責任\niii.保險代理人及保險經紀有能力就保險人的行為負起轉承責任\niv.代理關係必須透過書面方式訂立而產生", ["i,ii", "i,ii,iii", "ii,iii", "i,ii,iii,iv"], 0, ""], [936, 2, "2.2.3(d)", "如果有人允許他人表示另一人是他的代理人，而他不能否定該代理人的權限。\n這代理權法則稱為:", ["實際權限", "必要權限", "表面權限", "不容反悔的代理權"], 3, ""], [937, 2, "2.1.2(a)", "某人從一個小販那裏拿起一份雜誌，清楚地表明他要購買，技術上，這是:", ["行為中推斷出來的合約", "契據", "簡單合約", "嚴格來說，這並不構成合約"], 0, ""], [938, 2, "2.1", "以下哪項最恰當描述何謂「保險單」：", ["經蓋章後發出的重要文件", "是屬於保險代理人與被保險人之間的合約", "保險合約中的一種可見的表達", "沒有這份文件，有關的合約便告取消"], 2, ""], [939, 2, "2.1", "以下那項關於一份法律開支保險合約的描述是不正確的？", ["不是所有協議都具有法律效力", "必須是經蓋章的", "是一份可強制執行的協議", "嚴格來說，合約是無形的"], 1, ""], [940, 2, "2.1.1", "合約可以界定為：", ["在法律上可強制執行的協議", "兩人或多人之間的承諾", "以書面形式表達的協議", "任何兩方或多方的協議"], 0, ""], [941, 2, "2.1.1", "社交中，朋友的晚飯約會：", ["並非法律上可執行的合約", "有兩位以上朋友參與便可稱為合約", "若果有書面上的來往便可稱為合約", "在法律上被承認為有效的合約"], 0, ""], [942, 2, "2.1.1", "以下哪項或哪些是保險單的正確描述：", ["是一份經蓋章發出的重要文件", "是保險代理人及被保險人之間的一份合約", "是一份證明保險合約的憑證", "如果保險單被損毀，保險合便告無效"], 2, ""], [943, 2, "2.1.1", "合約是一項法律上可強制執行的協議：", ["然而這點是在它們以書面形式出現時才成立；", "而且必須總是涉及重要的財務安排；", "它們可能與重要的或較次要的事情有關；", "然而只有以書面為證及在第三者見證下才成立。"], 2, ""], [944, 2, "2.1.1", "下列哪項有關經濟權益保險合約的陳述是正確的？\ni)並非所有協議都是合約\nii)所有合約必須經蓋章後發生\niii)合約是一種法律上可強制執行的協議\niv)嚴格的說，合約是無形的", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 2, ""], [945, 2, "2.1.2", "以下哪三項是有關僅以所涉及個人行為所設立的簡單合約的說明是不正確的？\ni)在法律上，這種交易不是真正的合約\nii)這些是特殊情況，並因此稱為「蓋印的合約」\niii)如要有效，這種合約隨後須以書面表達\niv)儘管不是以口頭表達或書面方式，這種合約仍是有效的", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 0, ""], [946, 2, "2.1.2", "以下哪項有關「簡單合約」的說明是正確?", ["它由保險人的總經理或副總經理簽署", "它可以以口頭或書面形式訂立", "它必須蓋章後發出才屬有效", "以上各項皆是"], 1, ""], [947, 2, "2.1.2", "以下哪些關於專業彌償保險合約的描述是正確的?", ["不是所有協議都是合約", "合約必須經過蓋章發出", "合約是無形的", "A及C"], 3, ""], [948, 2, "2.1.2", "一項已經從有關人仕的行為推斷出來的合約肯定是：", ["簡單合約", "特別合約", "推斷合約", "契據"], 0, ""], [949, 2, "2.1.2(a)", "保險合約之完整條款的書面證據，通常出現於：", ["保單", "投保書", "保險憑證", "與法定保險有關的法例"], 0, ""], [950, 2, "2.1.2(a)", "以下哪兩項有關簡單合約的陳述是正確的?\ni)它們絕對不能是書面的\nii)它們不是經蓋章後發出的\niii)在任何情況下它們必須是書面的\niv)它們可以是口頭或書面性質出現", ["i及ii而已", "i及iii而已", "ii及iii而已", "ii及iv而已"], 3, ""], [951, 2, "2.1.2(a)", "保險合約通常屬於哪一類合約?", ["簡單合約", "蓋章", "紀錄", "契據"], 0, ""], [952, 2, "2.1.2(a)", "以下哪項或哪些是一份「簡單合約」必要的：", ["必須以書面形式訂立", "合約的各方都需付出代價", "用詞必須簡單及容易明白", "以上各項皆正確"], 1, ""], [953, 2, "2.1.2(a)", "儘管缺乏口頭或書面證據，但可從涉及之人的行為斷定某項合約的存在，在法\n律上可描述為：", ["簡單合約", "契據", "推斷合約", "以上任何一項"], 0, ""], [954, 2, "2.1.2(a)", "一個人在店鋪內購買物件時，放下金錢並取走物件，過程中不發一言，在這種\n情況下:", ["屬於違法事件", "以行為証明下訂立了合約", "因為沒有蓋章及簽署，故此訂立了契據", "已訂立了一份記錄合約"], 1, ""], [955, 2, "2.1.2(b)", "以下哪種合約是保險人會以契據方式成立的？", ["忠誠保證保險", "強制性(第三者)汽車保險", "擔保", "以上所有各項"], 2, ""], [956, 2, "2.1.2(b)", "下列哪項或哪些不是訂立的合約正確的描述？", ["可以是透過行為而訂立", "可以是書面及經蓋章後發出", "它必須是個人的合約", "可以是口頭及書面訂立"], 2, ""], [957, 2, "2.1.2(b)", "以下哪些是有關契據的正確描述?", ["它是成熟的簡單合約", "合約的價值高", "以書面形式簽發", "以上各項皆是"], 2, ""], [958, 2, "2.1.2(b)", "一種與非常正式並需要簽署，蓋章及送遞形式有別，易於構成的合約稱為：", ["契約", "簡單合約", "紀錄合約", "不複雜合約"], 1, ""], [959, 2, "2.1.3", "一般協議有別於合約的原因，以下有哪些或哪項的描述是正確的？", ["合約必須以書面形式訂立", "合約必須有兩位以上的見證人", "合約包含多項法律準則", "以上所有各項"], 2, ""], [960, 2, "2.1.3", "如果一份合約稱為可使無效，意味著其中一方可在某種情況下讓合約變為無效\n，如果該一方並未採取有關行動：", ["另一方便可向他採取法律行動", "經過一段「合理」時間後，該合約便會變為無效", "經過一段「合理」時間後，該合約便不會就該種情況變為無效", "為該合約支付的任何金錢均須退還"], 2, ""], [961, 2, "2.1.3", "如果按照保單條款不可對一份不屬於無效的合約作出起訴，該合約可被稱為：", ["無投訴", "違法", "可使無效", "不能強制執行"], 3, ""], [962, 2, "2.1.3", "以下哪一項不屬於簡單合約必須具備元素？", ["交付", "承約", "訂約的行為能力", "代價"], 0, ""], [963, 2, "2.1.3", "以下哪項可使無效的保險合約之陳述是正確的?", ["可使無效的合約是永遠不能變為有效的", "可使無效與無效兩者的含義完全相同", "受屈的一方可於合理時間內把合約視為無效的決定", "只有被保險人才能把保單視作可使無效(即可予以取消)"], 2, ""], [964, 2, "2.1.3", "一份合約由於一些要求還未完成而令致有關合約無法執行，此稱為:", ["可使無效的合約", "不能強制執行的合約", "無效的合約", "不合法的合約"], 1, ""], [965, 2, "2.1.3(a)", "如果保險人指出除非有關保險上限縮短為半年，否則不會接受某項口頭的投保\n，這項因保險人提出的建議可以構成?", ["反承約", "相反的要約", "反要約", "有條件的承約"], 2, ""], [966, 2, "2.1.3(a)", "保險合約中的要約人是：", ["通常是保險人", "通常是被保險人", "可以是保險人或被保險人", "通常是中介人代表的一方"], 2, ""], [967, 2, "2.1.3(b)", "如果保險人表示須就某項投保取額外保費及附加保單免賠額，才會接納該風險\n，這種由保險人提出的建議在法律上可以稱為：", ["反要約", "相反的要約", "有保留承約", "有條件承約"], 0, ""], [968, 2, "2.1.3(b)", "在反要約的過程中，下列哪項是不正確的？", ["原本的要約人成為受要約人", "原本的受要約人成為要約人", "原本的要約內容立刻被終止並撤銷", "若反要約的內容不被接納，原本的要約內容可再次有效"], 3, ""], [969, 2, "2.1.3(b)", "要成立任何合約，其要約：", ["必須按其原有內容而被承約", "可以視乎若干條件後而被承約", "必須被承約，並須以書面通知收到", "總是須大體上被承約"], 0, ""], [970, 2, "2.1.3(b)", "在一份建議合約上的要約對象稱為：", ["要約人", "受要約人", "被動人", "準客戶"], 1, ""], [971, 2, "2.1.3(b)", "下列哪項有關〝反要約〞之陳述是正確的？\ni)反要約出現時，原要約人會變成受要約人\nii)反要約出現時，原受要約人變成要約人\niii)反要約出現代表原要約的婉拒及終止\niv)若反要約不被接納，則可以從新執行原要約", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 0, ""], [972, 2, "2.1.3(b)", "在訂立合約的過程中，「甲方」是提出要約的一方；即「要約人」，而「乙方\n」則是「受要約人」，如「乙方」不接受「甲方」的提議，並作出反要約", ["「甲方」便成為「受要約人」", "「甲方」仍是要約人，「乙方」仍是「受要約人」", "原本的要約仍然有效", "在保險合約中，永不會出現「反要約」"], 0, ""], [973, 2, "2.1.3(b)", "要約如何能轉變為一份有效協議?", ["以精確的字句接納原有的內容", "必須被接納及以書面通知", "必須在四十八小時內承約", "接受以上的條件"], 0, ""], [974, 2, "2.1.3(c)", "以下哪項是簡單合約訂立時必須具備的條件？", ["以書面形式", "合約雙方年滿十八歲", "合約雙方付出代價", "以上各項皆是"], 2, ""], [975, 2, "2.1.3(c)", "在保險合約當中，被保險人所付出的代價是:", ["承諾每年續保", "向保險人繳付的保費", "只要要約及續保時出現", "以上所述各項都不是"], 1, ""], [976, 2, "2.1.3(c)", "在簡單合約上，就被保險人承諾繳付保費，而保險人則需承諾支付有效的索償\n，這是指甚麼合約元素？", ["要約", "訂約的行為能力", "承約", "代價"], 3, ""], [977, 2, "2.1.3(c)", "在一份保險合約上，保險人提供的代價就是:", ["索債的支付", "支付有效索償的承諾", "向保險代理人支付的佣金", "誠實"], 1, ""], [978, 2, "2.1.3(c)", "在一項屬簡單合約的保險上，代價：", ["必須由被保險人及保險人雙方付出", "只須由被保險人付出", "只須由保險人付出", "毋須由被保險人付出，但合約訂立需要以書面"], 0, ""], [979, 2, "2.1.3(c)", "甚麼是代價?", ["它必須由雙方在合約中訂定", "這是合約的一方對另一方的承諾", "這是合約的一方對另一方的義務", "以上各項皆正確"], 3, ""], [980, 2, "2.1.3(c)", "在一個保險合約中，被保險人所付出的代價是：", ["填受投保書", "始初要約，其後續保", "繳交保費", "以上各項皆是"], 2, ""], [981, 2, "2.1.3(c)", "安琪在登機前購買一份旅遊保險，保險人容許她在旅程後繳付保險費。安琪不\n幸在旅程中斷了一條腿，保險人拒絕賠付安琪有關的醫療費用，請問保險人有\n權這樣做嗎？", ["沒有。根據承保商專業守則，保險人須就投保人合理的期望賠", "沒有。一張旅遊保險合約已經生效", "有。保險人若賠付只出於同情", "有。安琪沒有交保費"], 1, ""], [982, 2, "2.1.3(c)", "蘇先生在電話要求一份機器全險保障，保險人承諾在一星期後發出保單。電話\n對話一小時後，該組機器在火災中被毀。請問有否一份有效的機器全險合約保\n障？", ["沒有，因未曾出現承諾", "沒有，因保單未發出", "有，因保障在承諾一刻生效", "有，追溯性保單保障機器損失"], 2, ""], [983, 2, "2.1.3(d)", "在簡單合約中，「訂約的行為能力」是指訂立合約的能力。在保險合約中，這\n項要求適用於：", ["投保人和保險人", "未達成年歲數的投保人", "投保人，但不一定適用於保險人", "保險人，但不一定適用於投保人"], 0, ""], [984, 2, "2.1.3(d)", "有關「立約行為能力」，下列哪項陳述是正確的？\ni)未成年者的立約能力受到限制\nii)是指訂立合約的法律能力\niii)精神病者的立約能力受到限制\niv)是指有關業務開展的合法授權", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "i,ii,iii,iv"], 3, ""], [985, 2, "2.1.3(d)", "訂約的行爲能力解作：", ["可供選擇的再保險", "預計投保金額", "保險人承保大規模公司的能力", "訂立合約的法律能力"], 3, ""], [986, 2, "2.1.3(e)", "「一份協議的內容必須是合法的」，此句子形容合約元素中的哪一項：", ["訂立的行為能力", "代價", "合法性", "訂立法律關係意向"], 2, ""], [987, 2, "2.1.3(f)", "有簽訂保單時可能會出現誤解。在一份家居保單中，投保人想保障家居財物，\n但簽訂的保單卻保障樓宇結構，這種合約是無效的，這是出於簡式合約的那個\n元素？", ["代價", "立約能力", "合法性", "各方意向"], 3, ""], [988, 2, "2.1.3(f)", "簡單合約要素有多種，其中訂立協議雙方明確自己的目的，並知道有關條款具\n有法律效力，此要素稱為:", ["訂立法律關係的意向", "合法性", "要約及承約", "代價"], 0, ""], [989, 2, "2.1.3(f)", "一份協議是缺乏與另一方訂立法律關係的意向情況下訂立，因此：", ["技術上它是合約", "技術上它是協議", "不能是合約", "受屈一方有權索取賠償"], 2, ""], [990, 2, "2.2", "根據代理法，下列哪項有關保險代理人的陳述是正確?", ["保險代理人必代表被保險人", "保險代理人對本身的委託人必負起轉承的責任", "保險經紀不受代理法約束", "保險代理人即如所有代理人，代表本身的委託人"], 3, ""], [991, 2, "2.2", "保險代理人的委託人一般是?", ["保險人", "被保險人", "既非保險人亦非被保險人", "兩者皆是保險人及非保險人"], 0, ""], [992, 2, "2.2", "代理法", ["只適用於保險中介人", "適用於保險代理人而不是保險經紀", "適用於保險經紀而不是保險代理人", "適用的範圍比應用於保險為廣泛"], 3, ""], [993, 2, "2.2", "根據代理法：", ["保險代理人及保險經紀兩者都屬於「代理人」", "保險代理人及保險經紀兩者都不屬於「代理人」", "保險代理人屬於「代理人」，但保險經紀則不是", "保險經紀屬於「代理人」，但保險代理人則不是"], 0, ""], [994, 2, "2.2", "根據《保險業條例》，代表一名或多於一名保險人在香港或從香港就保險合約\n提供意見或安排該等合約的人，稱為保險", ["代理人", "經紀", "僱員", "顧問"], 0, ""], [995, 2, "2.2", "根據《保險業條例》，作爲保單持有人的代理人，經營在香港或從香港洽談或\n安排保險合約的業務的人，稱爲保險：", ["中間人", "代理人", "經紀", "顧問"], 2, ""], [996, 2, "2.2", "有關於本港的保險中介人：", ["根據定義，所有銀行都是保險中介人", "它只包括保險代理人及其僱員", "它包括保險公司及其僱員", "它包括保險經紀和保險代理人"], 3, ""], [997, 2, "2.2", "以下哪項法律原則，某人受其代理人授權作為所約束？", ["「買者自當」", "「最高誠信」", "「代理人不必為其授權作為承擔個人的法律責任」", "「透過他人行事與自己親自執行並無分別」"], 3, ""], [998, 2, "2.2", "「透過他人行事與自己親自執行並無分別」法律原則是來自：", ["合約法", "代理法", "侵權法", "保險業條例"], 1, ""], [999, 2, "2.2", "轉承責任是指：", ["一種攤分的責任", "一種刑事法律的責任", "因基於一種與他人的關係對他人的行為責任", "代理人對委託人的行為負上責任"], 2, ""], [1000, 2, "2.2", "在法律上「一種透過他人行事與自己親自執行並無分別」的原則稱為：", ["轉承責任", "必要責任", "替代責任", "不容反悔代理權"], 0, ""], [1001, 2, "2.2.1", "保險代理人在安排一份保險時，為保險人行事，當中涉及兩份合約。其中一份\n存在於保險代理人與保險人之間，另一份則存在於：", ["保險代理人與第三者之間", "保險人與保單持有人之間", "保險代理人與保單持有人之間", "保險人與保險經紀之間"], 1, ""], [1002, 2, "2.2.1", "要構成代理關係，下面哪項必須存在？", ["該關係受代理合約所支配", "訂約的行為能力", "該關係必須通過法律認可的方式產生", "代價"], 2, ""], [1003, 2, "2.2.2", "以下哪項是追認的正確描述？", ["作出追溯性的授權批准一些事前沒有授權的行為", "給予代理的一項明確的授權", "出於緊急情況的授權行為", "根據經蓋章的合約給予的權限"], 0, ""], [1004, 2, "2.2.2", "雖然在行動時並未獲授權，但只要委託人事後確認該行動，就如同給予一種追\n溯性的授權。此種情況下產生之代理關係稱為：", ["通過協議", "明示協議", "追認", "隱含授權"], 2, ""], [1005, 2, "2.2.2", "由委託人追認而確認的代理關係是指：", ["委託人已有效地「追溯」他當時代理人的動作的批准", "在代理人行動前委託人已經表明不授權", "代理人曾在緊急情況下替委託人辦事", "代理人進行類似過去曾被批准的未授權行動"], 0, ""], [1006, 2, "2.2.2", "代理的追認是指？", ["代理人追認某次行動", "代理人確認委託人", "委託人追認代理人行動", "委託人無須為代理負法律責任，除非代理作出追認"], 2, ""], [1007, 2, "2.2.3", "代理人的權限包括：\ni)實際權限\nii)表面權限\niii)非表面權限\niv)必要權限", ["i,ii,iii", "i,ii,iv", "ii,iii,iv", "i,ii,iii,iv"], 1, ""], [1008, 2, "2.2.3", "必要代理人是指一名代理人：", ["替未成年人士行事(未滿18歲兒童)", "一位按明確的指示行事的人", "委託人事後確認該行動", "當該名代理人於無可非議情況下代表委託人"], 3, ""], [1009, 2, "2.2.3", "以下哪項是指「明示權限」?", ["以口頭以外的形式發出", "必須以書面的合約形式發出", "以合約蓋章形式", "明確說明代理人的責任"], 3, ""], [1010, 2, "2.2.3", "有一日某人在街上發現了一條昂貴的純種狗，他很努力地尋找失主。幾天後，\n他尋找到失主，他在照顧這狗隻期間的狗糧費用、獸醫費用，涉及相當數量的\n金錢，他爭辯有權向失主取回這些相關費用。因為他在照顧狗隻期間可被稱為:", ["追認代理人", "必要代理人", "明示代理人", "不容反悔代理人"], 1, ""], [1011, 2, "2.2.3", "「必要代理人」指一名代理人，他：", ["替一名未成年人士行事(未滿18歲)", "已經獲得明示(口頭或書面)指令", "事後被有關委托人追認為代理人", "因當時情況所需而無可非議地替另一人行事"], 3, ""], [1012, 2, "2.2.3(a)", "委託人明示或隱含地向代理人表明同意代理人代表委託人或替其行事，是屬於\n下列哪項代理人的權限:", ["實際權限", "表面權限", "必要權限", "不容反悔的代理權"], 0, ""], [1013, 2, "2.2.3(a)", "明示權限是：", ["由委託人迅速地給予的", "談判經蓋章的合約的授權", "祇可談判書面的合約的授權", "委託人明確地以口頭或書面形式賦予的授權"], 3, ""], [1014, 2, "2.2.3(a)", "保險人賦予「明示權限」給代理人，以下哪項有關的描述是正確？", ["由被保險人而非保險人選出代理人", "代理人的所有資料必須顯示於保單內", "代表委託人替其行事", "代理人須於指定時間內完成所有商議工作"], 2, ""], [1015, 2, "2.2.3(a)", "「明示權限」的明示是指：", ["與明示合約條款中的「明示」的意思相同", "於迫切或危急情況發生後必要的授權", "委託人已明確地指示代理人", "委託人對代理人的指示必須是書面的"], 2, ""], [1016, 2, "2.2.3(a)", "明示實際權限是代表：", ["得到書面的授權", "僅得到一份書面的授權", "可以是書面或口頭的授權", "口頭以外的方式授權"], 2, ""], [1017, 2, "2.2.3(b)", "就表面權限而言，權限問題與代理關係是有所相關及分別，以下哪些或哪項是\n正確的?", ["局限在委託人與第三者之間的關係", "代理人的權限是委託人對第三者表明同意產生的", "在無授權情況之下，而幫助委託人訂立合約時，會令委託人受代理人行為約束", "以上各項皆是"], 3, ""], [1018, 2, "2.2.3(b)", "以下哪項是對「表面授權」的正確描述?", ["這個不可能的", "法律上是不容許的", "以口頭或書面形式作出授權", "委託人以行為表明同意代理人已獲授權"], 3, ""], [1019, 2, "2.2.3(b)", "以下哪個是表面權限的正確描述：", ["明示權限", "沒有實際權限", "是局限於委託人與第三者之間的關係", "實際權限"], 2, ""], [1020, 2, "2.2.3(c)", "如果出於人道或其他合理的原因，某人承擔並支付代理另一人行事的開支，則\n即使他人沒有在產生開支期間或之後授權，此人也可以被認為是他的代理人，\n這種代理關係的成立是基於：", ["明示權限", "不容反悔", "必要權限", "追認"], 2, ""], [1021, 2, "2.2.3(c)", "必要權限可能在以下哪種情況產生？", ["由委託人的明示權限而產生", "如果委託人以追溯形式確認對代理人的授權", "由一位假定委託人的行為而產生", "如果代理人在緊急情況下必須代表委託人行事"], 3, ""], [1022, 2, "2.2.3(c)", "某人在某時為他人的最佳利益而行事，雖然他事前並沒有獲得授權，但在法律\n上卻持有這種權限‧並被視為", ["必要代理人", "緊急情況下代理人", "具有追溯性授權的代理人", "自動獲授權的代理人"], 0, ""], [1023, 2, "2.2.3(c)", "在沒有獲授權的情況下，為另一方作了某些事情，而該行為是基於合理及必要\n，在此情況下，這人便成為了：", ["不容反悔代理人", "明示權限代理人", "必要代理人", "實際權限代理人"], 2, ""], [1024, 2, "2.2.3(c)", "第三者根據一名〈假定）委託人的行為，覺得一名〈假定）代理人為委託人的\n代理〈其實並沒有授權），這類代理關係稱為：", ["明示代理", "不容反悔代理", "必要代理", "追索代理"], 1, ""], [1025, 2, "2.2.3(c)", "如果需要或出於人道或其他合理的原因，某人代理另一人行事的開支，即使沒\n有獲授權，此人也可以被認為是他的代理人，這種代理關係的成立是基於以下\n那項？", ["實際權限", "表面權限", "必要權限", "不容反悔"], 2, ""], [1026, 2, "2.2.3(c)", "「必要代理人」是指代理人:", ["該受保人是未成年人士(未滿18歲人士)。", "獲得有效(口頭或書面)的指令", "事後被追授為代理人", "在情況所需下，無可非議地為另一人行事"], 3, ""], [1027, 2, "2.2.3(d)", "不容反悔的代理權是來自:", ["明示權限", "法定條文", "事後對代理人的行為所作的明確指示", "據稱的委託人的行為"], 3, ""], [1028, 2, "2.2.3(d)", "若保險人根據被保險人的行為，合理地判斷一位（其實沒有被授權的）事務律\n師具備授權來替被保險人行事，那麼根據以下哪項原則，被保險人受該事務律\n師的行為所約束？", ["明示權限", "不容反悔的代理權", "追認代理", "必要權限"], 1, ""], [1029, 2, "2.2.4", "以下哪項不屬於代理人對委託人的責任？", ["遵從指示", "親自執行", "所有帳目必須以電腦形式記錄", "必須保存與代理業務有關的足夠紀錄"], 2, ""], [1030, 2, "2.2.4", "如果一名代理人在履 .2.1", "一方沒有詢問的事情保持緘默\n一般誠信是：", ["廣泛性披露的責任", "不說謊的消極責任", "披露所有資料的積極責任", "以上皆不是"], 1, ""], [1079, 3, "3.2.4", "保險人有時會把普通法中有關最高誠信責任加以延伸，要求投保人在保單上作\n出特定聲明，原因是：", ["沒有該項聲明，投保人就沒有最高誠信披露重要事實的責任", "投保人僅就已提供的重要事實必須完全真實", "投保人保證無論是否涉及重要事件，所提供的事實必須實質上真實", "以上各項原因皆不是"], 3, ""], [1080, 3, "3.2.4", "根據香港法律，投保人需要遵守最高誠信責任：", ["涉及整段保單有效期內", "一直至保險人接受投保申請為止", "一直至保險人交付保單為止", "一直至簽署簽署及呈交投保書止"], 1, ""], [1081, 3, "3.2.4", "以下哪一項是保單延伸最高誠信的根據?", ["法定下", "保單屬長期保單", "欺詐性索償", "以上各項皆不是"], 3, ""], [1082, 3, "3.2.4", "投保人於投保時遵守最高誠信以披露重要事實的期限:", ["只有保單持有人特別提出要求時予以延伸", "法律並不容許予以延伸", "一直至合約具約束力結束為止，並無例外", "有時通過相互協議予以延伸"], 3, ""], [1083, 3, "3.2.6", "違反最高誠信的形式分別有欺詐性失實陳述，非欺詐性失實陳述，欺詐性不披\n露，非欺詐性不披露的四個類別，當中非欺詐性不披露是:", ["蓄意地提供虛假重要事實給另一方", "無意地或疏忽地向另一方提供虛假重要事實", "無意地或疏忽地漏了向另一方披露重要事實", "蓄意地或疏忽地漏了向另一方披露重要事實"], 2, ""], [1084, 3, "3.3.2", "被保單條款明顯地剔除的保障範圍的損失原因稱為:", ["除外危險", "不保危險", "不受保危險", "不被接受的危險"], 0, ""], [1085, 3, "3.3.4", "近因原則對於保險索償來說是一項非常重要的原則，它在保險索償的應用於：", ["人身意外保險", "海上貨物保險", "責任保險", "以上全部皆是"], 3, ""], [1086, 3, "3.4.2", "以下哪幾項關於彌償原則的描述是正確的？\ni.它通常不適用於人身意外及人壽保險保險\nii.從根本上說，它意味著對承保損失的精確財務補償\niii.人身意外及人壽保險保險不受彌償原則所約束\niv.根據保險業條例，普通法下的彌償原則往往可以通過私人協議予以修改", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "i,ii,iii,iv"], 0, ""], [1087, 3, "3.4.2", "彌償原則合適用以上甚麼保險項目類型?", ["人壽保險", "醫療保險", "人身意外保險", "以上各項皆是"], 1, ""], [1088, 3, "3.4.3", "以下哪項與彌償關係最少的保險原則？", ["代位", "分擔", "最高誠信", "可保權益"], 2, ""], [1089, 3, "3.4.3", "「彌償」這項保險原則對以下哪項關係最為密切？", ["可保權益", "分擔", "代位", "以上全部皆是"], 3, ""], [1090, 3, "3.4.5", "以下哪項不是Salvage一詞的定義?", ["在海商法中，有關財物擁有人向救助人支付的”救助賞金”", "於非海上保險中，指保險標的受損後的殘餘價值", "懲罰不足投保額", "以上各項皆不是"], 2, ""], [1091, 3, "3.4.7", "於香港處理財產保險的保險中介人，需盡力地確保客戶釐定投保額時最低限度\n代表財產價值。以下哪一項是出現投保額不足導致的後果?", ["令該次索償無效", "投保人需支付額外保費", "賠償金額將可能受到比例分攤原則所約束", "保險人將拒絕續保"], 2, ""], [1092, 3, "3.4.7(a)", "以下哪項對保險術語「Average」的描述是正確的？\ni.在大部分的海上保險中「Average」是部分損失的意思\nii.普通法下，比例分攤自動應用於每一份保單\niii.在香港，大部分非水險財產保險均應用到比例分攤\niv.比例分攤原則用以懲罰投保額的不足", ["i,ii,iii", "i,iii,iv", "ii,iii,iv", "i,ii,iii,iv"], 1, ""], [1093, 3, "3.4.7(b)", "保單的免賠額是$1000元，哪麼意味著:", [" [1110, 3, "3.1.3", "在香港，每一名對下列哪項人士的生命不具有可保權益？﹝為個人本身的利益\n購買人壽保險﹞", ["個人的妹夫", "個人的配偶", "個人的本身", "上述各項均存在可保權益"], 0, ""], [1111, 3, "3.1.3", "在香港，個人對下列哪項人士的生命不具有可保權益？", ["其本身", "其未婚妻", "其商業夥伴", "其貸款借款人"], 1, ""], [1112, 3, "3.1.3", "以下哪項不太可能屬於可保權益的先決條件?", ["與保險標的的一種法律認可關係", "有可保的標的", "標的是可受保的", "被保險人與保險標的之間的一種法律擁有權"], 3, ""], [1113, 3, "3.1.4", "以下哪項所投保的財產保險不具有可保權益?", ["破產案中破產者擁有的財產的受託人", "遺囑執行人打算投保已去世者的建築物", "一部數碼相機的擁有者的父親", "承按人打算投保的按揭財產"], 2, ""], [1114, 3, "3.1.4", "構成財產保險可保權益的是：", ["在擁有人同意下管有該項財產", "需對保管的財產的損失負責", "絕對擁有該項財產", "以上各項皆是"], 3, ""], [1115, 3, "3.1.4", "在香港，就以下哪項的生命投保的人壽保險不具備可保權益？", ["個人的母親", "個人本身", "個人15歲的子女", "個人的貸款欠款人"], 0, ""], [1116, 3, "3.1.4(a)", "在香港，每一名人士對以下哪項人士的生命不具有可保權益？", ["個人的本身", "個人的配偶", "個人的兄弟", "個人十八歲以下的子女或受監護人"], 2, ""], [1117, 3, "3.1.4", "以下哪項個人生命權益不受保?\ni)人壽保險\nii)汽車保險\niii)責任保險\niv)船上貨物保險", ["i,ii", "ii,iii", "ii,iii,iv", "i,ii,iii,iv"], 2, ""], [1118, 3, "3.1.4", "以下哪項購買財產保險的關係中會出現可保權益？", ["手錶的受託保管人", "遺囑執行人打算投保已逝者的建築物", "承按人打算投保按揭保障", "以上各項均可購成可保權益"], 3, ""], [1119, 3, "3.1.4", "以下哪項不構成法律責任的可保權益？", ["自己的疏忽", "自己僱員的疏忽", "自己代理人的疏忽", "盜賊駕駛被盜人士的汽車的疏忽"], 3, ""], [1120, 3, "3.1.4", "彌償及可保權益兩個原則的關係:", ["均與財務利益有密切關係", "兩者完全沒有共通之處", "意向完全不同", "尋求真正造成損失且具有影響力的原因"], 0, ""], [1121, 3, "3.1.4(a)", "以下哪三項可存在可保權益?\ni)配偶\nii)債權人\niii)欠債人\niv)年屆十五歲的子女", ["i，ii，iii", "ii，iii，iv", "i，ii，iv", "i，iii，iv"], 3, ""], [1122, 3, "3.1.4(a)", "在香港，每一名人士對以下哪項或哪些人士的生命不具有可保權益(為個人本身\n的利益購買人壽保險)？", ["個人的本身", "個人的配偶", "個人17歲的妻子", "以上所有各項均存在可保權益"], 3, ""], [1123, 3, "3.1.4(b)", "財產的可保權益可按下列哪項產生?", ["財產擁有權", "代理關係", "已有保險計劃的關係", "以上各項皆不正確"], 0, ""], [1124, 3, "3.1.4(b)", "一份恰當地安排的財產保險，於被保險的全損出現時，應可獲完全補償。這項\n補償代表該名被保險人在有關保險上的權益，顯示彌補與以下哪些或哪項的原\n則相連：", ["近因", "可保權益", "最高誠信", "以上各項"], 1, ""], [1125, 3, "3.1.4(b)", "阿倫給予他的朋友玫瑰一個他所擁有的單位免費住兩個月，請問玫瑰有權為該\n單位購買保險?理由何在?", ["有，合法地佔有某單位的任何人有權以所有人的代理人的身份就該單位購買保險", "沒有，因為她沒有付出代價", "有，她是以單位託管人的身份人對該單位具有權益的", "沒有，因為她並非擁有該單位"], 2, ""], [1126, 3, "3.1.4(b)", "於所有保險合約中，被保險人必需在投保時對標的物有可保權益，以下哪項保\n險項目在索償時需要有可保權益？\ni任何型式的責任保險\nii)車險\niii)人壽保險\niv)船上的貨物保險", ["i,ii,iii", "i,iii,iv", "i,ii,iv", "i,ii,iii,iv"], 2, ""], [1127, 3, "3.1.5", "哪一類保險保障只需在保單開始時存在可保權益便可以:", ["汽車保險", "家居保險", "人壽保險", "醫療保險"], 2, ""], [1128, 3, "3.1.4(b)", "以下哪三種具有可保權益屬於不是自己絕對擁有的財產？\ni)受託人(以信託形式托管財產)\nii)戶主的兒子(母親的房屋)\niii)遺產執行人(死者遺下的物業)\niv)一家銀行借錢給按揭人(按揭建築物)", ["i,ii,iii", "i,ii,iv", "ii,iii,iv", "i,iii,iv"], 3, ""], [1129, 3, "3.1.4(b)", "以下哪項或哪些對財產可保權益的描述是正確的?", ["投保人需為財產擁有人", "投保人需實質擁有該財產", "投保人不一定需要是財產擁有人", "以上所列各項皆是"], 2, ""], [1130, 3, "3.1.4(c)", "以下哪項或哪幾項是符合可保權益所需要之條件：", ["一男子希望幫助他偷竊回來的財物投買保險", "一男子希望幫助他一員工之不忠實投買保險", "一男子因為自己的利益,希望幫助他粗心大意的朋友的手錶投買保險", "以上各項皆是"], 1, ""], [1131, 3, "3.1.4(c)", "有關責任上出現的可保權益包括：", ["自己行為的責任", "自己的代理人行為的責任", "自己的僱員行為的責任", "以上各項皆是"], 3, ""], [1132, 3, "3.1.4(c)", "以下哪項對首要責任及轉承責任的描述是正確的？\ni)首要責任是個人對他人的作為或不作為負上責任\nii)首要責任是個人本身的作為或不作為所引致的法律責任\niii)轉承責任經常在代理關係上產生\niv)轉承責任可能在僱傭關係上產生", ["i,ii", "i,ii,iii", "ii,iii,iv", "i,ii,iii,iv"], 2, ""], [1133, 3, "3.1.4(c)", "以下哪項構成法律責任的可保權益?\ni)自己本身的疏忽\nii)第三者的疏忽\niii)承擔某人的僱員的疏忽\niv)承擔某人的代理的轉承責任", ["i,ii,iii", "i,ii,iv", "ii,iii,iv", "i,ii,iii,iv"], 3, ""], [1134, 3, "3.1.4(c)", "以下哪項有關直接責任及轉承責任之陳述是不正確的?", ["直接責任是指由個人本身的行為的法律責任", "直接責任是個人對別人的行為的法律責任", "轉承責任在僱傭關係中產生", "轉承責任是在委託人/代理人關係中產生"], 1, ""], [1135, 3, "3.1.4(c)", "一間育兒院要求每一位家長必須簽署一份協議書，當中訂明其孩子在育兒院內\n所受之傷害，家長不得向育兒院追究。儘管如此，育兒院營運人就其所照顧的\n孩子在其處所所受之傷害的潛在法律責任購買了一入責任保險。請問育兒院是\n否布權購買此份保險，理由何在?", ["他不必購買此份保險，因政府註冊的育兒院不須承擔責任", "保險無效；因大部份的責任保險將「受保處所之傷害」列為除外責任", "保險有效；育兒院營運人需為其作為或不作為負擔其潛在的法律責任", "保險無效；因沒有法律責任，在欠缺可保權益下不能購買保險"], 2, ""], [1136, 3, "3.1.4(d)", "符合法律認可關係的可保權益，以下哪項為非人身、財物或法律責任的可保權\n益?", ["為酒樓電力中斷後，營業利潤損失購買保險", "為自己的建築物購買火險", "債主為自己的債務購買保險", "僱主為受僱職員的損傷購買保險"], 0, ""], [1137, 3, "3.1.4(d)", "可保權益的產生，可以是因本身的合法權利受到侵犯或當費用損失因受保範圍\n間接引致的，以下哪項屬於該範圍?", ["房東因火災後損失租金", "汽車意外引致另行租用其他車輛的費用", "商鋪爆炸以引致利潤的損失", "以上各項皆正確"], 3, ""], [1138, 3, "3.1.4(d)", "就可保權益的定義而言，一家物業管理公司可否就所管理的大廈投買火險？為\n什麼？", ["不可以。因為物業管理公司對該大廈不存在可保利益", "不可以。因為物業管理公司不是大廈業主", "可以。因為物業管理公司有法律責任購買", "可以。只要獲大廈業主的授權替委託物業購買保險，便會構成可保權益"], 3, ""], [1139, 3, "3.1.5", "人壽保險與其他保險一樣要求可保權益的存在，但對人壽保險而言可保權益必\n須存在於", ["只是索償出現的時候", "只是保單開始的時候", "只是保單可能轉讓的時候", "保單開始及索償出現的時候"], 1, ""], [1140, 3, "3.1.5", "下列哪項是有關人壽保險的特性?\ni)被保險人在這類保險中被視為擁有期未利益\nii)它是一種長期業務\niii)保險人不能取消人壽保險單\niv)可保權益只在保單開始時需要", ["i，ii，iii", "i，ii，iv", "ii，iii，iv", "i，ii，iii，iv"], 3, ""], [1141, 3, "3.1.5", "不同類型的保單會於不同時間需要具有可保權益，下列哪項保單會於索償出現\n時需要具有可保權益?\ni)人壽保險\nii)鐵路車輛保險\niii)任何形式的責任保險\niv)海上貨物保險", ["i，ii", "ii，iii", "i，ii，iii", "ii，iii，iv"], 3, ""], [1142, 3, "3.1.5", "以下哪項或哪些情況出現之損失或索償，在沒有構成可保權益下，都不會形成\n拒絕損失索償的理由:", ["人壽保險(被保險人為前配偶，現已離婚)", "火險，由「前承按人」購買(欠款已於火災前清還)", "車險(汽車於意外摧毀前己賣出)", "以上各項"], 0, ""], [1143, 3, "3.1.6", "以下哪項對轉讓的陳述是正確的?\ni)人壽保險可以不經保險人同意自由轉讓\nii)海上貨物保險可以不經保險人同意自由轉讓\niii)商業「全險」保單不可以沒有保險人同意便轉讓\niv)人壽保險不可以沒有保險人同意便轉讓", ["i，ii，iii", "i，ii，iv", "i，iii，iv", "ii，iii，iv"], 0, ""], [1144, 3, "3.1.6", "有兩種保險合約被視為可以自由轉讓的，它們是:", ["人壽與火險", "人壽與水險", "水險與公眾責任", "水險與忠實保險"], 1, ""], [1145, 3, "3.1.6", "實務上，有兩類保險是不需要保險人同意下可以進行轉換的。", ["壽險；全險", "海上保險；忠誠保證保險", "海上保險；公衆責任保險", "壽險；海上貨物保險"], 3, ""], [1146, 3, "3.1.6", "實際上，哪項或哪些必須在保險人的同意下轉讓？", ["人壽保險", "財產保險", "海上貨物保險", "以上所有各項"], 1, ""], [1147, 3, "3.1.6", "「將根據合約所需給付的金額，轉付予保單持有人以外的人。」此句子是指:", ["代位", "權益轉讓", "委付", "保單收益轉讓"], 3, ""], [1148, 3, "3.1.6", "保單轉讓是指以相同的保險標的物，轉至另一被保險人，通常哪類險種需要保\n險人的批淮？", ["盜竊險", "財產險", "車險", "以上各項皆是"], 3, ""], [1149, 3, "3.1.6", "收取保險金的轉讓，意思是指：", ["必須把保單應該支付的金錢轉付予指定的第三者", "把保單轉讓予另一保險公司", "把保單的擁有權轉讓予他人", "讓另一個人替代原本的被保險人"], 0, ""], [1150, 3, "3.1.6", "保單轉讓是把附於合約的權利轉移，令另一人成為了同一保險標的的保單持有\n人，以下哪項或哪些保險類型需要得到保障人同意下轉讓?", ["僱員補償保險", "盜竊保險", "汽車保險", "以上各項皆是"], 3, ""], [1151, 3, "3.1.6", "下列哪項屬於轉讓保險合約所帶來的影響？", ["承讓人會成為保單的保管人", "承讓人會成為保單收益的受托人", "不論轉讓人或是承保人所作的違法行為不會對承讓人構成影響", "保險合約從此保障承讓人可能遭受的損失"], 3, ""], [1152, 3, "3.2", "最高誠信的責任適用於:", ["被保險人而非保險人", "保險人而非被保險人", "任何情況下的被保險人及保險人", "被保險人及保險人，但只限於保單有這要求"], 2, ""], [1153, 3, "3.2.1", "有別於最高誠信，一般誠信是指由各方提供的資料必須:", ["必須大致真實", "必須絕對真實且沒有遺漏任何重要事實", "可以是真實或虛假，所以不應信賴", "必須實質上真實，但沒有主動的責任披露每項事實"], 3, ""], [1154, 3, "3.2.1", "有別於最高誠信，一般誠信的意思是:", ["不論有否問及必需披露重要事實", "所披露的必須確保百分百真實", "所提及的需承諾及保證完全真實", "本著誠信的態度的行事，而資訊必須是實質上真實"], 3, ""], [1155, 3, "3.2.4", "如果保險人要求保證所有披露資料，不論重要與否，均需完全真實，這表示:", ["違反法例並不能強制執行", "延伸普通法中的最高誠信的要求", "這合約受制於而非最高誠信", "這合約受制於最高誠信"], 1, ""], [1156, 3, "3.2.2", "最高誠信在普通法中，要求投保人所提供的資料是:", ["百分百事實", "大部份真實", "百分之九十真實", "比嚴謹"], 0, ""], [1157, 3, "3.2.2", "最高誠信的要求有時會改變，以下哪項是正確描述？", ["這是法律不容許的", "普通法要求在保單任何時間都需要", "所有保險都是要求只在保單開始時需要", "可以因為雙方的協議而修改"], 3, ""], [1158, 3, "3.2.2", "誠實行事指一名人士在問及有關問題時要真實回答所有的問題，這是：", ["最高誠信", "一般誠信", "在內誠信", "合約誠信"], 1, ""], [1159, 3, "3.2.2", "以下哪項或哪些有關最高誠信和保險在香港的情況是不正確的？", ["最高誠信只要求就所發問的問題提供合理的答案", "最高誠信只在保單條款有規定的情況下才適用", "所有保單內包含某些條款，更改最高誠信責任", "以上所有各項都不正確"], 3, ""], [1160, 3, "3.2.2", "以下關於最高誠信的陳述，哪三項是正確的?\ni)它是一項主動的披露責任\nii)最高誠信責任的關鍵不在於另一方的主動要求\niii)這是一項原則來自普通法，但合約條款是可以修改它的\niv)保險人必定不可能就違反最高誠信承擔法律責任", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 0, ""], [1161, 3, "3.2.2", "以下哪項是對最高誠信應用於保險是不正確描述：", ["只就所發問的問題以誠實及實質上真實的態度處理", "在保單條款上必定是可以寬免的", "只有在保單條款上規定才須遵守", "以上所有各項均不正確"], 3, ""], [1162, 3, "3.2.2", "以下哪項是商業合約的要求？", ["一般誠信", "最高誠信", "重要誠信", "合約誠信"], 0, ""], [1163, 3, "3.2.3", "下列哪項或哪些毋須在人壽保險合約的最高誠信責任下披露?", ["健康紀錄", "年齡及性別", "準受保人是非抽煙者", "以上所有各項"], 2, ""], [1164, 3, "3.2.3", "影響一名審慎的保險人是否決定承擔風險的一項資料稱為：", ["陳述", "重要事實", "核保保證", "無須披露的事實"], 1, ""], [1165, 3, "3.2.3", "以下哪項屬於必須披露的重要事實？", ["任何過去的入屋犯法行為﹝盜竊保險﹞", "載貨船的名稱﹝海上貨物保險﹞", "投保貨物的高度可燃性﹝火險﹞", "上述所有各項"], 3, ""], [1166, 3, "3.2.3(a)", "重要事實指:", ["填寫投保書是要求申報的事實", "影響一名審慎保險人決定是否承保的事實", "購買財產保險時要求申報的事實", "屬於常識一類的事實"], 1, ""], [1167, 3, "3.2.3(b)", "根據最高誠信的原則，下列哪項屬於無須揭露的事實?\ni)近期健康狀況\nii)與常識有關的事件\niii)保險人已知的事實\niv)增加風險的事實", ["i，ii", "i，iii", "ii，iii", "iii，iv"], 2, ""], [1168, 3, "3.2.3(b)", "以下哪一項是重要事實的陳述?", ["保險人已知的事實", "改善風險狀況的事實", "水是生命之源", "在五年前得知患有癌症"], 3, ""], [1169, 3, "3.2.3(b)", "於行使最高誠信時,下列哪項不需予以披露：", ["關於戰爭的狀況", "保險人已知悉或當作已知的事實", "改善風險狀況的事實", "上述各項皆無須披露"], 3, ""], [1170, 3, "3.2.3(b)", "以下哪項是投保人須披露：", ["與常識有關的資料", "保險人已知或會影響是否承保風險的事實", "投保人過往的索償紀錄", "以上所有各項"], 2, ""], [1171, 3, "3.2.4", "保險人有時會把普通法中有關最高誠信的要求延伸，要求投保人在保單上作出\n特定聲明，原因是：", ["通過這聲明，投保人保證無論是否涉及重要事件，所提供的事實必須實質上真實", "通過這聲明，投保人保證所提供的重要事實，必須完全真實", "通過聲明，投保人保證，無論是否與重要事件有關連，所有提供的資料都必須完全真實", "以上各項皆不是"], 2, ""], [1172, 3, "3.2.4", "以下哪項屬於本港的一般保險單經常包括的條款？", ["把最高誠信責任應用局限於具體提出的問題", "把最高誠信申延至整段合約生效期", "取消最高誠信", "把最高誠信責任限制於一段時間內"], 1, ""], [1173, 3, "3.2.4", "如在保險保障期間，風險上有重大的轉變：", ["很明顯地對保險人極其重要", "某些保險合約可能要求被保險人作出披露", "普通法要求在續約時方須要提出", "以上各項皆正確"], 3, ""], [1174, 3, "3.2.4", "在保單有效期內若在風險上出現的重大轉變，以下哪項或哪些對於這些轉變的\n評論是正確的？", ["這些轉變顯然對保險人來說是重要的", "在普通法中，在續保前都無須披露這些轉變", "可能因保單條款的要求而需要披露這些轉變", "以上所有各項皆是正確評論"], 3, ""], [1175, 3, "3.2.4", "在非人壽保險單續保時，最高誠信的責任：", ["要再履行", "無須履行", "不再適用", "只對保險人適用"], 0, ""], [1176, 3, "3.2.4", "在合約有效期內，下列哪項是正確的?", ["在普通法中，風險的轉變只須續約時予以知會", "當保單續保時，最高誠信的責任不適用", "在合約有效期內，要求披露重要資料是一種特殊做法", "以上各項皆是"], 0, ""], [1177, 3, "3.2.5", "欺詐性不披露，非欺詐性不披露、非欺詐性失實陳述及欺詐性失實陳述被視為\n違反:", ["一般誠信", "普通誠信", "至高誠信", "最高誠信"], 3, ""], [1178, 3, "3.2.5", "以下哪項不被視爲違反最高誠信原則？", ["欺詐性不披露", "非欺詐性失實陳述", "非欺詐性不披露", "以上各項皆不是"], 3, ""], [1179, 3, "3.2.5", "以下哪項屬於違反最高誠信的種類？", ["非欺詐性不披露", "欺詐性不披露", "非欺詐性失實陳述", "以上所有各項"], 3, ""], [1180, 3, "3.2.5", "以下哪三項通常被認為違反最高誠信的責任?\ni)真正忘記了以前的被爆竊事件﹝盜竊險﹞\nii)蓄意地隱瞞一個過去不良的索償記錄﹝火險﹞\niii)有意地提供良好健康證明,但明知事實與其相反﹝人壽保險﹞\niv)沒有披露一個自己完全不知情的健康情況﹝人身意外保險﹞", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 0, ""], [1181, 3, "3.2.5", "以下哪項被視爲違反最高誠信原則？", ["入屋爆竊記錄﹝盜竊險﹞", "某地方的戰爭事件﹝水險﹞", "發泡膠相當易燃﹝火險﹞", "已安裝自動灑水系統﹝火險﹞"], 0, ""], [1182, 3, "3.2.6", "假如被保險人違反最高誠信，保險人可作出以下哪項的補救行動:", ["可拒絕作出賠償，並於剩餘的保險期內把保單視為有效", "保單開始日起取消保單", "可提出侵權法訴訟要求損害賠償", "以上各項皆是"], 2, ""], [1183, 3, "3.2.6", "如果被保險人違反最高誠信，保險人可使用以下哪些補救方法？\ni)就該項索償拒賠\nii)在剩餘的保險期限內把保單視為有效\niii)保留部分已繳保費\niv)保留全部已繳保費", ["i,ii,iii", "i,ii,iv", "ii,iii,iv", "以上各項皆不是"], 3, ""], [1184, 3, "3.2.6", "某投保人在投保火險保單時忘記披露某些重要事實，該保單的保費為港幣一萬\n二千元，而保險人在保單起保一個月後發現這件事，以下哪項為受屈的保險人\n可享用的補救：", ["保險人可選擇推翻保單，並保留保單的所有保費", "保險人可選擇推翻保單，但須將已付的保費退回", "保險人可選擇推翻保單，並保留一個月的保費(即港幣一千元)", "保險人可選擇取消合約，並保留一個月的保費(即港幣一千二百元)"], 1, ""], [1185, 3, "3.2.6", "在保險合約中，下列哪項不屬於最高誠信的補救？", ["受屈一方可推翻合約", "受屈的保險人可以追回不知該項違反情況支付的賠償", "受屈的一方可向另一方展開刑事檢控", "如果涉及詐騙，受屈一方便可提出侵權法追求賠償"], 2, ""], [1186, 3, "3.2.6", "如果投保人違反了最高誠信:", ["只要牽涉詐騙的情況下，保險人可得到補救", "保險人可以從起保日開始推翻有關合約", "詐騙或疏忽的情況下，保險人可得到補救", "該份保單會自動失效"], 1, ""], [1187, 3, "3.2.6", "如果投保人違反最高誠信:", ["保險人可不作追究", "除非牽涉詐騙成份的情況下，保險人才可得到補救", "除非牽涉詐騙或疏忽成份的情況下，保險人才可得到補救", "保險保單會自動取消"], 0, ""], [1188, 3, "3.2.6", "如果違反最高誠信，保險人可以：", ["拒絕賠償這次損失，合約在餘下時期內將被視為有效，可以索償", "不再追究", "如果已經錯誤賠償，可向被保險人提出刑事檢控要求損害賠償", "以上所有各項"], 1, ""], [1189, 3, "3.3.1", "就近因而言，以下哪項或哪些是正確的?", ["要構成有效的索償，有關的近因必須不屬於可保的危險", "僅由除外的危險而構成的損失是不受保的", "由自然地產生除外的危險的不保危險所產生的損失是受保障", "以上各項皆是"], 1, ""], [1190, 3, "3.3.1", "在保險中，近因是重要的，因為:", ["它找出購買保險的原因", "需要確定被保險物的價值", "並不是每一個引起損失的原因都是受保單保障的", "根據情況保險人可能必須通知警方"], 2, ""], [1191, 3, "3.3.1", "理解一項損失的主導及有效的原因：", ["彌償", "近因", "可保權益", "比例分攤條件"], 1, ""], [1192, 3, "3.3.1", "一種理解為「一項對損失最顯著及最具效力的理由」的保險原則為：", ["近因", "分擔", "最高誠信", "可保權益"], 0, ""], [1193, 3, "3.3.1", "因為幾乎所有保單都有除外責任，所以確定什麼是有效導致損失的原因是非常\n重要的，這類調查與下列哪項最有關係？", ["分擔", "近因", "可保權益", "最高誠信"], 1, ""], [1194, 3, "3.3.1", "近因在保險中非常重要，因為:", ["它確定了保險的存在", "需要它確定投保物件的價值", "不是所有引致的損失均受到保障", "視乎情況，保險人可考慮通知警察"], 2, ""], [1195, 3, "3.3.1", "以下哪項有關近因原則的陳述是正確的:", ["它在所有保險類型中均屬重要", "嘗試推斷一項損失的有效理由", "它是一項與索償極其重要的原則", "以上各項皆正確"], 3, ""], [1196, 3, "3.3.1", "近因原則在保險中非常重要，理由是:", ["不是所有損失之近因都是受保的", "政府要求損失之近因的統計數字", "如屬個人疏忽導致的損失，保險人無須負責", "如屬天意造成的損失及損毀，保險人永遠不需賠償"], 0, ""], [1197, 3, "3.3.1", "近因:", ["對人壽保險來說從不重要", "對所有索償情況來說均屬重要", "從不被保單措詞所更改", "符合以上各項的陳述"], 1, ""], [1198, 3, "3.3.2", "下列哪三種屬於決定一項損失的近因時，須予考慮的危險種類？\ni)受保危險\nii)不保危險\niii)額外危險\niv)除外危險", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 1, ""], [1199, 3, "3.3.2", "就危險的種類而言，風險可被分類為三大風險，除了", ["受保風險", "除外風險", "不保風險", "純粹風險"], 3, ""], [1200, 3, "3.3.2", "在考慮「近因」時，如果一項特定損失涉及一項單一成因，那麼：", ["如果該成因是一項受保危險，被保險人便能就所引致的損失得到保障", "如果該成因是一項不保危險，被保險人便不能就所引致的損失得到保障", "如果該成因是一項除外危險，被保險人便不能就所引致的損失得到保障", "上述所有各項陳述均屬正確"], 3, ""], [1201, 3, "3.3.2", "構成損失近因時，有三種危險需要考慮，它們是除外危險、不保危險和:", ["受保危險", "可保危險", "不可保危險", "因為保證而得不獲承保的危險"], 0, ""], [1202, 3, "3.3.2", "就近因而言，描述相關承保風險所引致損失的成因稱為：", ["風險", "危險", "投機風險", "事故"], 1, ""], [1203, 3, "3.3.2", "假設火險保單只保障火災或雷電帶來的損失或損壞。如果雨水透過開敞窗戶而\n進入室內而造成的損失是得不到保障的，因為其近因是:", ["除外危險", "不保危險", "外來危險", "不可保危險"], 1, ""], [1204, 3, "3.3.3", "近因原則在保險中極為重要，理由是：", ["並非所導致損失的起因都可得到保障", "政府要求導致損失起因的數字", "如屬被保險人的疏忽，保險人便毋須負責", "如屬天災導致的損失或損害，保險人絕對毋須負責"], 0, ""], [1205, 3, "3.3.3", "下列哪項或哪些有關近因的陳述是正確的？", ["必須涉及一項受保危險；否則損失不可獲賠償", "一項損失如果要受保障，其單一成因必須既不屬於除外危險，也不屬於不保危險", "如果有一項除外危險引發了一連串事故，索償將會無效", "以上所有各項"], 3, ""], [1206, 3, "3.3.3", "有一項索償個案，是關於由一宗﹝受火險保單所保障的﹞意外火災所導致的損\n失。火災發生的過程中，消防員為了獲取進入建築物的通道，以及用水撲救大\n火，引致進一步的損害。按照近因規則，因消防員所作努力而導致的損害：", ["只得到50%的保障，因為真正的成因是該宗火災", "並非一項受保危險導致，所以得不到保障", "是一項由受保危險導致的不保危險，因此得到保障", "只能於火險保單已經伸延至保障這項風險時，才會得到保障"], 2, ""], [1207, 3, "3.3.3", "近因適用於：", ["人壽保險而已", "水險而已", "責任保險而已", "所有類型的保險"], 3, ""], [1208, 3, "3.3.3", "以下哪些或哪項屬於應用近因原則的普遍規定?", ["若要索償有效，必須涉及一項受保危險", "若不屬意外責任，由不保危險導致的損害必會得到保障", "損害由一項除外危險所引致，然而受保危險緊隨其後發生的話，仍可受到保障", "以上各項皆是"], 0, ""], [1209, 3, "3.3.3", "就近因法則而言，以下哪項或哪些是正確的?", ["如果損失的近因獲賠償；這一定不會是除外危險", "損失的單一成因只涉及不保危險是不獲賠償的", "損失是由不保危險引起的除外危險可得到保障", "以上各項皆是"], 1, ""], [1210, 3, "3.3.3", "就近因而言，以下哪項或哪些陳述是正確的?", ["要構成有效的索償，近因不能屬於不保危險", "如非單一成因引起，危險必須既不是不保危險，也不是除外危險，便可得到保障", "由自然地來自除外危險導致的損害是不受到保障的", "以上各項皆正確"], 2, ""], [1211, 3, "3.3.3", "根據近因的一般原則，當雷電導致火警的話，以下哪類的損毀可按商業火險得\n到保障?\ni)電極造成的損毀\nii)有關火警對建築物造成的損毀\niii)濃煙對存貨造成的損毀，然而未有被火燒毀\niv)因嘗試以水救火而對建築物造成的損毀", ["i，ii", "ii，iii", "ii，iii，iv", "i，ii，iii，iv"], 3, ""], [1212, 3, "3.3.3", "以下哪項是描述「既不是受保也不是除外責任的危險，而是在保單保障的範圍\n以外」？", ["受保危險", "除外危險", "不保危險", "非受保特定危險"], 2, ""], [1213, 3, "3.3.3", "一個單位購買火險後，鄰居發生火警，在必要情況下，消防員需要破壞此單位\n某些設施進入鄰居救火，有關這些設施的損失：", ["因為受保危險引致不保危險，故此可得到賠償", "因為不保危險引致受保危險，故此得不到賠償", "屬於不保危險，故此得不到賠償", "屬於受保危險，故此得到賠償"], 0, ""], [1214, 3, "3.3.3", "某些受商業火險保障的存貨因火警的濃煙而毀於一旦，這項損失︰", ["是不受保障的，因為濃煙並非受保危險", "是不受保障的，因為濃煙必然屬於除外危險", "是受保障的，因為有關摧毀是由受保危險引致的", "必然可獲保險人的賠償，但只能是同情的顯示"], 2, ""], [1215, 3, "3.3.4", "保險單：", ["從不更改近因原則", "通常排除應用近因原則", "可能包含更改應用近因原則的短句", "符合以上各項陳述"], 2, ""], [1216, 3, "3.3.4", "在保險索償中，近因法則是:", ["不可以由保單條款來修改", "往往可以由保單條款來修改", "有時可以透過保單條款來修改", "是絕對性的，不可經私人協議而修改"], 2, ""], [1217, 3, "3.3.4", "就保單的除外責任所採用的字眼規定某指明成因「直接或間接」所引致的損失\n皆是除外的，哪以下那幾項是正確?\ni)以上採用的字眼不能用於修改近因這項原則的應用\nii)與除外危險關係疏遠的損失也可能是除外的損失\niii)這有利於被保險人\niv)直接由除外成因引致的損失也是不受保障", ["i,ii", "ii,iii", "ii,iv", "i,iv"], 2, ""], [1218, 3, "3.3.4", "由於在賠償過程中通常都會牽涉\"近因\"的運用，所以:", ["要視乎保險人的決定", "可以由保單持有人提出證據便可以", "運用時可能會受到某些限制及頗為複雜", "需交由法院判決"], 2, ""], [1219, 3, "3.4", "以下哪兩項保險原理有相當密切的關係?\ni)彌償\nii)分擔\niii)近因\niv)最高誠信", ["i，ii", "ii，iii", "iii，iv", "i，iii"], 0, ""], [1220, 3, "3.4", "以下哪項保險原則與彌償沒有「直接」或「間接」的關係？", ["代位", "分擔", "可保權益", "最高誠信"], 3, ""], [1221, 3, "3.4.2", "人壽與人生意外保險都不受彌償的原則約束，因為:", ["人命是可以財務計算價值", "不可能以財務方法精確計算人命的", "保險人不願意作出十足的財務補償", "以上所以各項"], 1, ""], [1222, 3, "3.4.2", "一名男子在撞車意外中死亡。他有意外死亡保單的保障，同時他的汽車保單提\n供死亡權益。在這情況下：", ["兩份保單均需作出賠償", "只由最先生效的保單才需支付", "只由保額較大的保單才需支付", "由於是汽車意外，因此由汽車保單提供權益"], 0, ""], [1223, 3, "3.4.2", "一男子在人身意外保單和汽車意外保單中投保了意外死亡利益。如他在駕駛自\n己的汽車發生了意外而死亡:", ["每份保單必須賠償死亡利益全數", "僅僅首先生效的保單必須支付死亡利益", "僅僅提供較大保額的保單必須賠償", "既然死亡是由汽車意願導致，僅僅汽車保單須賠付"], 0, ""], [1224, 3, "3.4.2", "以下哪項不是一般業務的處理範圍:", ["計算彌償", "運用比例分攤", "計算及處理保單抵押貸款", "應用代位"], 2, ""], [1225, 3, "3.4.2", "利益保險不適用於彌償的原則，因為:", ["利益的定義是可大可細難以確定", "這是保險公司所定的法定條例", "利益保單是涉及人壽及人身意外故此是不適用", "彌償與利益保單是完全談不上"], 2, ""], [1226, 3, "3.4.2", "人壽及人身意外保單有時稱為「利益保單」，這是由於它們:", ["屬於人身保險，因此不受比例分攤的約束", "在正常情況下都能提供補償", "所提供的多於財務補償", "按本身支付的金錢，無須繳稅"], 0, ""], [1227, 3, "3.4.2", "彌償是一項重要的保險原理，它通常應用於以下哪種業務類別？", ["人壽保險", "火險", "人身意外保險", "以上所有各項"], 1, ""], [1228, 3, "3.4.2", "彌償原則一般不適用於以下哪項或哪些保險？", ["醫療開支保險", "汽車(本身損害保險)", "人身意外死亡利益保險", "以上各項皆是"], 2, ""], [1229, 3, "3.4.2", "如果一名持有多於一份人壽保險單的人士辭世，分擔是不適用於這些保單之間\n的，原因是：", ["它們並不保障相同的權益", "它們不受彌償的約束", "索償的近因相同", "這些保單可能由同一名保險人簽發"], 1, ""], [1230, 3, "3.4.2", "下列哪項最能解釋彌償？", ["補償", "精確賠償", "保單的實際保額", "保險標的實際價值"], 1, ""], [1231, 3, "3.4.2", "彌償只能出現於：", ["人壽保險保單之間", "提供收益的保單之間", "非提供彌償的保單之間", "提供彌償的保單之間"], 3, ""], [1232, 3, "3.4.2", "以下關於彌償說明，哪一項是不正確的？", ["它通常適用於非人壽保險的大多數險種", "它僅僅適用於所謂的「利益保單」", "它通常不適用於人身意外保險", "從根本上說，它意味著對承保損失的準確補償"], 1, ""], [1233, 3, "3.4.3", "作為在保險上的一項的重要原則，彌償同時與下列哪項或哪些保險原則有重要\n關聯？", ["代位", "分擔", "可保權益", "上述所有各項"], 3, ""], [1234, 3, "3.4.3", "彌償和可保權益這兩項保險原則：", ["在財務上有密切的關係", "兩項原則完全沒有關連", "在意向上完全相反", "是涉及損失的有效原因"], 0, ""], [1235, 3, "3.4.3", "一份恰當地安排的財產保險，於被保險的全損出現時，應可提供完全的補償。\n這項補償代表該名被保險人在有關財產上的權益，顯示彌償與以下哪一項的原\n則相連?", ["近因", "可保權益", "最高誠信", "以上所以各項"], 1, ""], [1236, 3, "3.4.3", "以彌償原則而言，在某些情況下可容許賠償的金額可超過實際損失，而並不包\n括:", ["人壽保險", "重置保險", "以新代舊保障", "約定價值保單"], 0, ""], [1237, 3, "3.4.3", "彌償與可保權益這兩項保險原則：", ["是完全相同的", "是毫不相干的", "與近因原則的關係非常密切", "皆有共同的基礎，因爲他們均涉及被保險人的財務權益"], 3, ""], [1238, 3, "3.4.4", "最為普遍，甚至在某些情況下是唯一的彌償方法?", ["以現金支付", "更換受保物品", "維修受破壞的受保物品", "將受保資產恢復原狀"], 0, ""], [1239, 3, "3.4.4", "以下哪項/哪幾項屬於提供彌償的方法？", ["恢復原狀", "更換", "現金支付", "以上各項皆是"], 3, ""], [1240, 3, "3.4.4", "更換一件受摧毀或失掉的受保物件時，可以作為一種提供彌償的形式，這種安\n排適合以下哪項情況?", ["每類型的索償", "僅限於汽車保險", "完全沒有或只有少許折舊的物件", "只有在盜竊是損失的近因時"], 2, ""], [1241, 3, "3.4.4", "以下哪項或哪些適用於修理受損財物作為提供彌償的方法？", ["玻璃保險", "法律責任保險", "非全損汽車賠償", "以上各項皆是"], 2, ""], [1242, 3, "3.4.4", "彌償最通常的方式是現金支付，其他方式包括？", ["更換", "修理", "恢復原狀", "以上各項皆是"], 3, ""], [1243, 3, "3.4.5", "作為計算彌償時予以考慮的一環，「損餘」應解作：", ["維修受損害物件時應付的金錢", "搶救涉及索償的物件的成本", "受到摧毀的保險標的剩餘部分", "剛出現損害前該物件的價值"], 2, ""], [1244, 3, "3.4.5", "損餘在保險公司運作上，通常:", ["保險人是用作量度損失的準確金額時特別留下部份", "與海上所指的救援費用同屬同一意思", "只限汽車殘駭上的應用", "無論任何情況下保險人只付一半賠償"], 0, ""], [1245, 3, "3.4.5", "在多數的財產保險索償中標的有時還有剩餘價值，該價值應於賠償給付中計算\n在內，稱為:", ["損餘", "分擔", "比例分攤", "代位"], 0, ""], [1246, 3, "3.4.5", "以下哪項對損餘的描述是不正確的?", ["向保險人交出標的，以索取全部損失賠償金額的慣例", "部分損失", "損毀標的的剩餘部分", "金額以下的任何損失，被保險人都得不到保障"], 3, ""], [1247, 3, "3.4.6", "以下哪項形容委付是正確的?", ["大多數出現在水險中", "於火險單中，通常剔除委付", "將損餘交付保險人", "以上各項"], 3, ""], [1248, 3, "3.4.6", "當被保險人提出索償時，將損餘部份交予保險人以換取索取全數賠償。可能在\n機緣巧合下，在出售損餘後的款項高於實質賠償的金額，那麼:", ["保險人便可賺取不俗的利潤", "盈餘須與被保險人以五五分賑形式分享", "這項事宜須呈予法庭解決", "盈餘須歸予被保險人"], 0, ""], [1249, 3, "3.4.6", "把保險標的委付給保險人，作為換取全損的賠償，一般多見於下列哪項保險?", ["人壽保險", "火險", "水險", "汽車保險"], 2, ""], [1250, 3, "3.4.6", "以下哪項或哪些對「委付」一詞的評論是準確的？", ["它在水險中較為普遍", "在多數火險保單中，它通常被明確列明不予考慮", "它是指向保險人交出保險標的", "上述所有各項"], 3, ""], [1251, 3, "3.4.6", "把受保財產的所有權交給保險人，以取得全損賠款的慣例稱為：", ["損餘", "轉讓", "代位", "委付"], 3, ""], [1252, 3, "3.4.6", "將某一損餘委付保險人，以取得全部的款項，這通常見於：", ["人壽保險", "海上保險", "火險", "汽車保險"], 1, ""], [1253, 3, "3.4.7", "在水險中，術語「海損」的意思是：", ["部分(非全部)的損失", "對不足額保險的懲罰", "吸引標準保費率的風險", "損失後標的的殘餘價值"], 0, ""], [1254, 3, "3.4.7", "有些保單條款允許多於嚴格彌償的賠償，以下哪項不屬於這個範圍之內?", ["比例分攤", "約定價值保單", "重置保險", "\"以新代舊\"保單"], 0, ""], [1255, 3, "3.4.7", "以下哪項對保單起賠額或免賠額的描述是正確的?\ni)兩種保單均減少瑣碎的索償\nii)兩種保單意味著相同的運作方式\niii)保單起賠額之保單會賠償全數損失如損失超過起賠額\niv)對少於起賠額的損失是不受保單的保障", ["i，ii", "i，iii", "i，iii，iv", "i，iv"], 2, ""], [1256, 3, "3.4.7", "以下哪項或哪些情況，限制彌償的法則的應用？", ["保單免賠額", "比例分攤的情況", "保單起賠(賠償額低於起賠額)", "以上各項皆是"], 3, ""], [1257, 3, "3.4.7(a)", "以下哪項對保險術語「比例分攤」的描述是不正確的？", ["在火險中，它是對不足額的懲罰", "在水險中，它的涵義與火險截然不同", "它是對保險額不足的懲罰，應用於各種類型的保險", "以上所有陳述皆不正確"], 2, ""], [1258, 3, "3.4.7(a)", "多種財產保險中的保單條款都規定，如果發生損失時不足額保險存在，保險人\n的責任便會按不足額的保險價值的百分比遞減，這一項條款通常稱為？", ["代位", "分擔", "比例分攤", "保單免賠額"], 2, ""], [1259, 3, "3.4.7(a)", "如果一份財產保險單被稱為「受比例分攤條件約束」，那麼它的意思是：", ["所代表的是一種標準風險，因此標準保費適用於該風險", "不足額保險是不重要的", "在任何情況下均不會對損失提供十足的支付", "如果保額足夠的話，便會對損失提供十足的支付"], 3, ""], [1260, 3, "3.4.7(a)", "保險中介人在建議客戶購買保險時，當提醒客戶應就投保額與標的物價值相若\n，因為：", ["若保額不足會引致拒賠", "確保保費物有所值", "賠償時，數額會受比例分攤所約束", "上述各項皆是"], 2, ""], [1261, 3, "3.4.7(a)", "在水險中，「海損(Average)」的含義是：", ["部分損失(全損以外的損失)", "不足保障額的懲罰", "超額賠償", "上述各項皆不是"], 0, ""], [1262, 3, "3.4.7(a)", "在香港處理財產保險的保險中介人，應該盡力確保客戶將要釐定的保額最低限\n度代表該財產的價值，因為如果有不足額保險出現的話：", ["該保額便告無效", "有關的被保險人須支付額外的保費", "任何索償相當可能受到比例攤分條款約束", "有關保險人在續保時可以拒絕繼續提供保險"], 2, ""], [1263, 3, "3.4.7(a)", "損失$6,000，有關保單保額$1,000,000，該保單包含比例分攤及保單限額為$8,\n000，如受保物件實質價值為$3,000,000。保險人賠償多少？保險人在賠償後出\n售損餘價值為$300，請問就損餘部分之價值分配多少被保險人？", ["$2,000；$0", "$2,000；$200", "$6,000；$0", "$2,000；$600"], 1, ""], [1264, 3, "3.4.7(a)", "一件意外發生，損失財產金額為4,000元，受火險的保額為1,000,000元並加入\n比例分攤條件及起賠額1,000元，實際的財產價值為4,000,000元，賣掉損毀的\n財產後得800元，被保險人可向保險人取得多少的賠償額？殘餘的餘額被保險人\n向保險人取回多少?", ["1000元，600元", "1000元，0元", "4000元，0元", "4000元，800元"], 0, ""], [1265, 3, "3.4.7(b)", "如果保單受x金額免賠額條約所約束，這就意味著:", ["如果損失超過x金額，得不到任何賠償", "除非損失超過x金額，否則得不到任何賠償", "超過x元的損失保險人全額賠償", "保單保額受x元限制"], 1, ""], [1266, 3, "3.4.7(b)", "假設保單的免賠額是X，下列哪項有關的陳述是正確的？", ["被保險人的首X損失將不獲保障", "索償時會獲得最高X的賠償", "索償超越X時，將獲全數賠償", "被保險人需付額外X保費"], 0, ""], [1267, 3, "3.4.7(b)", "免賠額與起賠額的分別，在於超過(或不低於)x損失的金額時:", ["超過x的免賠額，保險人支付十足的保障", "超過x的起賠額，保險人支付十足的保障", "超過x的免賠額，保險人收取額外x保費的要求", "超過x的起賠額，保險人收取額外x保費的要求"], 1, ""], [1268, 3, "3.4.7(b)", "在彌償中，下列哪些條件有時意味著比應予賠償為少的金額?\ni)保單免賠額\nii)保單起賠額\niii)約定價值保單\niv)水險保單", ["i，ii", "i，iii", "ii，iii", "iii，iv"], 0, ""], [1269, 3, "3.4.7(c)", "如果把水險保單描述為具有5%的起賠額，這意味著：", ["每項受保損失的5%全額賠償", "受保損失是保額的6%即全額賠償", "損失超過保額的5%，那麼5%是免賠的", "超過起賠額5%的損失得不到保單保障"], 1, ""], [1270, 3, "3.4.8", "下列哪項及哪些保單的保障，可以提供超越彌償的索償結清：", ["定值保單(水險)", "重置保單(火險)", "約定價值保單(非水險)", "以上所有各項"], 3, ""], [1271, 3, "3.4.8", "有些保單條款允許多於嚴格彌償的補償，以下哪項是不涉及範圍之內?", ["比例分擔條件", "約定價值保單", "重置保險", "以新代舊的保單保障"], 0, ""], [1272, 3, "3.4.8", "一幢樓宇在地震倒塌時已使用二十年，它受到一份火險及其他附加條款保障，\n得到保險人賠付樓宇重建的成本，而不扣減損耗，此類屬於哪種保險：", ["「以新代舊」形式", "不扣減形式", "約定價值", "重置保險"], 3, ""], [1273, 3, "3.4.8", "一部電視機受火災損害時已經使用五年之久，損失維修費用$5,000，有關家居\n保險人全數支付，由此可推斷該保險由以下哪項訂立？", ["「以新代舊」方式", "商業重置保險", "恢復原狀方式", "約定價值方式"], 0, ""], [1274, 3, "3.4.8", "重置保險，「以新代舊」保障，約定價值保單及水險保單之共通點是：", ["不受彌償限制", "同樣提供超越彌償", "同樣適用於所有業務", "跟彌償沒有關係"], 1, ""], [1275, 3, "3.4.8", "保單的賠償額已決定，當損失出現時，保單就會承擔這個金額，這種賠償方式\n稱為:", ["重置保險", "以新化舊", "約定價值", "水險保單"], 2, ""], [1276, 3, "3.4.8", "下列哪項有關約定價值保單是正確的？\ni)折舊是最大的考慮因素\nii)保額視乎專家的估價\niii)這類保單可以用於價值較高的物件上，例如藝術作品\niv)當出現全損時，保單就會承擔專家估價的保額再扣除當時的折舊率", ["i,ii", "i,iii", "ii,iii", "iii,iv"], 2, ""], [1277, 3, "3.4.8", "大部分水險為「定值」保單，當發生事故時，賠償額是怎樣介定的?", ["貶值，磨損貶值，折舊及損耗往往被扣除", "於索償的被保險人必須提出財產的價值証明", "如果財產如其價值，可以得到十足的賠償", "不論財產是否如其價值，都可以得到約定金額的賠償"], 3, ""], [1278, 3, "3.4.8", "一份海上船體保單的承保表是這樣寫的：「保額$1,000,000；約定價值$1,000,\n000」，意味着：", ["當一項損失發生時，保額是賠償金額", "該約定價值將被視為損失時的實際價值，但只限於全損索償目的", "約定價值一律被視爲損失時的實際價值", "這是一份重置保險"], 2, ""], [1279, 3, "3.5", "代位和分擔有近似的目標，它們都是：", ["它們都有兩份保單", "每份保單都有共同的保障", "保險人向引致疏忽的人作出追討賠償", "賠償額不能大於彌償"], 3, ""], [1280, 3, "3.5", "以下哪種情況，分擔原則不大可能被保單條款修改:", ["限制保單按特定比例支付金額", "刪除更具體受保物件的保障", "取消分擔按金額全數支付", "有其他保單提供彌償，取消保障"], 3, ""], [1281, 3, "3.5", "分擔屬於下列哪項的重要原則之一?", ["代位", "彌償", "委付", "損餘"], 1, ""], [1282, 3, "3.5", "代位及分擔有近似的目標，它們都是:", ["它們都有兩份保單", "每份保單都有共同的保障", "保險人向引致疏忽的人作出追討賠償", "賠償額不可能大於彌償"], 3, ""], [1283, 3, "3.5.1", "保單持有人購買了一份意外死亡保險及汽車意外保險。若保單持有人在一次汽\n車意外中死亡，以下哪項索償是正確的？", ["僅僅是首先生效的保單", "僅僅是最大保額的保單", "兩份保單也會作出賠償", "由於是在汽車意外死亡，故只有汽車意外保險作出賠償"], 2, ""], [1284, 3, "3.5.1", "如果發現保單持有人持有兩份保單來保障自已的財產(例如:盜竊)，合法的情況\n應該是:", ["他有權接受兩份賠償", "因為這可能是欺詐，他將得不到任何賠償", "僅僅是他投保的第一個保險人必須賠償損失", "兩個保險人將得到最終分擔提供彌償的責任"], 3, ""], [1285, 3, "3.5.1", "在「海上保險條款」中，關於「重覆保險」一項術語，這一項普通法的原則，\n並與以下哪項原則有關:", ["彌償", "代位", "分擔", "可保權益"], 2, ""], [1286, 3, "3.5.1", "如果被保險人投買了兩份保障相同損失的火險保單，對賠償分配的有關原則為:", ["分擔", "可保權益", "最高誠信", "彌償"], 0, ""], [1287, 3, "3.5.1", "在重複保險上，以下哪項不應出現分擔原理？", ["火險", "盜竊保險", "人身意外保險中的人壽利益部份", "以上各項皆是"], 2, ""], [1288, 3, "3.5.1", "假設銀行借錢給\"A\"購買物業，不尋常地，該銀行對該物業的權益購買保險保障\n，而\"A\"亦按照其意志投買保險，如果投保損失發生:", ["按照分擔原則，兩名保險人各自賠償50%", "分擔原則不適用，因不是保險相同的權益", "A的保單將作出賠償，因他是物業的真正擁有者", "銀行的保單將作出賠償，因為借貸協定給它優先權"], 1, ""], [1289, 3, "3.5.3", "分擔必須符合以下那些條件：\ni.每張保單必須對有關損失提供彌償\nii.每張保單必須保障相同的保險標的\niii.每張保單必須保障相同危險所導致的損失\niv.每張保單必須保障相同的財務利益", ["i,ii,iii", "i,iii,iv", "ii,iii,iv", "i,ii,iii,iv"], 3, ""], [1290, 3, "3.5.3", "分擔的產生，必需符合以下哪項條件？", ["每份保單都保障了受影響的權益", "每份保單都保障了那個引致了損失的危險", "每份保單都保障了受影響的保險標的", "以上各項皆是"], 3, ""], [1291, 3, "3.5.3", "A向X保險人購有汽車第三者保險，B向Y保險人購有汽車第三者保險，當\nA車撞B車，分擔原則並不適用，是因為：", ["兩者不是保障相同的標的物", "兩者是由不同的保險人發出的保單", "這是違法的", "B不希望損失「無索償折扣」"], 0, ""], [1292, 3, "3.5.4", "分擔的原則只會應用在：", ["人壽保險合約之間", "提供利益的合約之間", "非提供彌償的保險合約之間", "提供彌償的保險合約之間"], 3, ""], [1293, 3, "3.5.4", "人壽及人身意外保單有時稱為「利益保單」，這是由於它們：", ["在正常情況下不能提供彌償", "所提供的多於財政補償", "按本身支付的金錢毋須繳稅", "屬於人身保險，因此不受比例分攤的約束"], 3, ""], [1294, 3, "3.5.4", "如果發現保單持有人有兩份保險提供財產上的保障(例如:盜竊)，以下哪情況是\n正確的？", ["保單持有人可以得到雙賠的賠償", "因為可能涉及詐騙，兩份保單都不會作出賠償", "第一份購買的保單會承擔所有的賠付", "兩份保單會以共同分擔賠付"], 3, ""], [1295, 3, "3.5.5", "一份有分擔成份的保單，保險人可以怎樣更改此分擔條款？", ["在保單中，加入免分擔條款", "限制個別保險人在損失上的分擔比例,例如：某個百分比", "讓保險人向其他保險人尋找分擔機會", "以上各項皆正確"], 3, ""], [1296, 3, "3.5.5", "以下那項條款是指「把保險人的責任限於它對損失的比率份額」？", ["免分擔條款", "比率之數條款/分擔條款", "代位權", "更具體受保條款"], 1, ""], [1297, 3, "3.5.5", "當發生一項$1,000,000的財產損失，當中出現重複保險。此保單的全損為$30,0\n00,000，另設有單一物件限制$5,000。這次總賠償金額為$995,000，這顯示以\n下哪項所述是正確的?", ["所有其他有關保單都有分擔條款", "這份保單有分擔條款", "這份保單有比例分攤條款", "所有有關保單均有比率之數條款"], 1, ""], [1298, 3, "3.5.5", "衡平法中的分擔法則，可以利用保單條文按照以下哪項或哪幾項來修改？", ["保單中加入免分擔法則", "使任何其他現存保險毋須為有關損失賠償", "保險人的總額限制在有關損失的一個份額比例", "A和C也正確"], 3, ""], [1299, 3, "3.5.5", "非海上保單的分擔條件：", ["該保單不適用分擔", "把保險人的法律責任限制於他在損失中的比率之數", "如果涉及重複保險，該保單便可使無效", "該保單不可以尋求其他保單進行分擔"], 1, ""], [1300, 3, "3.5.5", "一個家居保險可能有「更具體受保」的物件，是以下那個例子：", ["保証條款", "免分擔條款", "分擔條件", "隱含保單條件"], 1, ""], [1301, 3, "3.5.5", "購買火險中，可能包含一項海上條款，其含意是：", ["受到水險的保障下，不可與火險單作出分擔賠償", "貨物在近水的倉庫儲存均受到保障", "水險保單均可與火險保單共同作出賠償", "上述所有各項皆不是"], 0, ""], [1302, 3, "3.5.5", "一份商業火險保險單含有所謂的「海上條款」，這條款的主要目的是：", ["豁免承保儲存在碼頭旁邊倉庫裡的財產", "避免和任何足額水險分擔", "確保任何承保了有關財產的現有水險無效", "如果有水險保單也承保了有關財產，就可以完成避開火險保單"], 1, ""], [1303, 3, "3.6", "容許已提供彌償的保險人，為本身的利益承繼並使用其被保險人對第三者的權\n利的保險原則為：", ["代位", "分擔", "重複保險", "最高誠信"], 0, ""], [1304, 3, "3.6", "以下哪種情況會在第三者一方的疏忽後，出現代位的權利?", ["被保人的辭世(人壽保單)", "被保險的建築物受到損害(火險)", "被保險人遭受嚴重傷害(人身意外保單)", "以上所有各項"], 1, ""], [1305, 3, "3.6.1", "一宗撞車意外因為第三者疏忽而引起，在此情況下，請問「代位」在下列哪一\n項保險適用?", ["人壽保險", "意外保險", "汽車保險", "以上所以各項"], 2, ""], [1306, 3, "3.6.2", "在下列哪項或哪些中，可以出現代位權：", ["侵權法下", "損餘下", "法規上", "以上任何一種途徑"], 3, ""], [1307, 3, "3.6.2", "代位權的出現，是由第三者疏忽地對受保財產造成損毀，並且該財產的保險人\n承繼對疏忽人士行使法律權利。技術上，此代位權是來自:", ["侵權法", "法規下", "分攤", "因他人的行為疏忽而負上責任"], 0, ""], [1308, 3, "3.6.2", "當第三者一方出現疏忽後，下列哪項情況不會產生代位？", ["被保險人辭世﹝壽險保單﹞", "受保財產的損害﹝火險保單﹞", "受保汽車的摧毀﹝汽車保險單﹞", "上述所有各項"], 0, ""], [1309, 3, "3.6.2", "一名僱員補償保險人巳向受害僱員作出賠償，在一項條款下可向疏忽的第三者\n索償，這是基於：", ["在侵權法上產生的代位權", "在合約上產生的代位權", "在法規下產生的代位權", "在損餘中產生的代位權"], 2, ""], [1310, 3, "3.6.2", "代位如何出現?\ni)在侵權法上\nii)在合約上\niii)在法規下\niv)在損餘中", ["i，ii，iii", "i，ii，iv", "ii，iii，iv", "i，ii，iii，iv"], 3, ""], [1311, 3, "3.6.2", "代位的出現，大部份由於第三者疏忽地對受保財產造成損毀，並且該財產的保\n險人相繼向疏忽的人士行使法律權利。技術上，這意味著代位來自：", ["侵權法", "法規", "分擔", "因他人行為而須負上的責任"], 0, ""], [1312, 3, "3.6.4", "就保險而言，普通法規定當提提供彌償後，可取得代位權。非水險保單條件：", ["從不可改變普通法的規定", "在法律上不得更改普通法的規定", "只當就索償結清達成後方給予保險人代位權", "通常即時給予保險人代位權，以便馬上展開追償行動"], 3, ""], [1313, 3, "3.6.4", "在普通法中，只有在給予彌償之後才可取得代位權，而保單的條件通常:", ["說明要在理賠後才可取得代位權", "說明保險人可即時取得代位權", "說明任何時候不可取得代位權", "說明只有被保險人可擁有代位權"], 1, ""], [1314, 3, "3.6.4", "對於一隻購買了全險的指環，在遺失後按照保額的5萬元如數結清。該指環稍後\n時間尋回並以6萬元售出。在代位的原則下，該1萬元的利潤：", ["屬於保險人", "屬於被保險人", "由保險人及被保險人平均分享", "給付由保險人指明的慈善機構"], 1, ""], [1315, 3, "3.6.4", "建築商就一意外向一架私家車擁有人支付$13,000,000。因為一項每宗責任事故\n限額的應用，該名私家車司機只有向其責任保險人取得保險金$12,000,000。如\n果保險人後來向第三者追回$7,000,000，請問誰有權取得這筆錢?又怎樣分這筆\n金額?", ["保險人佔$7,000,000，被保險人沒有份兒", "保險人沒有份兒，被保險人$7,000,000", "保險人佔$6,000,000，被保險人$1,000,000", "保險人佔十三分之十二，被保險人佔十三分之一"], 2, ""], [1316, 3, "3.6.4", "一項損失發生了，金額為$4,000，爲此提供保障的火險保單為$1,000,000,其中\n包括了一項比例分擔條款及金額為$8,000的單一物件限額。在損失發生時，財\n產的價值為$4,000,000,保險人根據保單條款作出賠償，其後保險人把受毀的財\n產賣掉，取得$800。究竟保險人向被保險人作出了多少賠償？在處理受毀財產\n時，就剩餘價值（如有的話）向被保險人給付多少錢？", ["$1,000及$0", "$1,000及$600", "$4,000及$0", "$4,000及$800"], 1, ""], [1317, 3, "3.6.4", "在委付及給予彌償後，保險人應如何處理售賣損餘中得到的利潤？", ["將利潤歸還保單持有人", "保險人和保單持有人五五分帳", "利益歸保險人", "保險人不可售賣損餘"], 2, ""], [1318, 3, "3.6.4", "在代位的補償上，如何處置因向第三者索取的多餘款項?", ["屬於被保險人", "屬於保險人", "運用比例分攤", "由保險人及被保險人平均分享有"], 0, ""], [1319, 3, "3.6.4", "一項損失發生，沒有重複保險的存在，但受保單免賠額的限制，保險人只負責$\n6,000的損失賠付$5,000，後來因代位權成功向疏忽的第三者追討$1,000，問誰\n有權取得賠償？金額是多少？", ["被保險人可獲得$1,000，保險人沒有", "保險人可獲得$1,000,被保險人沒有", "保險人可獲得追討金額的1/6,被保險人可獲得追討金額的5/6", "被保險人和保險人各可獲得追討金額的一半"], 1, ""], [1320, 4, "4.11", "對於培訓及發展部門，以下哪項的描述是正確的？\ni.培訓對於內勤及外勤的員工同樣重要\nii.它必須與公司的需要配合\niii.它必須由非職員提供\niv.資源及紀錄對提高該部門的運作效率是非常重要的", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 1, ""], [1321, 4, "4.1", "一般新產品\"具有競爭力壽命\":意思是指?", ["幾年後完結", "保單期完結時完結", "產品被其他保險公司複製後完結", "無限的"], 2, ""], [1322, 4, "4.2", "客戶服務是保險公司的主要功能，建立公司形象屬於哪種職責範圍?", ["聯絡", "公共關係", "文件的提供", "投訴"], 1, ""], [1323, 4, "4.1", "產品開發是保險公司的重要功能，原因是:", ["產品開發有助於確保公司的財務穩定", "香港有着競爭激烈的營商環境", "可以看出，由於在過去幾年中保險監管框架的迅速變化，保險產品很快就過時了", "必須根據不斷變化的法規要求對強制性保險單進行頻繁的修訂"], 1, ""], [1324, 4, "4.1", "產品開發是保險公司的重要功能，原因是:", ["產品開發有助於確保公司的財務穩定", "由於信息技術出現，保險產品很快就過時了", "客戶對保險的需求不斷改變", "新產品往往被競爭對手完全複製，因保險產品並沒擁有知識產權"], 3, ""], [1325, 4, "4.9", "以下哪項就精算支援的描述是正確的?\ni.《保險業條例》要求所有保險人必須委任一名合資格並被保監局接納的精算\n師\nii.精算師的主要職責是對所有資產及負債進行評估\niii.人壽保險及一般保險業務都需要精算支援\niv.精算支援負責估算所需的未決申索儲備金", ["i,ii,iii", "i,ii", "ii,iii,iv", "i,ii,iii,iv"], 2, ""], [1326, 4, "4.10", "以下哪項不大可能屬於會計及投資部門的職能範圍？", ["保存財務紀錄", "專業持續發展", "監察應收的金錢", "確保有效地支付款項"], 1, ""], [1327, 4, "4.11", "下列哪項或哪些涉及培訓及發展部的描述是正確的?\ni)培訓公司內部人員和外勤職員\nii)顯然與公司公持續發展相配合\niii)須由非職員主理培訓\niv)培訓設施及進度記錄對提高部門效率", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 1, ""], [1328, 4, "4.12", "關於管控要員，以下哪項陳述是正確的？", ["由保險人委任", "須取得保險業監管局的認可", "為適當人選", "以上各項皆是"], 3, ""], [1329, 4, "4.12", "保險中介人相當可能與擔當保險中介管理管控職能的管控要員互動，而所謂中\n介管理管控職能不包括：", ["管理相關保險人所委任的保險代理人", "跟進保險代理人業績", "監督保險代理人遵守《保險業條例》的情況", "確保保險業務合規"], 1, ""], [1330, 4, "4.12", "保險人必須先取得保險業監管局的認可，方可委任＿＿＿＿？", ["管控要員", "公司的財務經理或財務行政人員", "精算部門的職員", "理賠部門的職員"], 0, ""], [1331, 4, "4.1", "以下哪些項目有機會屬於產品開發部的功能？\ni)個別產品開發\nii)產品組合開發\niii)產品研究\niv)巿場趨勢", ["i,ii,iii", "i,ii,iv", "ii,iii,iv", "i,ii,iii,iv"], 3, ""], [1332, 4, "4.1", "對於保險人，產品的開發：", ["是一種延續不斷的過程", "對大型保險人來說是沒有必要的", "對強制性的業務來說是沒有必要的", "在敲定了保單的用字後便不再需要"], 0, ""], [1333, 4, "4.1", "下列哪項業務較可能與產品開發部有關?\ni)公共關係\nii)產品研究\niii)產品組合開發\niv)個別產品開發", ["i,ii", "iii,iv", "i,ii,iii", "ii,iii,iv"], 3, ""], [1334, 4, "4.1", "產品研究應將焦點放在：", ["本身的產品而已", "競爭對手的產品而已", "本身及競爭對手的產品", "本身及競爭對手的產品，以及市場的趨勢"], 3, ""], [1335, 4, "4.1", "以下哪項有關全新產品「具有競爭力的壽命」的描述是正確的？", ["非常短，通常只有幾個星期或幾個月", "大約一年", "在競爭對手把焦點集中在新的保險產品之前，至少兩年時間", "非常之長"], 0, ""], [1336, 4, "4.1", "市場上以「組合」形式推出的產品很多，這是屬於產品發展的什麼過程?", ["個別產品的開發", "產品組合的開發", "產品的研究", "獨立產品的開發"], 1, ""], [1337, 4, "4.1", "以一籃子形式出現的保險開發，尤其針對大型客戶而設的，可以理解為：", ["產品開發", "產品集體開發", "團體開發", "產品組合開發"], 3, ""], [1338, 4, "4.1", "保險公司的產品開發部門，主要發展產品是針對以下列哪項？", ["原有產品", "市場趨勢", "競爭對手的產品", "以上各項"], 3, ""], [1339, 4, "4.2", "客戶服務部若以職能界定來說也稱為：", ["顧客服務部", "客戶投訴部", "客戶諮詢中心", "顧客溝通及投訴"], 0, ""], [1340, 4, "4.2", "以下哪三方面有可能屬於客 裁決條件\niv涉案保險人已對涉案保險人已對索償爭議作出了最終決定", ["ii,iv", "i,ii,iv", "i,iii", "ii,iii,iv"], 0, ""], [1462, 6, "6..1.1e", "《與有關公司安排再保險的指引》之所以重要，原因是:", ["當再保險人與某保險人有關連的時候，所作出某項再保險安排不足時，會如何處理", "保險人對其再保險安排作出審慎監控", "當再保險人與某保險有關連的時候，保險人對其再保險安排時須向保監局提出報告", "當再保險人與某保險有關連的時候，保險人對其再保險安排時須得到保監局"], 0, ""], [1463, 6, "6.2.5(f)(ii)", "批准\n以下哪項有關《持牌保險經紀操守守則》一般原則2–\n以符合客戶的最佳利益行事並公平對待客戶的描述是正確的？", ["在推薦保險產品予客戶前，應從充足範圍的不同保險人處，尋找及選擇充足範圍並可供選擇的保險產品，而該等產品是適合其客戶情況", "應採取合理步驟，準確及時地執行客戶的指示", "應就其進行的受規管活動保存妥善的紀錄，以遵守所有適用的法律", "應有足夠的管控及保障，以防止未經授權存取客戶資產"], 0, ""], [1464, 6, "6.2.5(f)(ii)", "根據《持牌保險經紀操守守則》一般原則7–\n持牌保險經紀應盡其最大努力避免利益衝突，持牌保險經紀應披露以下哪項以\n避免潛在利益衝突？", ["保險人收取的保費", "保險人支付的報酬", "保險人的其他產品", "保險人的償付準備金"], 1, ""], [1465, 6, "6.1.1e", "《保險業條例》對獲授權保險人有關再保險安排的規管有何要求?", ["規定了最低和最高標準", "只適用於一般業務而已", "刻意訂得較有彈性（只描述為「足夠的」）", "根據上一年度保費收入而變化"], 2, ""], [1466, 6, "6.1.1e", "《與有關公司安排再保險的指引》很重要，因為：", ["該指引令核數師很頭痛", "高級管理人員會疏於管理", "當再保險人與某保險人有關連的時候，姊妹公司會私相授授", "當再保險人與某保險人有關連的時候，相關公司會對其再保險安排應行的審"], 3, ""], [1467, 6, "6.1.1d", "慎監控可能會流於鬆懈\n根據保險業條例的條文，需事前取得保險業監管局認可才可委任：", ["獲授權⾧期業務保險人的精算師", "任何保險中介人", "精算部門的職員", "理賠部門的職員"], 0, ""], [1468, 6, "6.1.1d", "根據保監局之要求，獲授權之保險人的管控要員須符合其擔任職位之適當人選\n的要求，就判斷該人是否適當人選，有多項考慮因素，包括：", ["該人是否有能力理解最高誠信之原則", "該人是否有能力公正行事", "該人經營的任何其他業務（保險業務除外）的狀況", "任何當局針對該人的任何訴訟"], 1, ""], [1469, 6, "6.1.1f", "在某些情況下，保險業監管局現在可以披露某些財務和統計資料，然而，不得\n披露個別保單持有人的這種資料，除非：", ["在涉及欺詐時", "在明確的法律程序下", "在有關保單持有人死亡之後", "在保單持有人被宣佈破產時"], 1, ""], [1470, 6, "6.2.4", "個人持牌人承擔並非與進行受規管活動有關的責任，該等責任是否將會引致利\n益衝突，涉及甚麼領域?", ["可靠程度", "勝任能力", "財政狀況", "其他事宜"], 1, ""], [1471, 6, "6.2.5", "持牌保險經紀須遵守任何適用於保險經紀的法律，這是關於哪個領域？", ["準確的陳述及介紹", "合規", "騷擾、強迫或不當影響", "勝任提供意見"], 1, ""], [1472, 6, "6.1.3c", "以下哪項有關索償投訴是不屬於保險投訴局的職務範圍？", ["發現沒有保證退保價值，客人投訴保險人於銷售過程中隱瞞沒有保證價值此事實", "保險人未有及時將續保條款及時通知保單持有人的投訴", "保險人收取過高保費，猶如比客人實際年齡大了10歲，客人投訴於銷售的過程中沒有驗證其真實年齡", "年金購買人投訴該保險人，根據錯誤計算支付較低的退保價值，導致損失了"], 1, ""], [1473, 6, "6.1.3b", "有關的保單利息\n保險索償投訴委員會能處理以下的個案：", ["投訴人於保險人通知最終賠償決定的日期起計九個月後提出的投訴", "有關無索償折扣的投訴", "十萬港元的個人財產保險索償（全險）", "正在進行中的仲裁索償"], 2, ""], [1474, 6, "6.1.3c", "以下哪項與索償無關的個案屬保險投訴局的職權範圍?\ni.一項涉及100,000港元的保單爭議金額\nii.已就該糾紛個案進入法律程序\niii.保險人收取過高保費，猶如比客人實際年齡大了10歲，客人投訴於銷售的\n過程中沒有驗證其真實年齡\niv.對保險人派發紅利金額的投訴，客人聲稱銷售過程中承諾該保單是屬於「抗\n通脹保單」", ["i,ii", "i,ii,iv", "ii,iii", "i,iii,iv"], 3, ""], [1475, 6, "6.1.3b", "以下哪項與索償有關的個案屬保險投訴局的職權範圍?\ni.100,000港元個人保單索償\nii.因違反保單條款，300,000港元家居保險索償爭議\niii.涉及汽車保險的無償折扣糾紛\niv.汽車全險中涉及10,000港元的玻璃保險索償", ["ii,iii", "i,ii,iv", "i.ii", "i,iii,iv"], 1, ""], [1476, 6, "6.1.1g", "以下哪些《2015年保險公司（修訂）條例》就保險業監管局新增的年修訂條例\n》下新增的規管權力？", ["對新業務的限制", "撤銷保險人的授權", "限制保費收入", "以上各項皆是"], 1, ""], [1477, 6, "6.1", "根據《2015年保險公司（修訂）條例》，下列哪項是保險業監管局成立的政策\n目標？\ni.就影響保險業的事宜，進行研究\nii.提升保險業界在環球保險業市場的競爭力\niii.協助特區行政長官維持香港金融穩定\niv.提高保單持有人對保險產品和保險業的了解", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 1, ""], [1478, 6, "6.2.4", "持牌個人保險代理應就其可能進行受規管活動的各類保險產品的性質及主要特\n點，以及所承保及其相關的風險有充分了解，屬於哪個領域?", ["產品知識", "合適性", "清楚其知識的局限性", "利益衝突"], 0, ""], [1479, 6, "6.2.4", "以下哪項是持牌保險代理人根據《持牌保險代理人操守守則》進行受規管活動\n時採取及遵從的行為準則?", ["持牌保險代理人只可以現金方式支付的保費款項", "持牌保險代理人只可以收取已經逾期的保費", "持牌保險代理人須獲得其客戶授權才可以收取保費款項", "以上各項皆不是"], 3, ""], [1480, 6, "6.1", "根據《2015年保險公司（修訂）條例》，下列哪項不是保險業監管局成立的政\n策目標？\ni.確保保險業的規管架構與時並進，促使保險業的高速發展\nii.確保保險業的償付準備金與國際慣例看齊\niii.就保險業採取適當措施，穩固香港的國際保險中心地位\niv.為保單持有人提供更佳的保障", ["i,ii,iii", "i,iii", "iii,iv", "ii,iii,iv"], 0, ""], [1481, 6, "6.2.4", "保監局評估某人是否屬於適當人選時，就保險公司的控權人、合夥人、董事或\n負責人以及獲委任精算師有甚麼考慮因素?\ni.該人的學歷、或其他資歷或經驗\nii.是否有能力稱職地、誠實地並公正地進行受規管活動\niii.該人的信譽、品格、可靠程度和誠信\niv.該人的財政狀況或償付能力", ["i,ii", "i,iii,iv", "iii,iv", "i,ii,iii,iv"], 3, ""], [1482, 6, "6.1.2(d)", "以下哪項不是承保商專業守則第四部分關於保險代理人管理需加強注意的?", ["對保險代理人提供的酬勞", "建立機制處理對保險代理人的投訴", "確保保險代理人在職務上得到足夠的支援", "以上各項皆是"], 0, ""], [1483, 6, "6.1.3a", "委派保險索償投訴委員會的是:", ["保險業監管局", "政府", "保險業聯會", "保險投訴局"], 3, ""], [1484, 6, "6.1.2", "以下哪項是承保商專業守則的描述是正確的?", ["列明保險中介人八大操守原則", "由香港保險監管局執行", "列明保險代理管理的優良保險做法", "以上各項皆是"], 2, ""], [1485, 6, "6.1.2", "以下哪項是承保商專業守則的描述是正確的?", ["由香港保險業聯會執行", "列明保險中介人八大操守原則", "保險人的資本規定", "以上皆是"], 0, ""], [1486, 6, "6.1.2", "有關承保商專業守則，誰有責任令保險代理人遵守其法律?", ["保險監管局", "保險業聯會", "保險監管機構", "委任代理人的保險人"], 3, ""], [1487, 6, "6.1.1f", "於香港的一般業務保險人必須就其從香港保險業務所產生的負債在香港維持正\n資產，以下哪項就所需數額計算的描述是正確的?\ni.計算保險人的負債額（即未經扣除再保險所保的那部分）\nii.必須根據香港精算學會3種訂明匯算方法的其中一種方法計算\niii.計算保險人的淨負債額（即已經扣除不保損失的部分）的80%\n及有關數額加起來\niv.所需數額以訂明的兩種匯算方法之一計算", ["i,ii,iii", "ii,iv", "ii,iii,iv", "i,iv"], 3, ""], [1488, 6, "6.1.1(d)", "《獲授權保險人的公司管治指引》的目的是:", ["須備有足夠的再保險安排", "誠實的保險計算", "保障投保大眾的利益", "有效的公司治理"], 3, ""], [1489, 6, "6.2.4", "以下哪項是持牌保險代理機構的主要發牌條件?", ["申請人不可以是獨資經營", "申請人並非持有個人保險代理牌照", "申請人獲最少4名獲授權保險人委任為代理人", "申請人不可以是合夥經營"], 1, ""], [1490, 6, "6.1.1f", "為更有效規管保險人名保單持有人的利益，以下哪項是《2015年修訂條例》下\n獲賦保監局新增的規管權力?", ["進行查察、展開調查及向獲授權保險人施加罰款的權力", "命令一個保險集團的每個成員委任獨立審計師的權力", "命令保險人以審計署作為審計師的權力", "進行查察及對未應健全承保政策的保險人展開調查及向獲授權保險人施罰款"], 0, ""], [1491, 6, "6.1.3", "的權力\n以下哪項是保險投訴局的描述是正確的?", ["2018年成立取代保險索償投訴局", "處理保單屬非金錢性質的投訴個案", "只能處理保單屬非索償相關的投訴個案", "所有在香港從事個人保險業務的獲授權保險人可自願申請成為保險投訴局的"], 0, ""], [1492, 6, "6.1.1", "會員\n以下哪項關於保險業條例的描述是正確的?", ["保險業條例原稱保險投訴條例", "於2015年獲保監局通過", "2017年5月改稱為保險公司條例", "涵蓋保險人及保險中介人的規管"], 3, ""], [1493, 6, "6.1", "立法會已制定什麼法例，改革保險業的規管制度?", ["2015年保險公司（修訂）條例", "2015年保險業監管局條例", "2015年保險從業員條例", "2015年保險業（修訂）條例"], 0, ""], [1494, 6, "6.1", "根據《2015年保險公司（修訂）條例》，保險業監管局成立的政策目標是甚麽\n？", ["確保保險業的規管架構與時並進，促使保險業的高速增長", "確保保險業的規管架構與時並進，促進保險業的穩健發展", "建立一個保險中介人的法定發牌制度，補充自律規管制度", "以上皆不是"], 1, ""], [1495, 6, "6.1", "下列那項屬於保險業監管局根據保險業條例承擔的職能或任務？", ["制訂規管保險業的有效策略", "對保單持有人提供直接保障", "促進保險業市場的高速發展", "擴大先前所制定的監管制度從而覆蓋所有每天聯繫客戶的保險從業員"], 0, ""], [1496, 6, "6.1", "下列那項屬於保險業監管局根據保險業條例承擔的職能或任務？", ["對保單持有人和潛在保單持有人提供直接保障", "促進保險業市場的高速增長", "提高保單持有人和潛在保單持有人對保險產品和保險業的了解", "擴大先前所制定的監管制度從而覆蓋所有每天聯繫客戶的保險從業員"], 2, ""], [1497, 6, "6.1", "下列那項屬於保險業監管局根據保險業條例承擔的職能或任務？", ["對保單持有人和潛在保單持有人提供直接保障", "促進保險業市場的高速增長", "透過新的發牌制度，規管保險中介人的操守", "擴大先前所制定的監管制度從而覆蓋所有每天聯繫客戶的保險從業員"], 2, ""], [1498, 6, "6.1.1", "《保險業條例》涵蓋包括：\ni)保險代理人\nii)保險經紀\niii)保險人\niv)所有為保險公司工作的人士", ["i,ii,iv", "i,ii,iii", "i,iii,iv", "ii,iii,iv"], 1, ""], [1499, 6, "6.1.1b", "專屬自保保險人的實繳股本最低要求為：", ["200萬港元", "500萬港元", "800萬港元", "1000萬港元"], 0, ""], [1500, 6, "6.1.1f", "償付準備金的計算方法為:", ["保險人的流動資產除以流動負債", "保險人的流動資產減去流動負債", "保險人的資產減去負債", "以上都不是"], 2, ""], [1501, 6, "6.1.1c", "保險公司必須持有至少相當於「有關數額」的最低償付準備金額。就一般保險\n業務，當中的計算準則是根據「未決申索」數額，及以下哪一項數額計算，以\n較大者為準?", ["已付索償", "保費收入", "未賺保費", "已賺保費"], 1, ""], [1502, 6, "6.1.1c", "以下哪幾項有關保險公司的償付準備金規定的描述是正確的?\ni.償付準備金至少相當於「有關數額」\nii.經特別申請及批准後，可以降低償付準備金額\niii.一般業務及長期業務保險人有不同的計算準則\niv.專屬自保保險人有另一套適用的計算準則", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 2, ""], [1503, 6, "6.1.1d", "根據《保險業條例》獲授權保險人委任此等人員之前，必須取得保監局的認可?", ["任何保險中介人", "獲授權保險人的控權人", "精算部職員", "理賠部職員"], 1, ""], [1504, 6, "6.1.1d", "保險業監管局發出了《獲授權保險人的公司管治指引》旨在:", ["加強投保人的信心和促進香港保險市場的穩健和長遠發展", "防止獲授權保險人的高級管理人員作出欺詐行為", "防止獲授權保險人的高級管理人員作出欺詐行為，及行政出錯", "確保獲授權保險人的董事局優先考慮保單持有人的利益"], 0, ""], [1505, 6, "6.1.1d", "以下哪一項是《獲授權保險人的公司管治指引》的內容涵蓋獲範圍?", ["除保險公司的管理層外，還涵蓋兩項職能包括（風險管理及承保)", "只涵蓋風險管理及承保兩項職能", "涵蓋所有職能包括（風險管理及核保)", "除保險公司的管理層外，還涵蓋兩項職能包括(風險管理、承保、理賠)"], 3, ""], [1506, 6, "6.1.1d", "「公司管治」保險人監管制度下所涵蓋的重要部分，此一詞是指:", ["是指一家公司為管理和監控其業務及事務而訂定的內部規例和守則", "適用於特定公司的一般運作及影響其業務的法律規例及守則", "適用於特定公司運作的重要程序", "適用於管理特定公司的股東與董事會之間的關係的內部規例和守則"], 0, ""], [1507, 6, "6.1.1f", "根據《保險業條例》，以下哪一項是關於條例的其他重要條文？", ["呈報規定", "維持在香港的資產", "資產及負債的估值基準", "以上各項皆是"], 3, ""], [1508, 6, "6.1.1f", "《保險業條例》列明經營一般業務的保險人必須就其從香港保險業務所產生的\n負債在香港維持資產，用來釐定這一數據的方法之一，是計算有關數額與以下\n之總和：", ["毛負債額（不扣除再保險部分）的80%", "净負債額（扣除不保部分）的80%", "净負債額（扣除再保險部分及可爭議負債）的80%", "净負債額（扣除再保險部分）的80%"], 3, ""], [1509, 6, "6.1.1f", "根據《保險業條例》的要求，所有保險人必須每年向保險業監管局呈交？", ["財務報表", "資產負債表", "損益表", "以上皆不是"], 0, ""], [1510, 6, "6.1.1f", "經營一般業務的保險人，須每年就香港有關的業務向保險業監管局呈交?", ["經營香港及海外業務的保險人：須呈交一份經審計的一般業務報表，及一份經審計的資產產負債表", "經營香港業務的保險人：須呈交一份經審計的一般業務報表，及一份經審計的資產產負債表，除非經營該業務少於兩年", "經營香港業務的保險人：須呈交一份經審計的一般業務報表，及一份經審計的損益表", "經營香港業務的保險人：須呈交一份經審計的一般業務報表，及一份經審計"], 3, ""], [1511, 6, "6.1.1f", "的資產產負債表\n保險業監管局發出的《有關僱員補償及汽車保險業務保險負債的精算檢討指引\n》要求:", ["要求經營僱員補償及／或汽車保險業務的保險人，須每年就法定業務類別而為未來索償作撥備的儲備金進行精算檢討", "要求經營僱員補償及／或汽車保險業務的保險人(包括再保險人），須每年就法定業務類別而為未來索償作撥備的儲備金進行精算檢討", "須每六個月一次就其業務的財政狀況進行精算調查", "須每十二個月一次就其業務的財政狀況進行精算調查"], 1, ""], [1512, 6, "6.1.1f", "以下哪一項是《2015年修訂條例》賦予保監局的干預權力?\ni.限制海外股本\nii.總投資佔股本最高比率必須由保監局指明\niii.限制保費收入\niv.將保險人清盤", ["i,ii,iii", "i,ii,iv", "iii,iv", "ii,iii,iv"], 2, ""], [1513, 6, "6.1.1f", "以下哪些新增的監管權力是保險業監管局就《2015年保險公司（修訂）條例》\n所授予，對獲授權保險人施予的紀律處分？\ni.公開譴責\nii.對新業務的限制\niii.罰款\niv.限制保費收入", ["i,ii", "i,ii,iii", "i，iii", "ii，iii，iv"], 2, ""], [1514, 6, "6.1.2", "《承保商專業守則》與《處理投訴的指引》之間的聯繫是怎樣的？", ["發出處理投訴指引的目的是更新承保商專業守則", "處理投訴指引是承保商專業守則商專業守則的附件", "發出處理投訴的指引的目的是補充承保商專業守則在處理查詢投訴和糾紛幾方面的要求", "保險代理人需遵守處理投訴的指引，而保險人則需遵守承保商專業守則"], 2, ""], [1515, 6, "6.1.2a", "《承保商專業守則》的目的是對核保、索償產品分析等訂立:", ["銷售做法", "優良保險做法", "投保的優良做法", "索償做法"], 1, ""], [1516, 6, "6.1.2c", "根據《承保商專業守則》，以下哪一項是關於理賠索償方面的要求描述是正確\n的?", ["代表保險人的第三者，應該具備相關經驗", "代表保險人的第三者，應該相關經驗及具備專業資格", "不得委派律師或理賠師以外第三者", "代表保險人的第三者，在任何情況下都應當合理地行事，並且應該具備專業"], 3, ""], [1517, 6, "6.1.3", "資格\n以下哪項是保險投訴局的描述是正確的?\ni)會員是在香港從事個人保險業務的獲授權保險人\nii)涉及的投訴個案保單須屬個人保單\niii)保險投訴委員會兩名委員必須來會計，法律或精算等業界\niv)保險投訴委員會兩名委員來自保險業界", ["i,ii,iii", "i,ii,iv", "iii,iv", "i.ii,iii,iv"], 1, ""], [1518, 6, "6.1.3", "以下哪項是保險投訴局的描述是正確的?\ni)會員是在香港從事個人保險業務的獲授權保險人\nii)投訴委員會是由一位主席、四位委員組成\niii)涉及的投訴個案保單須屬個人保單\niv)保險投訴局會代為處理理賠及索償", ["i,ii,iii", "i,ii,iv", "iii,iv", "i.ii,iii,iv"], 0, ""], [1519, 6, "6.1.3", "以下哪項是保險投訴局的描述是正確的?\ni)保險投訴局成立目的是代表會員處理及支付索償\nii)會員是在香港從事個人保險業務的獲授權保險人\niii)涉及的投訴個案保單須屬個人保單\niv)投訴委員會的委員中有兩位來自保險業", ["i,ii,iii", "ii,iii,iv", "iii,iv", "i.ii,iii,iv"], 1, ""], [1520, 6, "6.1.3a", "以下哪項有關保險索償投訴委員會的結構及權力的陳述是正確的?\ni)向保險投訴局提出涉及索償的投訴實際上是由保險索償投訴委員會裁決的\nii)保險索償投訴委員會是由五位委員所組成\niii)不論勝訴與否，投訴人都必須繳付收費", ["只有i", "只有iii", "ii,iii", "i,ii,iii"], 0, ""], [1521, 6, "6.1.3b", "以下哪項有關索償投訴是屬於保險投訴局的職務範圍？\ni)10萬港元家居保險索償\nii)30萬港元個人保單索償\niii)年金購買人投訴該保險人，根據錯誤計算支付較低的退保價值，導致損失\n了有關的保單利息\niv)投資表現相關的個案", ["i,ii,iii", "ii,iv", "i,iii,iv", "i,ii,iii,iv"], 0, ""], [1522, 6, "6.1.3b", "以下哪幾項是保險投訴局有權處理的個案:\ni.發現沒有保證退保價值，客人投訴保險人於銷售過程中隱瞞沒有保證價值此\n事實\nii.投保人訴在核保結果為次標準風險\niii保險人收取過高保費，猶如比客人實際年齡大了10歲，客人投訴於銷售的過\n程中沒有驗證其真實年齡\niv.對保險人派發紅利金額的投訴，客人聲稱銷售過程中承諾該保單是屬於「抗\n通脹保單」", ["i,ii,iii", "i,iii,iv", "iii,iv", "i,ii,iii,iv"], 1, ""], [1523, 獲授權保險人委任為“持牌人士”—持牌保險\n代理或持牌個人代理—進行受規管活動，其中獲授權經營__________________\n不得超過2名。", ["一般業務的保險人", "長期業務的保險人", "綜合業務保險人", "以上各項皆不是"], 1, ""], [1551, 6, "6.2.5(a)", "一個保險代理人希望代表一個綜合保險人的一般及長期業務，根據《保險業條\n例》中的規則是：", ["不能同時代表兩間保險公司", "當作代表單一保險公司", "當作代表兩間不同的保險公司", "在保險業監管局同意下，允許代表兩間公司"], 2, ""], [1552, 6, "6.2.5", "根據《保險業條例》，以下哪些是對保險代理許可的行動?\ni)發出譴責\nii)暫停該代理人的委任\niii)終止該代理人的委任\niv)命令該人繳付罰款", ["i，ii", "i，ii，iii", "iii，iv", "i，ii，iii，iv"], 3, ""], [1553, 6, "6.2.5(f)", "持牌保險中介人應就進行受規管活動之任何相關事宜與其他相關監管機構合作\n，涉及以下哪領域?", ["準確的陳述及介紹", "合規", "騷擾、強迫或不當影響", "防止賄賂"], 1, ""], [1554, 6, "6.2.5(f)(i)", "如從客戶取得的資料合理明顯地屬不完整或不準確，持牌保險代理人應作出合\n理的跟進查詢，以取得完整而準確的資料。涉及以下哪領域？", ["保障客戶的私隱", "以謹慎、技巧和努力行事", "公平行事並符合客戶的最佳利益", "保存紀錄"], 2, ""], [1555, 6, "6.2.5(f)(ii)", "若持牌保險經紀公司自行製作廣告或營銷材料以用於進行受規管活動，則應確\n保該等材料只含有準確的資料及並無貶低、誤導或欺騙成分。涉及以下哪領域\n？", ["準確的陳述及介紹", "合規", "騷擾、強迫或不當影響", "勝任提供意見"], 0, ""], [1556, 6, "6.2.5(f)(ii)", "持牌保險經紀在推薦保險產品予客戶前，應從充足範圍的不同保險人處，尋找\n及選擇充足範圍並可供選擇的保險產品，而該等產品是適合其客戶情況屬哪一\n項領域?", ["準確的陳述及介紹", "合規", "騷擾、強迫或不當影響", "公正、客觀及公平"], 3, ""], [1557, 6, "6.2.5(f)(ii)", "《持牌保險經紀操守守則》一般原則5，持牌業務代表（經紀）如為進行受規管\n活動的目的而派發名片，應確保該名片上正確地顯示出以哪幾項資料?\ni.其香港身份證或護照上所示的姓名\nii.牌照號碼\niii.牌照類別\niv.其委任持牌保險經紀公司的名稱", ["i,ii,iii", "ii,iii", "ii,iii,iv", "i,ii,iii,iv"], 3, ""], [1558, 6, "6.2.5(f)(i)", "如持牌保險代理人受到金融管理專員、證券及期貨事務監察委員會或強制性公\n積金計劃管理局紀律處分。涉及以下哪領域？", ["準確的陳述及介紹", "合規", "騷擾、強迫或不當影響", "防止賄賂"], 1, ""], [1559, 6, "6.2.5", "《持牌保險代理人操守守則》，一般原則2–\n公平行事並符合客戶的最佳利益，保險代理人推薦保險產品是時應該:", ["保險公司強烈推薦的保險產品", "符合客戶利益的保險產品", "最經濟的保險產品", "最近期推廣的保險產品"], 1, ""], [1560, 6, "6.2.5(a)(i)", "持牌保險經紀應遵守所有適用於該經紀的法律涉及以下哪領域？", ["準確的陳述及介紹", "合規", "騷擾、強迫或不當影響", "勝任提供意見"], 1, ""], [1561, 6, "6.1.1", "保險業條例由以下哪個機構負責執行?", ["保險業監管局", "香港保險業聯會", "證券及期貨事務監督委員會", "保險行業本身自律監督"], 0, ""], [1562, 6, "6.1.1b", "根據《保險業條例》，以下哪項有關最低實繳股本的要求是正確的?\ni)專屬自保保險公司為港幣200萬元\nii)只從事相連長期保險業務的保險人為港幣1,000萬元\niii)同時從事一般業務及長期業務為港幣2,000萬元\niv)從事一般業務的保險人﹝包括法定保險業務﹞為港幣2,000萬元", ["i,ii", "i,ii,iii", "ii,iii,iv", "i,ii,iii,iv"], 3, ""], [1563, 6, "6.1.1b", "根據《保險業條例》，保險人若要獲得授權，必須 質及提早中止合約的後果", "上述所有各項"], 3, ""], [1624, 6, "6.2.5", "作為長期業務代理人，標準代理合約的最低限度的操守包括：", ["不得繳付或提供回佣、佣金", "確保所建議的保單是根據客戶的需要及負擔能力", "不得誤導被保險人以其他保險取代現有保險，引致該被保險人蒙受損失", "以上各項皆是"], 3, ""], [1625, 6, "6.2.5(g)", "按《保險業條例》要求保險經紀備存妥善的簿冊及帳目，以下哪項是有關紀錄\n的陳述是不正確的？", ["能夠易於審核", "必須存檔於電腦紀錄", "必須足以解釋各項交易", "必須足以反映業務的財務狀況"], 1, ""], [1626, 6, "6.2.5(g)", "成功申請成為獲授權的保險經紀團體，必須符合所有要求，同時必須持續達到\n下列哪個機構滿意的程度？", ["保險業監管局", "保險業聯會", "保險經紀授權委員會", "證券及期貨事務委員監察會"], 0, ""], [1627, 6, "6.2.5(g)", "以下哪三項有關保險經紀的陳述是正確的？\ni)他們被視為保險業務的專家\nii)在通常情況下，有關經紀是保險人的代理人\niii)他們必須具備專業彌償保險\niv)保險經紀必須至少符合有關的「最低限度」規定", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 2, ""], [1628, 6, "6.2.5(g)", "保險經紀所須備有的專業彌償保險的最低彌償限額多樣化,但不會低於:", ["1百萬", "2百萬", "3百萬", "4百萬"], 2, ""], [1629, 6, "6.2.5(g)", "每一個獲授權的保險經紀必須備存的繳足款股本為?", ["250,000港元", "500,000港元", "1,000,000港元", "2,000,000港元"], 1, ""], [1630, 6, "6.2.5(g)", "下列哪項有關保險專業彌償保險的陳述是正確的", ["最低為三百萬", "最高賠償為七千五百萬", "經紀可安排更大額保險", "上述各項皆是"], 3, ""], [1631, 6, "6.2.5(g)", "針對保險經紀備存妥善的簿冊及帳目的要求，以下哪一項是適用的？\ni)備存的紀錄可以易於審核\nii)備存的紀錄必須為電腦化格式\niii)備存的紀錄必須足夠解釋所作的交易\niv)備存的紀錄必須足夠反映業務的財務狀況", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "i,ii,iii,iv"], 2, ""], [1632, 6, "6.2.5(g)", "保險經紀備存的妥善簿冊及帳目，所需保留的最低限期為:", ["一年", "三年", "五年", "七年"], 3, ""], [1633, 6, "6.2.5(g)", "所有保險經紀必須備存會計及其他紀錄的目的是為了：\ni)足以解釋各項交易\nii)足以反映業務的財務狀況\niii)可以藉此製備「真實與公平」的財務報表\niv)利用電腦儲存資料", ["i,ii,iii", "i,iii,iv", "ii,iii,iv", "以上各項皆是"], 0, ""], [1634, 6, "6.2.5(g)", "保險業監管局指明保險經紀團體符合下列哪項最低限度規定:\ni)資格及經驗\nii)股本及淨資產\niii)備存妥善的簿冊及帳目\niv)專業賠償保險", ["i，ii，iii", "i，ii，iv", "ii，iii，iv", "以上各項都是"], 3, ""], [1635, 6, "6.2.5(g)", "有關保險經紀必須備有的專業賠償保險，以下哪項或哪些項目正確?", ["最低金額是三百萬", "不必高於七千五百萬", "過去12個月內佣金收入總額的兩倍", "以上各項均是"], 3, ""], [1636, 6, "6.2.5(g)", "保險經紀必須備有「專業賠償保險」，最低的賠償限額為:", ["港幣10萬元", "港幣200萬元", "港幣300萬元", "港幣400萬元"], 2, ""], [1637, 6, "6.2.5(g)", "所有保險經紀必須呈交每年度的核數師報告及財務報表，對於這類報告及財務\n報表，下列哪項陳述並不正確？", ["該份報告確保有關帳目屬於完全真實的紀錄", "根據核數師的意見，已經符合最低限定要求", "該報告必須於有關年終結後的六個月內呈交", "該財務報表顯示有關業務及盈虧的真實而公平狀況"], 2, ""], [1638, 7, "7.2.1", "根據《個人資料（私隱）條例》，以下哪項「個人資料」的定義是正確的?\ni.直接或間接地與活着的資料當事人有關\nii.任何資料包括意見的表達\niii.未被任何形式記錄的資料，口頭方式描述的資料不屬「個人資料」\niv.以上各項皆正確", ["i,iii", "ii,iii", "i,ii", "iv"], 2, ""], [1639, 7, "7.2.1", "根據《個人資料(私隱)條例》，資料當事人有權查閱及更正其個人資料，屬於\n哪項資料使用原則?", ["第1原則:收集個人資料的目的及方式", "第2原則:個人資料的準確性及保留期限", "第5原則:資訊須在一般情況下可提供", "第6原則:查閱個人資料"], 3, ""], [1640, 7, "7.2.2", "在《個人資料（私隱）條例》涉及範圍中，就保險人所擁有保單持有者的資料\n使用上，以下哪項是合法的？", ["向保單持有人的親屬透露其壽險保單資料", "向保單持有人發出續保通知", "向著名的報紙出賣被保險人資料", "以上所有各項"], 1, ""], [1641, 7, "7.6", "有關保險事宜的詐騙：", ["可循不同途徑及索償時產生", "只出現在索償時", "不會出現於人壽保險", "只出現於財產保險索償過程中"], 0, ""], [1642, 7, "7.5.2", "以下哪一項是廉政公署24小時舉報熱線？", ["999", "25266366", "1823", "24266366"], 1, ""], [1643, 7, "7.2.1", "《個人資料（私隱條例》由哪個機構執行?", ["個人資料私隱專員公署", "保險業監管局", "資訊科技監控辦公室", "以上各項皆不是"], 0, ""], [1644, 7, "7.5.1", "以下哪項是《防止賄賂條例》的描述是正確的?\ni.防止主事人免受代理人濫用職權所損害\nii.持牌個人保險代理是作為保險經紀公司委任的業務代表\niii.行賄目的未達可作為賄賂的辯護理由\niv.以上皆是", ["i.", "i,ii", "ii,iii", "v"], 0, ""], [1645, 7, "7.5.1(b)(iii)&", "以下哪項不能作為貪污的辯解理由?\ni收賄是行業或事業的習慣\nii受賄者和行賄者已達成口頭協議，但受賄者無意圖辦理行賄者要求的事\niii透過第三者收賄\niv貪污目的未達", ["i&iii", "ii&iv", "ii,iii&iv", "i,ii,iii&iv"], 3, ""], [1646, 7, "7.4.5", "下列哪項屬保險人應該警覺可能涉及洗錢活動的階段?", ["存放—處置來自非法活動的現金得益，並存入金融體系之內", "分層交易—透過複雜的多層金融交易，將非法得益與其來源分開", "整合—為犯罪得來的財富製造表面合法的印象，整合計劃會將經過清洗的得益實際回流至一般金融體系", "以上所有皆是"], 3, ""], [1647, 7, "7.4.5", "以下哪項屬於透過購買保險產品用於洗錢過程中所使用的手法?", ["犯罪分子會利用犯罪得益購買保險產品，然後提取產品所涉款項，以便從保險公司獲得一張款項看似正當的支票", "投保人更改保險單的受益人，讓保險公司把款項支付給洗錢分子或恐怖分子", "人壽保險單可作為抵押品，用以購買其他金融產品或取得資金", "以上所有皆是"], 3, ""], [1648, 7, "7.4.7", "《打擊洗錢及恐怖分子資金籌集指引》（指引3）由下列哪個機構發出？", ["香港金融管理局", "保險業聯會", "保險業監管局", "以上各項皆正確"], 2, ""], [1649, 7, "7.4.7", "《打擊洗錢及恐怖分子資金籌集指引》（指引3）不適用於:", ["再保險公司", "銀行業條例下成立的金融機構", "持牌保險經紀公司", "持牌個人保險代理"], 1, ""], [1650, 7, "7.4.6", "在香港，與洗錢／恐怖分子資金籌集有關的法例為:\ni.《有組織及嚴重罪行條例》\nii.《販毒（追討得益）條例》\niii.《防止賄賂條例》\niv.《保險業條例》", ["i,ii,iii", "i,ii", "i,iv", "i,ii,iii,iv"], 1, ""], [1651, 7, "7.4.6", "在香港，與洗錢／恐怖分子資金籌集有關的法例為:\ni.《有組織及嚴重罪行條例》\nii.《販毒（追討得益）條例》\niii.《聯合國制裁條例》\niv.《大規模毀滅武器（提供服務的管制）條例》\nv.《打擊洗錢及恐怖分子資金籌集條例》", ["i,ii,iii", "i,ii", "i,iv", "以上所有皆是"], 3, ""], [1652, 7, "7.4.7", "《販毒（追討得益）條例》及《有組織及嚴重罪行條例》都有著保險人關心的\n共同原則，並應用於:", ["洗錢活動", "適當人選", "違反對保險人的最高誠信", "避免對索償職員做用暴力"], 0, ""], [1653, 7, "7.4.7c", "《打擊洗錢及恐怖分子資金籌集指引》（指引3），保險機構的高級管理層有責\n任實施有效的打擊洗錢及恐怖分子資金籌集制度，所制訂的管控措施應涵蓋的\n範疇包括﹕", ["限制接受外幣", "委任一名法律主任", "委任一名合規主任", "成立一個情報單位"], 2, ""], [1654, 7, "7.4.7c", "《打擊洗錢及恐怖分子資金籌集指引》（指引3），保險機構的高級管理層有責\n任實施有效的打擊洗錢及恐怖分子資金籌集制度，所制訂的管控措施應涵蓋的\n範疇包括﹕", ["限制接受外幣", "委任一名高級職員擔任洗錢報告主任", "成立一個情報單位", "以上各項皆不是"], 1, ""], [1655, 7, "7.4.7c", "《打擊洗錢及恐怖分子資金籌集指引》（指引3），保險機構的高級管理層有責\n任實施有效的打擊洗錢及恐怖分子資金籌集制度，所制訂的管控措施應涵蓋的\n範疇包括﹕", ["限制接受外幣", "委任一名法律主任", "成立一個情報單位", "以上各項皆不是"], 3, ""], [1656, 7, "7.4.7", "保險業監管局發出《打擊洗錢及恐怖分子資金籌集指引》，此《指引》的目的\n在於:", ["立法", "介紹有關洗錢及恐怖分子資金籌集的背景", "制訂打擊政策洗錢及恐怖分子資金籌集的政策", "制訂打擊政策洗錢及恐怖分子資金籌集的政策、程序及管控措施"], 1, ""], [1657, 7, "7.4.7", "保險業監管局發出《打擊洗錢及恐怖分子資金籌集指引》，此《指引》的目的\n在於:", ["介紹有關洗錢及恐怖分子資金籌集的背景", "概述在香港有關打擊洗錢及恐怖分子資金籌集的主要法律條文", "提供實務指引以協助保險機構及其高級管理層制定及實施相關政策、程序及管控措施", "以上各項皆是"], 3, ""], [1658, 7, "7.4.7", "保險業監管局發出《打擊洗錢及恐怖分子資金籌集指引》涵蓋的範疇?\n(i)打擊洗錢及恐怖分子資金籌集制度\n(ii)客戶盡職審查\n(iii)針對性金融制裁、數據庫維護、篩查和加強查核\n(iv)可疑交易報告", ["i,ii,iii", "i,ii", "ii,iii,iv", "以上所有皆是"], 3, ""], [1659, 7, "7.4.7c", "保險機構應顧及業務所引起的洗錢及恐怖分子資金籌集風險，實施相應的打擊\n洗錢及恐怖分子資金籌集制度，包括適當的政策、程序及管控措施。有關制度\n應包括:\n(i)合規管理安排；\n(ii)獨立審計職能；\n(iii)僱員甄選程序；\n(iv)持續員工培訓計劃", ["i,ii,iii", "i,ii", "i,iv", "以上所有皆是"], 3, ""], [1660, 7, "7.4.5", "以下哪些屬最容易被利用於洗錢的保險類別？", ["整付保費的投資相連保單", "家居保險", "按月繳付保費保單", "汽車保險"], 0, ""], [1661, 7, "7.4.5", "容易被利用作為進行洗錢或恐怖份子籌資活動工具的長期保險合約包括:", ["單位相連或可分紅的整付保費合約", "固定及變額年金", "(二手)儲蓄壽險保單", "以上各項皆正確"], 3, ""], [1662, 7, "7.4.5", "以下哪些屬於洗錢中常被利用的保險類別？\ni.火險\nii.買入年金\niii.汽車保險\niv.單位相連整付保費合約", ["i及ii而已", "ii及iii而已", "ii及iv而已", "i,iii及iv而已"], 2, ""], [1663, 7, "7.4.7", "以下哪項屬於防止洗錢的步驟？\ni)必須取得客戶的身分證明\nii)建立及保存足夠並且更新的交易紀錄\niii)設定步驟，以辨别可疑交易\niv)向所屬員工進行培訓，確保他們具備最新的知識", ["i,ii,iii", "i,ii,iv", "ii,iii,iv", "i,ii,iii,iv"], 3, ""], [1664, 7, "7.1.2", "以下哪一項就保險代理人的描述是不正確?", ["因執行業務的疏忽行為所須承擔侵權法律責任的機會並非較高", "因疏忽而對保單持有人提供不當的保險意見，須承擔侵權法律責任的機會並非較高", "因疏忽而對保單持有人提供錯誤的保險意見，須承 款項。若意外事故導致受保生命喪失單肢或單目失明，或遭受其"], [377, 3, "3.2.1(b", "受保保單所有人在意外中喪失兩肢，在一個月後因傷\n重死亡。在這種情況下，受保保單所有人所得的賠償\n金是︰", ["喪失一腿", "喪失一目", "喪失一手", "以上各項皆是"], 3, "他較輕微的指明受傷，給付額通常相等於意外死亡保險金的規定比率這個情況，意外死亡保險利益附約一般承諾，於意外導致死亡的情況下，額外支付一筆與基本保單的保額相等的保險"], [378, 3, "3.2.1(b", "意外死亡及喪失肢體附約有時會被修改，以致在以下\n哪項或哪些以外事故中，發放一筆相等于死亡保險金\n的一半", ["正常的保額", "保額的兩倍", "保額的三倍", "保額的四倍"], 1, "利益若受保生命在意外事故中喪失任何兩肢或雙目失明，則會支付一筆與意外死亡保險金相等的款項；若意外事故導致受"], [379, 3, "3.2.1(b", "以上各項，但總額不能超過一筆相等于100%的死亡保\n根據意外死亡及喪失肢體附約，「喪失肢體」的定義\n通常指「由手腕或足踝關節以上完全斷離」。然而有\n些保險人：", ["喪失一條腿", "喪失一隻手臂", "單眼喪失視力", "險金"], 3, "保生命喪失單肢或單目失明，或遭受其他較輕微的指明受傷，給付額通常相等於意外死亡保險金的規定比率若受保生命在意外事故中喪失任何兩肢或雙目失明，則會支付一筆與意外死亡保險金相等的款項；若意外事故導致受保生命喪失單肢或單目失明，或遭受其他較輕微的指明受傷，給付額通常相等於意外死亡保險金的規定比率喪失肢體定義：喪失一肢可以描述為實際喪失肢體（由手腕／足踝關節或以上完全斷離），或喪失該肢體的功能"], [380, 3, "3.2.1(b", "以下哪項正確描述意外死亡及喪失肢體(AD&D)附約？\ni.不論受保保單所有人在任何情況下死亡，都可獲得\n賠償\nii.當被保人喪失一肢或一目失明，可獲相等於死亡金\n一半的賠償\niii.實際喪失肢體或喪失肢體功能都會獲得賠償\niv.保險人不會為同一意外引起的傷殘同時給付喪失肢\n體和死亡利益", ["要求斷離的部位由肩部或臂部開始", "在失去一根手指或腳指的情況下仍會給付有關利益", "於有關定義中加入喪失肢體功能的情況", "就任何兩項不同肢體的殘疾給付有關利益"], 2, "若受保生命在意外事故中喪失任何兩肢或雙目失明，則會支付一筆與意外死亡保險金相等的款項。若意外事故導致受保生命喪失單肢或單目失明，或遭受其他較輕微的指明受傷，給付額通常相等於意外死亡保險金的規定比率"], [381, 3, "3.2.1(b", "下列哪項與意外死亡及喪失肢體(AD&D)附約有關的評\n論是正確的？\ni.喪失一肢可解釋作實際失去，或失去其功能\nii.喪失一肢，則給付相當於死亡金的數額", ["iii", "i,ii,iii", "ii,iii,iv", "i,ii,iii,iv"], 2, "若受保生命在意外事故中喪失任何兩肢或雙目失明，則會支付一筆與意外死亡保險金相等的款項。若意外事故導致受保生命喪失單肢或單目失明，或遭受其"], [382, 3, "3.2.1(b", "iii.喪失兩肢，則給付相當於死亡金的數額\niv.喪失肢體利益也適用於意外引致的失明\n若意外事故導致受保生命喪失單肢或單目失明", ["i,ii", "i,iii", "i,iii,iv", "ii,iii,iv"], 2, "他較輕微的指明受傷，給付額通常相等於意外死亡保險金的規定比率若受保生命在意外事故中喪失任何兩肢"], [383, 3, "3.2.1(b", "，或遭受其他較輕微的指明受傷，給付額為:\n下列哪項屬於意外及喪失肢體附約中，「喪失肢體」\n部份的一般特點？\ni.喪失肢體是指肢體的實質斷離及失去其功能\nii.其他保障不包括喪失單肢\niii.經修訂的保障為喪失單肢支付死亡保險金的規定比", ["意外死亡賠償金額的100%", "相等於意外死亡保險金的規定比率", "扣減自負額後的保險金的規定比率", "扣減醫療費用後的保險金的規定比率"], 1, "或雙目失明，則會支付一筆與意外死亡保險金相等的款項。若意外事故導致受保生命喪失單肢或單目失明，或遭受其他較輕微的指明受傷，給付額通常相等於意外死亡保險金的規定比率「喪失肢體」從詞義上看是指喪失一個或多個肢體（四肢），但在意外死亡及喪失肢體附約中，喪失肢體包括喪失肢體及喪失視力的意"], [384, 3, "3.2.1(b", "率\niv.對方因一宗意外而引致的傷殘，喪失肢體利益及死\n亡保險金同時支付\n意外死亡及喪失肢體保險附約使保險人在受保人意外\n中喪失肢體時給付賠償,提供經修改後的保障,則需:", ["i,ii", "iii,iv", "i,iii", "i,ii,iii,iv"], 2, "思。若受保生命在意外事故中喪失任何兩肢或雙目失明，則會支付一筆與意外死亡"], [385, 3, "3.2.1(b", "下列哪項屬於意外及喪失肢體附約中，「喪失肢體」\n部份的一般特點:\ni.喪失肢體是指肢體的完全斷離或喪失肢體的功能", ["喪失一肢或一目失明,提供賠償為保額雙倍", "喪失一手指或腳指,提供賠償為保額全數", "喪失一腿部或臂部,提供賠償為保額某個百分比", "喪失一肢或一目失明,提供賠償為保額一半"], 3, "保險金相等的款項。若意外事故導致受保生命喪失單肢或單目失明，或遭受其他較輕微的指明受傷，給付額通常相等於意外死亡保險金的規定比率「喪失肢體」從詞義上看是指喪失一個或多個肢體（四肢），但在意外死亡及喪失肢體附約中，"], [386, 3, "3.2.1(b", "ii.喪失單肢給付額等於意外死亡保險金的規定比率\niii.喪失視力\niv.對方因一宗意外而引致的傷殘，喪失肢體利益及死\n亡保險金同時支付\n在意外死亡保險收益，喪失肢體在於實際喪失由手腕", ["只有i,ii", "只有iii,iv", "只有i,ii,iii", "i,ii,iii,iv"], 2, "喪失肢體包括喪失肢體及喪失視力的意思。「喪失肢體」"], [387, 3, "3.2.1(b", "或足踝關節處以上完全斷離作定義。但保險人亦可以\n某人因一宗嚴重的交通意外而死亡。初時，傷勢只是\n失去兩個肢體，但該名受害人一星期後因傷重而死亡\n，如果他的人壽保單加有意外死亡及喪失肢體附約，\n保單將會支付：", ["包括以下情況：臂部及肩斷離開始才作賠償", "一根手指或腳指之斷離也作賠償", "包括喪失肢體功能", "喪失任何2肢才作出賠償"], 2, "從詞義上看是指喪失一個或多個肢體（四肢），但在意外死亡及喪失肢體附約中，喪失肢體包括喪失肢體及喪失視力的意思。意外死亡保險利益，指於意外導致死亡的情況下，額外支付一筆與基本保單的保額相等的保險利益"], [388, 3, "3.2.1", "意外死亡保險附約又名雙倍賠償利益，但其英文名稱(\nBenefit)在技術上是不正確的，因為：", ["保額而已", "保額的2倍", "保額的3倍", "保額的4倍"], 1, "“Indemnity”字面意思為「彌償」一詞，技術上並不準確，因為人壽保險一般不適用彌償原則"], [389, 3, "3.2.1", "意外死亡保險利益(ADB)被稱為雙倍賠償利益(Double\nBenefit)，在這裡英文名稱技術上並不準確，因為：", ["有些意外引致死亡的原因是除外責任", "Indemnity(彌償)通常出現在財產保險上", "Indemnity是一項彌償，而該保額是利益保單；", "自然死亡是不保的"], 2, "“Indemnity”字面意思為「彌償」一詞，技術上並不準確，因為人壽保險一般不適用彌償原則“Indemnity”字面意思為「彌償」一詞，技術上並不準確，因為人壽保險一般不適用彌償原則"], [390, 3, "3.2.1", "其他意外保險利益附約的賠償一般為：\ni.失去一隻眼，便會有指明比率的賠償金\nii.失去一眼一手，便會有100%的賠償金", ["彌償只應用於定期壽險", "人壽保險不受彌償所限制", "在正常情況下須額外支付兩倍的保險利益", "唯有是由意外引致死亡才會賠償"], 1, "利益給付表(schedule)：承保意外身體受傷，以表格的形式列出指定的受傷類別及相應的保險"], [391, 3, "3.2.2", "iii.死亡，便會有100%的賠償金\niv.死亡及喪失肢體的賠償金是相等的\n在意外死亡保險利益有關「喪失肢體」的條款內，受\n保保單所有人在意外中喪失甚麼，保險人才會給付一\n筆與死亡賠償相等的金額？", ["i,ii及iii", "及i,iiiv", "及i,iiiiv", "ii,iii及iv"], 0, "利益金額。該表格的內容通常包括：死亡,喪失兩肢,完全失明,喪失單肢及單目失明,喪失單肢或單目失明,各種指定程度較輕的傷殘若受保生命在意外事故中喪失任何兩肢或雙目失明，則會支付一筆與意外死亡保險金相等的款項"], [392, 3, "3.2.2(a", "附加於人壽保險的「其他意外保險利益」的意外身體\n損傷利益給付表，通常列出下列哪項或哪些情況下應", ["喪失一肢", "雙目失明", "喪失一肢或一目失明", "喪失一肢及一目失明"], 1, "利益給付表(schedule)：承保意外身體受傷，以表格的"], [393, 3,
