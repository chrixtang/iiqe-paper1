保額不變或調整保單保額"], [868, 2, "2.2.2", "以下那項法律原則令法庭可以撤銷一些不合法的交易", ["單位相連保單的基本概念保險人的股價", "透過單位計算", "保險人的投資收益", "保險人所定下的保額"], 1, "單位相連保單可以各種形式出現，但是，它們皆擁有一個共同的特點：全部或部分保費將以當時的基金價格，購入基金單位，而保單的價值將因此隨所掛鈎的基金單位的價值變動而波動。單位相連保單可以題各目種解形釋式出現，但是，它們皆擁有一個共同的特點：全部或部分保費將以當時的基金價格，購入基金單位，而保單的價值將因此隨所掛鈎的基金單位的價值變動而波動。此項法律原則容許法庭對有損害公眾利"], [869, 4, "4.9", "以下那項容許法律轉讓「據法產權」？", ["法律修訂(綜合)條例", "法律改革(綜合)條例", "衡平法中轉讓原則", "法律修訂及改革(綜合)條例"], 3, "《法律修訂及改革(綜合)條例》第9條容許藉訂明手續來轉讓據法權產，而對保險合約的權益屬於據法權產"], [870, 1, "1.3.1", "以下兩項或那些有可能會影響保險保費?", ["競爭者的活動", "公眾健康急劇轉變", "經濟轉變，例如持續經濟衰退", "以上所有各項"], 3, "以上均為影響保費的因素，其餘因素還有公司目標及行銷策略"], [871, 1, "1.3.1", "釐定人壽保險保費的傳統標準是:", ["可負擔的", "合理的", "可計算的", "公平的"], 3, ""], [872, 1, "1.3.1", "釐定人壽保險保費的傳統標準中，其中一項標準是「公正」的，其意味著：", ["保證保費是市場上最優惠的", "繳納的保費對保單所有人而言是不偏不倚的", "保費低至保單所有人可以支付的", "以上各項皆是"], 1, ""], [873, 1, "1.1", "人壽保險最初及最基本的目的，在現代社會也有這樣的保障保險(定期壽險)是\n什麼？", ["死亡(尤其在早逝的情況下)", "為受保人在生的每一年提供生活收入", "儲蓄", "在餘下生命裏提供保障"], 0, ""], [874, 1, "1.2", "就人壽保險而言，由兩個或以上保險人共同承擔同一賠償似乎不太可能。但在\n一般保險而言，(例如醫療保險)，以下哪項保險原則會導致共同承擔補償?", ["代位", "分擔", "彌償", "可保權益"], 1, ""], [875, 1, "1.3.2(b)", "以下哪一項不是均衡保費制度的特點？", ["經過初期的年數，保單會累積一個現金退保價值", "保費(根據相同的死亡利益)不會每年增加", "保費會按照被保險人到達之年齡而增加", "較早的保單保費高於死亡風險所需要的金額"], 2, ""], [876, 1, "1.3.2(a)", "以下哪項不是影響保費率的主要因素？", ["死亡率", "利息", "開支", "發病率"], 3, ""], [877, 1, "1.3.2a", "下列哪項屬於自然保費制度的特點？", ["保費隨年齡增長而增加", "會產生逆選擇", "大部份保險公司已不採用", "以上各項皆正確"], 3, ""], [878, 1, "1.2.1", "下列哪項正確描述可保權益：", ["它不是普通法的條款", "在香港的法定條文中已擴闊了它的範圍", "壽險保單中承讓人必須具有可保權益", "它只能由家庭或婚姻關係中出現"], 1, ""], [879, 1, "1.2(h)(ii)", "債權人可就其債務人的生命投保。在債務得到償還後，會出現以下哪個情況？", ["保單必定立即終止自然保費釐定制度", "債權人必須轉讓保單給債務人才繼續有效均衡保費釐定制度", "仍然維持該保單的有效性，並在適當時候「再次得到償付」保單有效期內保費並非固定，而是於每個保單週年日獨立計算，此保費制度稱為:平均保費釐定制度", "遞增保費釐定制度"], 2, ""], [880, 1, "1.3.1a", "以下哪項關於死亡表的描述是正確的?\ni.顯示不同年齡的預期死亡比率的計算表\nii.應付所有預期及可能出現的營運開支\niii.考慮某種新疾病或其他災難引起異常死亡率的可能性\niv.只應付正常風險和正常預期的死亡率", ["i,iii", "i,iv", "ii,iv", "以上各項皆是"], 1, ""], [881, 1, "1.1", "以下哪項不是人壽保險的功能?", ["逃稅", "儲蓄", "為退休生活做好準備", "以防早逝"], 0, ""], [882, 1, "1.2.3(a)", "人壽保險近因原則:", ["從不適用於人壽保險", "絕對適用於人壽保險", "有時適用，尤其懷疑自殺的死亡原因", "只有意外死亡利益附約時才適用"], 2, ""], [883, 1, "1.2.3", "賠償雙倍賠償利益保單時，確定受保人的死亡原因很重要，以下哪種保險原則\n是適用：", ["彌償", "分擔", "近因", "可保權益"], 2, ""], [884, 1, "1.1", "以下哪項為人壽保險最初的基本目的?", ["為退休提供一筆資金", "儲蓄", "應付暫時的需要", "退休安排"], 2, ""], [885, 1, "1.2.1", "以下哪項有關壽險保單的轉讓與可保權益的法律規定的關係要求的描述是正確\n的？\ni.就某人的生命購買保險，對該受保生命必須具有可保權益。但透過轉讓程序\n購買別人的現有保單，對該受保生命無須具有可保權益\nii.保單所有人不能將壽險合約轉讓予第三者，即使該第三者對受保生命具有可\n保權益\niii.保單所有人可以把正當地安排的壽險合約轉讓予第三者，即使該第三者對\n受保生命缺乏可保權益\niv.保單所有人只可將壽險合約轉讓予對該受保生命有可保權益的第三者", ["i,iii", "i,ii", "i,iii,iv", "ii,iii,iv"], 0, ""], [886, 1, "1.2.1(h)", "在人壽保險中，只有在合約開始時才需要可保權益，以下哪項情況會出現有效\n索償?", ["夫妻於離婚前，為其配偶的生命購買人壽保單", "債務清還前，就債務人的生命購買人壽保單", "關鍵人物人壽保單，受保僱於保單起保數天後離職", "以上各項例子"], 3, ""], [887, 1, "1.2.1(h)(iii)", "以下哪項有關壽險保單轉讓與可保權益法律規定的關係的陳述是正確？", ["保單所有人是不能將壽險合約轉讓給缺乏可保權益的第三者", "保單所有人一般可以將正當地安排的人壽保險合約轉讓給第三者，即使該第三者對受保生命缺乏可保權益", "保單所有人需透過另外一份合約才可將壽險合約轉讓給第三者", "準保單所有人意圖向一受保生命購買一份壽險合約，但卻與受保生命缺乏可"], 1, ""], [888, 1, "1.2.1(h)", "保權益，他大可以安排後者購買保單自保生命後轉讓給他，而成為轉讓保單的\n合法所有人\n丈夫為其妻子的生命投保了一份整付保費壽險保單，後來妻子離世，當時雙方\n已離婚，結果：", ["丈夫只可取回已邀保費，加上利息", "丈夫無權就妻子的死亡索償", "丈夫只可取回已邀保費", "丈夫有權就妻子的死亡索償"], 3, ""], [889, 1, "1.2.2", "下列哪項肯定屬於投保人必須披露的重要事實:", ["與實質物件(財產)的保險有關的事實", "會影響一名審慎的保險人訂定保費或決定是否承擔風險方面判斷的事實", "可能影響一名審慎的核保人就一項特定風險釐定保費的判斷的事實", "被保險人向保險人披露的重要事實"], 1, ""], [890, 1, "1.2.2", "以下哪項為最高誠信的正確描述？\ni.任何人不可能被期望披露不可能知道的情況\nii.就免健康核保的申請，保險中介人必需嚴謹制定一份建議書\niii.最高誠信的原則是主動披露，並不會因投保人已獲得保險人安排合資格的\n醫療團隊的體檢而影響\niv.重要資料是在「訂定保費方面會影響一名保險人的判斷的任何情況」", ["i,ii", "i,iii", "i,iii,iv", "ii,iii,iv"], 2, ""], [891, 1, "1.2.2(e)", "以下哪項為最高誠信的正確描述？\ni.就某些不可異議條文，保險人不得在保單生效了一段時訂明時間內對該份保\n單提出異議或質疑\nii.就免體檢的投保，一份小心設計的投保單是很重要\niii.在不構成欺詐的情況下，若受保生命違反最高誠信在可異議期間後才可獲\n得寬宥\niv.要求投保人披露所有重要事實，不管保險人有沒有提出要求", ["ii,iii,iv", "i,ii,iv", "i,ii", "iii,iv"], 3, ""], [892, 1, "1.2.3", "賠償雙倍賠償利益保單時，確定受保人的死亡原因很重要，所以以下哪種保險\n原則是適用：", ["彌償", "近因", "可保權益", "最高誠信"], 1, ""], [893, 1, "1.2.3", "若一名保單所有人在兩年前購買一份人壽保單(有分紅性質)，而事隔兩年後，\n他再購買另一份為期5年的定期壽險計劃。在半年後，該投保人身亡。若以上兩\n份保單仍生效的話：", ["只賠償保額較高的一份保單的保額", "兩張保單全數賠償", "視乎保險公司當時的決定", "只賠償有分紅性質的一份"], 1, ""], [894, 1, "1.2.3(b)", "當發現死者就其生命購買了多於一份人壽保單，而每一份保單仍然生效，當作\n出賠付時：", ["只有最先購買的保單作出賠付", "只有最高保額的保單作出賠付", "每份保單對賠償都必須負責", "應付保額為最高保額，而所有保險人分擔責任"], 2, ""], [895, 1, "1.2.3(c)", "在人壽保險中，保險人就追討一筆賠償給付原屬被保險人向第三者提出索償權\n利的罕見情況，以上情況屬哪一項保險原則下發生?", ["彌償", "分擔", "代位", "可保權益"], 2, ""], [896, 1, "1.3.1a", "人壽保單中的毛保費等於淨保費加附加保費，哪麼淨保費即是:", ["利息而已", "死亡率而已", "死亡率及開支", "死亡率加利息"], 3, ""], [897, 1, "1.3.1a(b)", "一般計算人壽保險保費的三大因素是死亡率、開支及：", ["保險人的利潤", "目前投資率", "預期利息所得", "淨邊際利潤"], 2, ""], [898, 1, "1.3.2a", "以下哪項就自然保費釐定制度的描述不正確?", ["保險人已不再使用自然保費制度", "該制度會出現不利於保險人的逆選擇", "保費會隨年齡增長而增加", "以上各項皆不是"], 3, ""], [899, 1, "1.3.2b", "以下哪一項是均衡保費（釐定）制度對保單的短期後果?\ni.保單有效期內保費並非固定，而是於每個保單週年日\n獨立計算，以準確反映在每個續保期內受保生命的自然風險（例如年齡等）\nii.早年保費相對風險而言可能「太高」而晚年保費相對風險而言則可能「太低\niii.吸收了最初設立該保單時的各項有關開支及成本，早年的「超額」保費上\n其利息收入將形成一個儲備，以應付未來的責任\niv.均衡保費制度考慮到壽險屬於長期合約，不變的年保費實際上會在整個受保\n期內有效地達致平均", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 3, ""], [900, 1, "1.3.2c", "下列哪項可以歸因保單於均衡保費釐定制度下多繳的「剩餘」保費?\ni.現金價值\nii.保單抵押貸款\niii.清繳保險\niv.不能作廢條文", ["i,ii,iii", "ii,iii,iv", "i,ii,iv", "i,ii,iii,iv"], 3, ""], [901, 1, "1.2.2", "大多數人壽保單條款規定，除非有證據證實保單所有人的欺騙行為，否則，在\n保單生效了一段時間之後，保險人不會對該份保單提出異議或質疑，該條款稱\n為:", ["不可撤銷條款", "不能作廢條款", "不可異議條款", "不可失效條款"], 2, ""], [902, 1, "1.1", "人壽保險的最初目的是:", ["為某人在某段時間內死亡提供整筆金錢", "為英年早逝死亡提供整筆金錢", "為退休人士提供金錢的儲蓄", "為某人早逝死亡時為其家人提供一筆金錢"], 3, ""], [903, 1, "1.1", "下列哪項購買壽險的動機是這類保障的最初目的?", ["作為儲蓄的安排", "投資", "為退休作出安排", "暫時需要/威脅"], 3, ""], [904, 1, "1.1", "最初,人壽保險保單是:", ["並非保障因意外引致之死亡", "均屬長期性之死亡賠償安排", "祗限於被保生命於特定期限內生存時支付金額", "為期短,於特定期限內支付利益"], 3, ""], [905, 1, "1.1", "「保險公司承諾當被保險人死亡時支付保險金的保險。」這段引述是:", ["完全不正確", "完全描述了所有人壽保險合約", "未能完全描述所有人壽保險合約", "令人完全誤解並且內容不實"], 2, ""], [906, 1, "1.1", "人壽保險合約最初類型：", ["本質上屬於短暫的，以保障早逝情況", "本質上屬於長久的，即直至死亡", "與物業抵押貸款有關", "屬單位相連的安排"], 0, ""], [907, 1, "1.1", "人壽保險定義為：「保險公司承諾當受保保單持有人死亡時給付保險金的保險\n」這段引述是：", ["有限制的，在可能的情況下是可行的", "這是最初及最基本的目的", "這未能完全描述現代的人壽保險", "以上所列各項都是正確的"], 3, ""], [908, 1, "1.1.1", "下列哪項可被稱為人壽保險中的「商業需求」而非「個人需求」？\ni)關鍵人物\nii)企業擁有人\niii)退休收入\niv)僱員福利", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 1, ""], [909, 1, "1.1.1", "考慮可供選擇的人壽保險的類型時，以下哪三項可被視為人壽保險中的個人而\n非商業要求?\ni)關鍵人物\nii)教育經費\niii)退休收入\niv)受贍養者的生活開支", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 3, ""], [910, 1, "1.1.1", "下列哪項為壽險保單商業需求而非個人需求？", ["合夥人", "教育經費", "應急資金", "受養者生活開支"], 0, ""], [911, 1, "1.1.1", "下列哪項在人壽保險中不屬於「個人需求」？", ["應急資金", "關鍵人物", "教育經費", "受養人的生活開支"], 1, ""], [912, 1, "1.1.1", "選擇可供購買的人壽保險的合適度，最常用的方法：", ["保險合約的發出地點", "可賺取的英式紅利和紅利", "迎合個人及商業需要的程度", "保險合約的貨幣選擇"], 2, ""], [913, 1, "1.1.1", "人壽保險在現代觀點上看，可滿足哪項需求？", ["商業及個人", "售賣地點", "售賣貨幣", "紅利利益"], 0, ""], [914, 1, "1.2", "壽險索償理據需要根據以下哪項保險原則？", ["彌償", "代位", "近因", "可保權益"], 2, ""], [915, 1, "1.2", "下列保險原則中，哪三項與人壽保險存在關係比較不重要？\ni)彌償\nii)代位\niii)分擔\niv)可保權益", ["i,ii,iii", "ii,iii,iv", "i,ii,iv", "i,iii,iv"], 0, ""], [916, 1, "1.2.1", "就可保權益而言，以下哪些情況下才可以作出轉讓;", ["只可轉讓給個人的雙親及配偶", "只可轉讓給一個關係親密的家庭成員", "只可轉讓給只有可保利益的承讓人", "可轉讓給任何沒有可保利益的人"], 3, ""], [917, 1, "1.2.1", "下面有關人壽保險中可保權益的法律的陳述正確的是?", ["每一個男子對自己的生命具有無限的可保權益", "一個人對自己生命所具有的可保權益限於該人的資產值", "一個人對自己生命所具有的可保權益限於該人的收入", "一個人對自己生命所具有的可保權益與該人就其他人的生命所具有的可保權"], 0, ""], [918, 1, "1.2.1", "益相同\n一名人士對另一人的生命具有一項權益，這權益在法律上賦予法定權利可就該\n人物的生命購買保險，這稱為：", ["可保權益", "最高誠信", "家庭保險權益", "特別權益"], 0, ""], [919, 1, "1.2.1", "以下哪兩項具有有效的可保權益?\ni)為自身債務人的生命購買人壽保險\nii)為自身年屆二十五歲的兒子的生命購買人壽保險\niii)為現時的生意伙伴的生命購買人壽保險\niv)為前配偶(已離婚)的生命購買人壽保險", ["i,ii", "ii,iii", "iii,iv", "i,iii"], 3, ""], [920, 1, "1.2.1", "如果某人對他人的生命具有一項權益，可讓前者享有法律上的權利就後者的生\n命投保，這類權益稱為：", ["彌償", "最高誠信", "法定權益", "可保權益"], 3, ""], [921, 1, "1.2.1", "以下哪項是對可保權益的法律權利定義的正確描述?", ["我們對自己的生命具有無限金額的可保權益", "任何人對其配偶具有無限金額的可保權益", "債權人有權就欠債人的生命購買保險，保額為貸款金額另加合理利息", "以上各項皆是"], 3, ""], [922, 1, "1.2.1", "在香港，以下哪項有關人壽保險的可保權益的說明是不正確的？", ["配偶對另一方都具有可保權益", "根據法例，父母對於任何一個子女具可保權益", "血緣關係能構成可保權益", "監護人對未成年的受監護人足可構成可保權益"], 1, ""], [923, 1, "1.2.1", "可保權益是指某人與「標的」之甚麼關係？", ["最高誠信", "法律認可", "合約", "血緣"], 1, ""], [924, 1, "1.2.1", "根據可保權益，一個人可為以下哪三項人仕購買保險？\ni)配偶\nii)自己十歲的子女\niii)欠自己錢的人(債仔)\niv)自己欠他錢的人(債主)", ["i,ii,iii", "i,iii,iv", "i,ii,iv", "ii,iii,iv"], 0, ""], [925, 1, "1.2.1(b)", "根據《保險業條例》第64b條指出，任何對受保生命沒有可保權益的保單均屬：", ["可使無效", "無效", "得不到保障的", "正常的"], 1, ""], [926, 1, "1.2.1(c)", "對個人及其配偶的可保權益保額是怎樣釐定的？", ["夫婦總資產為上限", "兩人的總保費", "保額是無限的", "配偶的收入"], 2, ""], [927, 1, "1.2.1(c)&(d)", "投保人對以下哪些人士沒有可保權益？", ["負債人", "債主", "合伙人", "配偶"], 1, ""], [928, 1, "1.2.1(c)&(f)", "根據《保險業條例》第64a條指出，下列哪項關係可構成可保權益？", ["父母及其未滿18歲的子女", "監護人及其未滿18歲的被監護人", "丈夫及其妻子", "以上各項皆是"], 3, ""], [929, 1, "1.2.1(d)", "就可保權益而言，按照法律要求，如要對其他人（即本身及其配偶以外的人）\n擁有可保權益，以下那項描述是正確的？", ["法律要求兩者之間必須存在法律上有僱傭關係", "法律要求兩者之間必須存在某種血緣關係", "法律要求兩者之間必須不可以存在某種財務關係", "法律要求兩者之間必須存在某種財務關係"], 3, ""], [930, 1, "1.2.1(d)", "下列哪項關係構成可保權益？", ["債務關係", "合約關係", "僱傭關係", "以上各項皆是"], 3, ""], [931, 1, "1.2.1(d)", "債權人對債務人具有可保權益，當中的金額限於：", ["貸款和應付及預計利息", "只限於貸款金額", "貸款和應付利息", "貸款和預期可賺取利息"], 2, ""], [932, 1, "1.2.1(d)(iii)", "以下哪項屬於關鍵人物？", ["自己", "自己的配偶", "一名重要僱員", "在家族中最富有的成員"], 2, ""], [933, 1, "1.2.1(e)", "根據香港法例，任何人士對以下人士皆有可保權益，除了：", ["自己", "自己與十七歲的配偶", "自己與年屆十七歲的兒女", "自己與年屆十七歲的兄弟"], 3, ""], [934, 1, "1.2.1(f)", "在香港，有血緣關係的家庭成員不存在可保權益，根據《保險業條例》第64a條\n指出，唯一可以具有可保權益的血緣和家庭關係，下列哪項關係可構成可保權\n益？", ["配偶", "外祖父", "債務人", "子女(未成年)"], 3, ""], [935, 1, "1.2.1(g)", "根據香港法律，如果一個人(甲)對另一個人(乙)的生命享有可保權益，而甲就\n乙的生命安排一份保險，那麼：", ["該份保單便屬無效", "甲的姓名必須於該保單內註明", "利益必須給付乙", "該份保單必屬不分紅的"], 1, ""], [936, 1, "1.2.1(h)", "丈夫為自己生命投買了一份保險，保單的受益人為其妻子。兩年後，他們離婚\n，但丈夫仍有繼續供款。後來丈夫離世，妻子可否獲得賠償？", ["不可以，因為離婚後，妻子對丈夫的生命沒有可保權益", "可以索取全部保額", "可以取回已交保費", "可以索取一半保額的賠償"], 1, ""], [937, 1, "1.2.1(h)", "歐先生為歐太太購買了一份整付保費壽險，三年後將保單轉讓給他們的女兒。\n再過兩年後，歐太太離世，而歐先生與歐太太經已離婚，請問根據這份保單索", ["歐太太對自己具有可保權益？", "歐先生什麼時候對歐太太具有可保權益？", "歐太太對自己具有多少可保權益？", "這份保單屬於違法嗎？"], 1, ""], [938, 1, "1.2.1(h)", "就可保權益而言，人壽保險轉讓中，承轉人：", ["可與轉讓人沒有可保權益", "必須為轉讓人父母", "必須為轉讓人配偶", "必須為轉讓人兄弟姊妹"], 0, ""], [939, 1, "1.2.1(h)(iii)", "就可保權益而言，人壽保單可以在下列哪種情況下轉讓？", ["只能轉讓予個人的配偶或雙親", "只能轉讓予一名關係密切的家庭成員", "只能轉讓予具有可保權益的承讓人", "無論承讓人是否具有可保權益均可進行轉讓"], 3, ""], [940, 1, "1.2.1(h)(ii)", "法律上，可以就債務人的生命投保，在債務得到償還後，該份保險：", ["立即取消", "即時支付利益", "盡快變為無效", "然維持保單的有效性，並在適當時候得到償付"], 3, ""], [941, 1, "1.2.2", "下列哪項是有關最高誠信的描述最恰當的說法:", ["必須披露保單所有人所知的事實", "必須披露所有保險人要知的事實", "投保人必須披露已知的所有重要事實", "必須完美地披露保險人問及的所有問題"], 2, ""], [942, 1, "1.2.2", "一名男子安排免體檢保單,他無意誤導保險人其健康狀況,如果詳述其健康真相,\n保險人並不提供保單保障,其後該男子死去並真相大白,以下那項描述並不正確?", ["不論任何時間死亡,保險人可推翻保險合約", "死亡發生予保單生效2年內,保險人可推翻保險合約", "死亡發生予保單生效2年後,保險人不可異議", "沒有涉及欺詐,保險人不能推翻保險合約"], 0, ""], [943, 1, "1.2.2", "假若保險人不把投保人正感到胃痛一事列作重要事實，其原因必定是：", ["胃痛是可以透過身體檢查發覺的", "這與投保人的健康狀況沒有關係", "收取附加保費就可以接受這項投保", "這事實不會影響投保人決定是否接受投保或釐定保費"], 3, ""], [944, 1, "1.2.2", "下列哪項肯定屬於投保人必須披露的重要事實:", ["會影響一名審慎的保險人訂定保費或決定是否承擔風險方面判斷的事實", "與實質物件(財產)的保險有關的事實", "可能影響一名審慎的核保人就一項特定風險釐定保費的判斷的事實", "會影響一名合理的核保人就一項特定風險受保與否或釐定保費的判斷的事實"], 0, ""], [945, 1, "1.2.2", "以下哪項為最高誠信的正確描述？\ni)不期望被保人披露有理由不可能知道的情況\nii)人壽保險只要求投保人回答保險人問題時具有最高誠信\niii)免體檢的保單，投保人不用披露體檢表格內沒有問及的事情\niv)沒有欺詐而違反最高誠信，超過可異議期後可得到豁免", ["i,ii,iii", "i,iii,iv", "ii,iii,iv", "i,ii,iv"], 1, ""], [946, 1, "1.2.2(d)", "在現行的法律及慣例下，如果需要就某一人壽保險投保單進行特殊的身體檢查\n，投保人有權知道下列哪項或哪些資料？", ["進行什麼檢查", "需要有關資料的目的", "任何檢查的結果", "以上所有各項"], 3, ""], [947, 1, "1.2.2(e)", "若違反人壽保險合約的最高誠信責任通常會令該合約變為可使無效。就香港的\n壽險保單而言：", ["這種情況在任何時候也適用", "最高誠信的原則並不適用", "違反最高誠信便會自動令該合約變為無效", "保單的不可異議條款可能改變這種情況"], 3, ""], [948, 1, "1.2.3(a)", "近因對下列哪項不是十分重要？", ["雙重賠償", "意外", "火險", "快將到期的定期壽險"], 3, ""], [949, 1, "1.2.3(a)(ii)", "下列哪項關於彌償的陳述是正確的？", ["除非由法律隱含，否則彌償不存在於人壽保險", "法律不容許人壽保險作出彌償", "不可能對喪失生命作出超額彌償", "五十年前，彌償普遍存在於人壽保險"], 2, ""], [950, 1, "1.2.3(b)", "下列哪項對彌償的描述是正確的？", ["除非法律顯示，否則人壽不受彌償約束", "人壽保險不可能超額賠償可保生命", "保險利益支付超越實際損失金額", "不適用於人壽保險任何形式"], 1, ""], [951, 1, "1.2.3(b)", "如一名被保險人已購買了三份人壽保單，當作出賠付時：", ["須以最先購買的保單作出賠付", "須以最高保額的保單作出賠付", "在計算保單的責任時，須猶如沒有其餘兩份保單的存在", "應付保額為最高保額，而保額則由保險人分擔"], 2, ""], [952, 1, "1.2.3(c)", "分擔與代位權：", ["不適用於人壽保險", "對人壽保險的索償很重要", "其重要性在人壽保險索償與一般保險索償一致", "以上所有皆是"], 0, ""], [953, 1, "1.2.3(c)", "確定一名受保人死亡、喪失肢體的原因可以是重要的，這涉及什麼保險原理？", ["彌償", "分擔", "近因", "最高誠信"], 2, ""], [954, 1, "1.2.3(c)", "在人壽保險中，近因這個保險原則：", ["是適用的", "並不適用", "可能重要(當自殺免責期後自殺)", "只在不可異議期內重要"], 0, ""], [955, 1, "1.2.3註", "在死亡的索償中，以下哪種或哪些原因，死因可能屬於重要事項：", ["該保單可能設有意外死亡保險利益附約", "自殺條款可能仍然生效", "受益人可能謀殺該受保生命", "以上所有各項"], 3, ""], [956, 1, "1.2.3註", "近因與不同類型的危險關係密切，而對於以下哪一項的描述是正確的？", ["人壽保險中包含指明的受保危險", "人壽保險中除外危險並不適用", "人壽保險不受到不保危險的限制", "各類危險於人壽保險的應用是有限的"], 3, ""], [957, 1, "1.2.3註", "如果受保生命的死亡是由已證實的自殺引致：", ["只須支付一半的保額", "根據保單，保險人絕對不用負責", "索償的有效性視乎保單已經生效多久", "保險人若支付有關索償，便屬違法"], 2, ""], [958, 1, "1.3.1", "按照壽險傳統保費計算方法，保費應該可應付所有有關成本，並可反映有關之\n風險，描述有關之保費標準為：", ["公平及公正的", "公平及足夠的", "充足及公平（公正）的", "充足及合適的"], 2, ""], [959, 1, "1.3.1", "釐定人壽保險保費的傳統標準中，包括「公平」一項，其意思是：", ["提供最平宜的保費", "反映有關的風險及約定利益", "年紀愈小愈要負擔高的保費", "維護保險公司利益"], 1, ""], [960, 1, "1.3.1a", "在人壽保險保費的一般計算中，在正常統計預期下足夠支付死亡索償所需向保\n單所有人收取的金額是以下哪一種保費：", ["實收保費", "淨保費（純保險費）", "毛保費", "充足及公平的保費"], 1, ""], [961, 1, "1.3.1a", "用以計算壽險保費的三大因素為死亡率，開支及:", ["保險人利潤", "目前投資利率", "預期利息收入", "淨邊際利潤"], 2, ""], [962, 1, "1.3.1a", "用以計算壽險保費的三大因素為死亡率，開支及:", ["利息", "性別", "年齡", "居住的國家"], 0, ""], [963, 1, "1.3.1a", "釐定壽險保單保費的其中一個標準是其應當是「充足的」，在這大前提下，這\n意味著保費應該是：", ["不高於所需要的金額", "有能力與市場上的保費率競爭的", "是以為保險人提供利潤", "足夠支付保險金及履行合約中的其他責任"], 3, ""], [964, 1, "1.3.1a", "用以計算壽險「毛保費」的因素，哪項加上附加保費後組成？", ["淨保費", "利息", "開支及死亡率", "利息、開支及死亡率"], 0, ""], [965, 1, "1.3.1a", "淨保費(純保險費)包括：", ["利息而已", "死亡率而已", "死亡率及利息", "利息，死亡率及開支"], 2, ""], [966, 1, "1.3.1a(c)", "在人壽保險中，淨保費加開支後的總保費稱為：", ["最後的保費", "毛保費", "公平的保費", "純保險費"], 1, ""], [967, 1, "1.3.1b", "影響保費的計算是死亡率、利息、開支及：", ["保單的分紅/不分紅", "保險公司目標", "經濟變化", "以上所有各項"], 3, ""], [968, 1, "1.3.1b", "採用英國式慣例的保險人，稱意義與分紅保單相同的保單為:", ["公平保單", "有利潤保單", "賺取利潤保單", "賺取紅利保單"], 1, ""], [969, 1, "1.3.1b(a)註", "英式「有利潤」的壽險保單不獲「紅利」取而代之，它們往往將英式紅利附加\n於保單應付的保額，並於到期時一併支付，這種英式紅利稱為？", ["延期紅利", "未來現金", "復歸紅利", "非即時紅利"], 2, ""], [970, 1, "1.3.1b註", "在香港的分紅人壽保險單通常跟隨美國方式派發紅利(dividend)，在英式的人\n壽保險中，與紅利相近的用語為:", ["利潤(profit)", "英式紅利(bonus)", "可分配盈餘(divisiblesurplus)", "利潤分紅(profitparticipation)"], 1, ""], [971, 1, "1.3.1b註", "在英式慣例的保險產品中，有利潤保單通常會支付「期末紅利」。下列哪項陳\n述有關「期末紅利」是正確的？", ["等於現金紅利", "可即時支付", "在退保時才可支付", "在支付保險金時才可支付"], 3, ""], [972, 1, "1.3.2a", "下列哪項不是自然保費制度的特性？", ["隨著年齡的增長增加保費", "對保險人有不利影響", "續保時，對保單所有人帶來實際問題", "隨著年齡的增長而減少保費"], , ""], [1036, 2, "2.1.1", "香港常見定期壽險的保障期最短為:", ["一個月", "一年", "五年", "二十年"], 1, ""], [1037, 2, "2.1.1", "定期壽險保單的利益，只於死亡時候保單仍屬有效時情況，以下哪種或哪些情\n況下才給付？", ["被保險人在整個保險期內仍然生存", "被保險人患上危疾", "於指明保單期限內死亡", "於指明保單期限之後死亡"], 2, ""], [1038, 2, "2.1.1", "以下哪種保險最不大可能索償？", ["定期壽險", "終身壽險", "儲蓄壽險", "純生存保險"], 0, ""], [1039, 2, "2.1.1", "根據定期人壽保險的有效索償是需要符合以下哪些或哪項？", ["可保權益在保障生效時已經存在", "在死亡發生時，保單仍然生效", "死亡在指定時間內發生", "以上各項皆是"], 3, ""], [1040, 2, "2.1.1", "以下哪項不屬於儲蓄壽險合約的特點？", ["保險於指明期限過後便告期滿", "保單可以是分紅的或不分紅的", "它包含一項重大的儲蓄成份", "只會於保單期滿時仍然生存才支付保額"], 3, ""], [1041, 2, "2.1.1", "以下哪項定期壽險的描述不正確？", ["通常不具有分紅成份", "不大可能具有現金價值", "好似終身壽險，是純保障產品", "它是最便宜的人壽計劃"], 2, ""], [1042, 2, "2.1.1a", "如果對人壽保險有短暫的需求，而所需求的財務金額在該段時期都不會增加或\n減少，並且該需求會在指明的期間後便告消失，以保險成本為一重要的考慮因\n素，以下哪一項人壽保險不太可取？", ["定額定期壽險", "可轉換遞減定期壽險", "分紅儲蓄壽險", "非分紅儲蓄壽險"], 2, ""], [1043, 2, "2.1.1a", "下列哪項不屬於遞減定期壽險的典型應用例子?", ["信用壽險", "家庭收入壽險", "萬用壽險", "抵押贖回壽險"], 2, ""], [1044, 2, "2.1.1a", "定額定期壽險最適合以下哪個情況？", ["被保險人的退休儲備", "作為指定年齡後的年金", "一份沒有以分期形式償還的貸款", "為到期時而繳交的學費"], 2, ""], [1045, 2, "2.1.1a", "有一種保單，它就指定有效期內出現的死亡給付利益，並為該保單每年相同的\n利益設定相同的保費，這種保單稱為：", ["終身壽險", "定額定期壽險", "固定限期壽險", "不變動定期壽險"], 1, ""], [1046, 2, "2.1.1a", "以下哪種保險種類是為借款人在未完全償還欠款之前死亡，直接向投保人支付\n保險欠款？", ["儲蓄壽險", "信用壽險", "萬用壽險", "抵押贖回壽險"], 1, ""], [1047, 2, "2.1.1a", "下列哪三項屬於遞減定期壽險的典型例子？\ni)信用壽險\nii)家庭收入壽險\niii)萬用壽險\niv)抵押贖回壽險", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 1, ""], [1048, 2, "2.1.1a", "以下哪項是定期壽險的類別?\ni)定額定期壽險\nii)遞增定期籌險\niii)可轉換定期壽險\niv)遞減定期壽險", ["i,ii,iv", "i,iii,iv", "ii,iii,iv", "i,ii,iii,iv"], 0, ""], [1049, 2, "2.1.1a", "遞減定期壽險尤其適合:", ["一項逐漸減少的短期需要", "一項逐漸增加的短期需要", "一項保費維持不變的短期需要", "以上各項皆不適合"], 0, ""], [1050, 2, "2.1.1a", "遞減定期壽險適合應付以下哪個或哪些情況？", ["以分期方式償還的抵押貸款", "以5年分期方式支付的租賃合約", "若雙親早逝的學費負擔", "符合以上所有各項"], 3, ""], [1051, 2, "2.1.1a", "遞減定期壽險指：", ["利益每年遞減", "保險費每年遞減", "利益與保險費每年遞減", "付給代理人的佣金每年遞減"], 0, ""], [1052, 2, "2.1.1a", "當受保人去世時，賠償會直接向貸款人償還貸款餘額，這是什麼類型的保險？", ["遞增定期壽險", "信用壽險", "家庭收入壽險", "抵押贖回壽險"], 1, ""], [1053, 2, "2.1.1a", "某人供錢購買一個住宅單位。根據貸款的安排，他於十年內每年支付利息及部\ 於可續保定期壽險的描述是正確的?", ["在續保時,其保費增加以反映其年齡之提高", "在續保時,其保額只可相同或小於其原有保障額", "於續保時,無須提供可保性證明", "以上所列各項"], 3, ""], [1069, 2, "2.1.1b(b)", "可轉換定期壽險可能會導致逆選擇.下列哪項是為防止逆選擇而設置的限制?\ni.超過某一年齡(例如55歲)之後,可能不准轉換\nii.新計劃(長期保險)保額必須高於目前保單\niii.保單實施若干年後,不可轉換\niv.新計劃(長期保險)保額不得高於目前保單", ["i,ii", "i,ii,iii", "i,iii,iv", "ii,iii,iv"], 2, ""], [1070, 2, "2.1.1b(b)", "可轉換定期壽險可能會設置某些限制。但是，下列哪一項並不包括其中：", ["超過某年齡後，不允許轉換", "轉換時一般需要可保性證明", "就計劃保額的上限不能高於原有計劃", "只有在所述年期內才允許轉換"], 1, ""], [1071, 2, "2.1.1b(b)", "人壽保險中可轉換的特權，是將保單轉換為永久計劃，而永久計劃的保費：", ["與原有的保險保費相同", "以受保生命的原本年齡的保費率計算", "以受保生命的到達年齡的保費率計算", "按同類保險計劃的標準保費率及一種指明的特定折扣計算"], 2, ""], [1072, 2, "2.1.1b(b)", "人壽保險中賦予保單所有人權利，在毋須提供可保性證明的情況下，將保單改\n變為永久計劃，這稱為：", ["可轉換", "可續保", "可轉讓", "非永久"], 0, ""], [1073, 2, "2.1.1b(b)", "駱先生大學畢業不久，沒多少錢可以用於買人壽保險，然而將於明年結婚。為\n什麼你認為他應該考慮購買可轉換定期壽險？", ["可轉換定期壽險的保費頗低，又給保單所有人靈活性，選擇在無須提供可保證明的情況下把保單轉為永久計劃", "可轉換定期壽險給保單所有人靈活性，選擇在無須提供可保證明的情況下把保單轉換為更便宜的計劃", "可轉換定期壽險保費頗低，又給保單所有人靈活性，選擇在無須提供可保證明的情況下把保單轉換為聯合壽險計劃", "對年不過三十的人來說，可轉換定期壽險最適合不過"], 0, ""], [1074, 2, "2.1.1b(b)", "如果一般人壽保險中標明「可轉換的」則表示:", ["保單可隨時被保險人結束", "保險人可更改為另一種計劃", "保單持有人可更改為另一種計劃", "保單持有人可自由選擇以那一種貨幣繳費"], 2, ""], [1075, 2, "2.1.2", "儲蓄壽險並不便宜，以下哪項是正確的描述：", ["索償不一定出現", "索償只會在保單期滿時出現", "索償會在保單期滿時或之前出現", "索償會在保單期滿前出現及期滿後再次出現"], 2, ""], [1076, 2, "2.1.2", "下列哪類索償只出現於儲蓄壽險?", ["死亡索償", "期滿索償", "退保索償", "以上各項皆是"], 1, ""], [1077, 2, "2.1.2", "黃先生希望他的兒子在20年後得到最大的保險利益.若不考慮保費的因素,以下\n哪項可提供最大的利益予其兒子?", ["定期壽險", "終身壽險", "儲蓄壽險", "分紅儲蓄壽險"], 3, ""], [1078, 2, "2.1.2", "如果保單所有人同是受保人,以下哪項壽險他最有可能且期待索償的?", ["定期壽險", "儲蓄壽險", "分紅終身壽險", "不分紅終身壽險"], 1, ""], [1079, 2, "2.1.2", "儲蓄壽險的概念是指純生存保險加上：", ["定期壽險", "終生壽險", "家居保險", "商業保險"], 0, ""], [1080, 2, "2.1.2", "儲蓄壽險並不便宜，以下哪項是正確的描述：\ni)它可以是分紅或不分紅\nii)它亦稱純生存保險\niii)保單利益在期滿前或期滿時支付\niv)一般情況，保費供款至期滿", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 2, ""], [1081, 2, "2.1.2", "純生存保險是一種有別於普通形式的人壽保險，唯一可以得到利益的要求是受\n保人:", ["在意外中逝世", "在保險期間內仍然生存", "是一位在保險期限內去世的兒童", "在保險期滿時仍是一項可保因素"], 1, ""], [1082, 2, "2.1.2", "就儲蓄保險而言，下列哪三項是正確的？\ni)死亡時才會支付保額\nii)保單可以是分紅或不分紅\niii)保額於保單期滿或早逝時支付\niv)保單利益可向受保生命本人支付", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 3, ""], [1083, 2, "2.1.2", "以下哪項產品，受保生命自行取回保險利益是正常的？", ["儲蓄壽險", "定額定期壽險", "遞減定期壽險", "終身壽險"], 0, ""], [1084, 2, "2.1.2", "在二十年的儲蓄壽險裏，若受保人士在第十年不久之後逝世，賠償會：", ["面額的50%", "全數保額一次過即時支付", "在十年後才支付", "在意外死亡後才支付"], 1, ""], [1085, 2, "2.1.2(b)", "一份罕見人壽保險產品，這產品只有在受保生命在保障期間結束時仍然生存才\n支付保險利益，這份壽險是：", ["儲蓄壽險", "定期壽險", "延期年金", "純生存保險"], 3, ""], [1086, 2, "2.1.3", "下列哪項或哪些是一份由保單所有人維持有效的終身壽險的特點？", ["索償遲早都會出現", "該份保單可能會維持有效達數十年之久", "該份保單應可取得一個退保價值", "以上所有各項"], 3, ""], [1087, 2, "2.1.3", "終身壽險的特點為:", ["只對指定時期內的死亡支付賠償", "任何時候受保生命去世,即支付保額", "在某一特定日期前死亡支付賠償", "保險人按月支付補償給投保人"], 1, ""], [1088, 2, "2.1.3", "下列哪項或哪些關於終身壽險保單的陳述是正確的?", ["保單不可能建立在有分紅的基礎上", "有時需終身繳付保費", "保費可以繳付到一定年齡，到時侯保單便期滿", "以上所有各項"], 1, ""], [1089, 2, "2.1.3", "如一份沒有指明期限，而且只能在受保人死亡時才支付保額的保單是:", ["定期壽險", "終身壽險", "儲蓄壽險", "純生存保險"], 1, ""], [1090, 2, "2.1.3", "以下哪項不大可能是終身壽險保費的各種變化？", ["終身繳付保費", "於限定期間內支付", "於指定年數之後，停止繳付", "保單生效時，以一筆過方式支付"], 3, ""], [1091, 2, "2.1.3", "一份不分紅終身壽險：", ["只會於指定期間結束時才給付保單利益", "就不論甚麼時間出現的死亡，均會給付保額", "於受保生命仍然在世期間給付指定的利益", "只會就指定期間內出現的死亡給付保單利益"], 1, ""], [1092, 2, "2.1.3", "以下哪項或哪些關於終身壽險的描述是不正確的？\ni保額按年不斷減少\nii保單不可選擇分紅成份\niii保單可終身繳付保費\niv只可在合理時限內死亡才支付保險利益", ["i,ii", "i,iii", "i,ii,iv", "i,ii,iii,iv"], 2, ""], [1093, 2, "2.1.3", "關於終身壽險，下述哪三項不正確?\ni)可支付的死亡保險金每年遞減\nii)只有在受保生命去世時，才可支付死亡保險金\niii)只有經過固定年數之後，才可支付死亡保險金\niv)經過固定年數或者早逝的時候，便支付死亡保險金", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 2, ""], [1094, 2, "2.1.3(a)", "終身壽險的保費可以下列哪種或哪些形式繳交：", ["在達致一定年齡後便無須再繳交", "只須在一指定年數內繳交", "於受保生命仍然在世的整段期間繳交", "視乎情況，可以採用上述任何一種形式繳交"], 3, ""], [1095, 2, "2.1.3(a)", "以下哪項不是終身壽險的繳付保費方法？", ["終身繳付", "按指定年數", "指定年齡前繳付", "保險人低息貸款支付保費"], 3, ""], [1096, 2, "2.1.3(a)", "有一種終生壽險於投保人在生時一直繳付保費直至死亡，這種保單稱為連續繳\n費終生壽險保單或：", ["純粹壽險", "永久終生壽險", "連續終生壽險", "不固定保費保險"], 0, ""], [1097, 2, "2.1.3(a)", "一份人壽保險單如稱為「連續繳費終身壽險單」，則意味著:", ["受保人只需繳付一份保費", "在保險期內保費不變", "在限定期間受保人在去世後，仍需繳付保費", "受保人須終身繳付保費"], 3, ""], [1098, 2, "2.1.3(a)(i)", "純粹壽險是指：", ["保單不適用附約或其他保障", "保額在意外死 , 3, "3.1.1&3.1.2", "豁免保費附約與殘疾收入附約比較時:", ["兩者並無分別", "只有豁免保費附約才會受等候期限制", "只有殘疾收入附約才會在完全殘疾時提供收入", "只有豁免保費附約才會在完全殘疾時提供收入"], 2, ""], [1165, 3, "3.1.1(c", "關於保費繳付頻率的更改，豁免保費附約的規定：", ["在任何時候，都可以要求更改", "在任何情況下，更改是不允許的", "在殘疾保險生效期間，更改是不允許的", "在殘疾保險生效期間，從按月繳費更改到按年繳是允許的"], 2, ""], [1166, 3, "3.1.1(a", "下列那兩項對殘疾豁免保費的描述是不正確的？\ni.從保單所有人遭受到殘疾起計至等候期完結後，保費才開始被豁免\nii.從保單所有人遭受到殘疾之時計起，保費才開始被豁免\niii.等候期通常是三個月或六個月\niv.保單所有人的年齡是沒有限制的", ["i及ii", "ii及iv", "iii及iv", "i及iv"], 1, ""], [1167, 3, "3.1.1(d)", "下列哪三項較可能是豁免保費(WP)附約的除外責任？\ni.保單生效前既存的狀況\nii.在從事違法活動時導致的殘疾\niii.因受僱用及其過程導致的殘疾\niv.戰爭時服兵役導致的殘疾", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 1, ""], [1168, 3, "3.1.1(d)", "以下哪項是殘疾豁免保費附約的描述是正確的?\ni.保險人放棄收取本來應收保費的權利\nii.代表保單將會終止\niii.保單紅利仍然累積\niv.可附加於不同類型的壽險", ["i,ii", "i,iii", "i,iii,iv", "ii,iii,iv"], 2, ""], [1169, 3, "3.2", "以下哪項不是意外死亡及喪失肢體(AD&D)的常用條款?", ["吸煙者限制", "應付金額", "等候期", "不是預繳或貸款"], 0, ""], [1170, 3, "3.2.1", "意外死亡保險利益附約支付利益的準則,死亡必須於?", ["意外身體受傷後一段指定時間內發生", "有關基本計劃須包含豁免保費附約", "在受保保單所有人昏迷時死亡", "即時死亡"], 0, ""], [1171, 3, "3.2.1", "在意外死亡保險利益的先決條件下，死亡必須發生於意外後的一段時間，該段\n時間通常指:", ["即時", "24小時内", "保單期限額滿前", "受傷後指定期間"], 3, ""], [1172, 3, "3.2.1註", "意外死亡保險利益(ADB)被稱為雙倍賠償利益(DoubleIndemnity\nBenefit)，在這裡的英文名稱技術上並不準確，因為：", ["彌償只應用於定期壽險", "人壽保險不受彌償所限制", "在正常情況下須額外支付兩倍的保險利益", "唯有是由意外引致死亡才會賠償"], 1, ""], [1173, 3, "3.2.1(a)", "以下哪項是意外死亡保險利益附約的正確描述？\ni.此類屬「重複保險」\nii.與基本保單條款相若，第一年為自殺免責期\niii.受保死亡由意外事故導致\niv.一般情況下，死亡保險金與保單保額相同", ["i,ii,iv", "i,ii,iii", "iii,iv", "ii,iii,iv"], 2, ""], [1174, 3, "3.2.1(a)(ii)", "一個人喪失兩肢，他擁有\"意外死亡及喪失肢體(AD&D)附約\"。在甚麼情況下，\n他不被獲取賠償？\ni因蓄意傷害自己身體\nii因在戰爭中喪失肢體\niii因參與高危之項目\niv在打劫情況下被劫掠者傷害的無辜人仕", ["i,ii", "i,ii,iii", "i,iii,iv", "i,ii,iii,iv"], 1, ""], [1175, 3, "3.2.1(a)", "在意外發生後身體喪失多個肢體，隨後更因此而死亡，根據意外死亡及喪失肢\n體的條款，可獲得的賠償是：", ["死亡保險金的總數", "並不獲得任何賠付", "相等於死亡保險金再加上一倍的賠付金額", "相等於死亡保險金再加上雙倍的賠付金額"], 0, ""], [1176, 3, "3.2.1(b)", "根據意外死亡及喪失肢體附約，因意外事故引致意外死亡或喪失兩肢可獲得的\n賠償為：", ["死亡或喪失兩肢的保險利益是一樣的", "死亡的賠償高於喪失兩肢", "喪失兩肢的賠償高於死亡", "死亡及喪失兩肢的保險利益不一樣"], 0, ""], [1177, 3, "3.2.1(b)(iv)", "某人因一宗嚴重的交通意外而死亡。初時，傷勢只是失去兩個肢體，但該名受\n害人一星期後因傷重而死亡，如果他的人壽保單加有意外死亡及喪失肢體附約\n，保單將會支付：", ["保額而已", "保額的2倍", "保額的3倍", "保額的4倍"], 1, ""], [1178, 3, "3.2.1(b)", "若意外事故導致受保生命喪失單肢或單目失明，或遭受其他較輕微的指明受傷\n，給付額為:", ["意外死亡賠償金額的100%", "相等於意外死亡保險金的規定比率", "扣減自負額後的保險金的規定比率", "扣減醫療費用後的保險金的規定比率"], 1, ""], [1179, 3, "3.3", "以下哪項就提前支付死亡保險利益附約的陳述是正確的?\ni.此附約亦稱為生前支付保險利益附約\nii.此附約只適用於如癌症般的嚴重疾病\niii.於極度悲傷或生命受到威脅情況下可提取\niv.該支付可能會影響受益人的期望", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 2, ""], [1180, 3, "3.3(c)", "根據提前支付死亡保險利益條款，在某些嚴重的情況下，縱使死亡並未發生，\n保單所列明的死亡金是可以支付給保單所有人，但：", ["受益人/承讓人必須簽署棄權聲明", "受益人同樣可以取回所有索償", "受益人如果在受保人死後兩年內便可獲取所有索償", "受益人只可取回保費"], 0, ""], [1181, 3, "3.3.1(e)", "以下哪些不是危疾保險利益附約設定的保障限制？\ni)危疾保障生效僅適用於某歲數以下的人\nii)不適用於次標準風險；\niii)一般可以長達5年的等候期\niv)必須累積一定的現金價值", ["i,ii", "i,ii,iii", "iii,iv", "i,iii"], 2, ""], [1182, 3, "3.3.1(e)", "以下哪些是危疾保險利益附約設定的保障限制？\ni)必須累積某數額或以上的現金價值\nii)危疾保障生效僅適用於某歲數以下的人\niii)多重疾病和復發性的疾病可能不會獲得給付，某一兩類疾病或屬例外\niv)遂漸減少的自負額", ["i,ii", "ii,iii", "i,iii,iv", "i,iii"], 1, ""], [1183, 3, "3.3.1(e)", "以下哪些是危疾保險利益附約設定的保障限制？\ni)可長達5年的可異議期\nii)逐年減少的免賠額\niii)等候期\niv)危疾保障生效僅適用於某歲數以下的人", ["i,ii", "i,ii,iii", "iii,iv", "i,iii"], 2, ""], [1184, 3, "3.3.1", "以下哪項是危疾保險利益的賠償限制?\ni.被診斷患上指明疾病\nii.被診斷患上終末疾病並只有18個月或更短的壽命\niii.有必要接受指明的醫療程序\niv.僅適用60歲或以下的受保人", ["i,ii", "i,iii", "ii,iii,iv", "i,iii,iv"], 1, ""], [1185, 3, "3.3.2", "長期護理的等候期是:", ["30", "60", "90", "120"], 2, ""], [1186, 3, "3.4.1(a)", "自願醫保計劃推動個人住院保險產品的發展，並為香港保險人帶來甚麼機會?", ["自願醫保容許參與的保險人提供受認可的個人償款住院保險產品，供消費者自願選購", "自願醫保容許參與的保險人提供受認可的個人及團體償款住院保險產品，供消費者自願選購", "自願醫保容許參與保險人提供受稅務局認可的個人償款住院保險產品，供消費者自願選購", "自願醫保容許參與保險人提供受稅務局認可的個人償款住院保險產品，僅供"], 0, ""], [1187, 3, "3.4.1(a)", "香港居民自由購買\n自願醫保計劃（簡稱「自願醫保」）為保險買家提供了甚麼的機會?", ["自願醫保為沒有能力承擔私營醫療服務的消費者提供保險計劃", "自願醫保為沒有獲僱主提供醫療保險的消費者提供保險計劃", "自願醫保為願意及有能力使用私營醫療服務的消費者提額外的保險計劃選擇", "自願醫保為沒有能力承擔私營醫療服務的消費者提供保險低收入保險計劃"], 2, ""], [1188, 3, "3.4.1(b)", "湯姆在自願醫保計劃下，一共購買了3份保單，受保人分別是自己，妻子及兒子\n，繳付的認可產品的合資格保費，可作薪俸稅和個人入息課稅的稅務扣減。湯\n姆的合資格保費的全年稅務扣減上限為多少?", ["4000", "8000", "12000", "24000"], 3, ""], [1189, 3, "3.4 保保單所有人可得到該賠償？", ["車禍", "游泳時，遭受鯊魚襲擊", "旅行時，受持械搶劫的人槍擊", "以上所有各項"], 3, ""], [1235, 3, "3.2.1", "受保保單所有人於一次意外多項傷殘，並在喪失肢體後一個星期死亡，一份加\n有意外死亡及喪失肢體附約的壽險會如何賠償？", ["賠償保額而已", "雙倍償還，但所涉意外必須涉及公共交通工具", "賠償保額及與額外一筆與保額相同的金額", "賠償金額及額外一筆相等於雙倍保額的金額"], 2, ""], [1236, 3, "3.2.1", "以下哪項對意外死亡及喪失肢體的描述是正確的?\ni)又稱為雙倍賠償利益\nii)與基本保障同樣受到一年的自殺免責期約束\niii)發生意外而引致死亡時可得到額外利益\niv)正常情況下得到相等於保額的兩倍金額", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 2, ""], [1237, 3, "3.2.1(a)", "在意外死亡保險利益附約中，下列哪項死因一般是除外的？", ["遭搶劫的歹徒殺害", "橫過馬路時死於一宗交通意外", "作為一名乘客的時候，死於撞機意外", "作為一名艙務員的時候，死於撞機意外"], 3, ""], [1238, 3, "3.2.2(a)", "在意外死亡保險利益有關「喪失肢體」的條款內,受保保單所有人在意外中喪失\n甚麼,保險人才會給付一筆與死亡賠償相等的金額?", ["喪失一肢", "一目失明", "喪失一肢或一目失明", "喪失一肢及一目失明"], 3, ""], [1239, 3, "3.2.1(a)", "雙倍賠償利益是指意外死亡由身體受傷而引起:", ["保單保額雙倍賠償", "保額意外的殮葬費", "現金紅利的兩倍", "以繳交保費兩倍的退保費"], 0, ""], [1240, 3, "3.2.1(a)", "就意外保險而言，近因的應用為何這樣重要？", ["死亡及喪失兩肢時，會作出雙倍賠償", "意外事故導致受保生命喪失單肢或單目失明，會作出雙倍賠償", "喪失兩肢時，會作出雙倍賠償", "因為只有意外死亡，才會作出雙倍賠償利益"], 3, ""], [1241, 3, "3.2.1(a)", "在意外死亡保險利益附約中，下列哪項死因是受到保障:", ["自殺(保單生效有4年)", "企圖入屋行劫時被戶主開槍擊斃的賊人", "乘坐飛機的購票乘客，死於撞機意外中身亡", "駕駛自己的私人飛機，死於撞機意外中身亡"], 2, ""], [1242, 3, "3.2.1(a)", "在意外死亡保險利益附約中，下列哪項死因是除外的:", ["遭搶劫的歹徒殺害", "橫過馬路時死於一宗交通意外", "作為一名乘客的時候，死於撞機意外", "作為一名艙務員的時候，死於撞機意外"], 3, ""], [1243, 3, "3.2.1(a)", "下列哪項或哪些關於意外死亡保險利益附約的陳述是正確的？", ["不存在任何除外責任", "意外死亡，可在本計劃上所支付的金額之上多獲支付一筆款項", "它提供彌償性的支付", "以上所有各項"], 1, ""], [1244, 3, "3.2.1(a)", "意外死亡保險利益亦稱為：", ["雙倍賠償利益", "意外賠償利益", "雙倍意外利益", "額外死亡利益"], 0, ""], [1245, 3, "3.2.1(a)", "在人身意外保險中，被保險人喪失肢體，惟以下3項均得不到賠償：\ni)企圖自殺\nii)在服役期間戰爭引致傷殘\niii)參予危險活動時引致傷殘\niv)在銀行劫案中被傷害引致傷殘", ["i,ii,iii", "i,ii,iv", "ii,iii,iv", "i,iii,iv"], 0, ""], [1246, 3, "3.2.1(a)", "意外死亡保險利益，受傷而導致死亡必須在下列的指定時期內發生？", ["即時發生", "24小時內發生", "1星期內發生", "於該受傷的一年之內發生"], 3, ""], [1247, 3, "3.2.1(a)(ii)", "意外死亡及喪失肢體附約的除外責任包括下列哪項或哪些？", ["自殺", "與戰爭有關的傷殘", "作為非購票乘客於空難中導致的傷殘", "以上所有皆是"], 3, ""], [1248, 3, "3.2.1(a)註", "意外保險中，「雙倍賠償利益」在技術上不適用於人壽保險，因為：", ["導致意外的原因可能是不保事項", "彌償只適用於財產保險", "此利益不適用於自然死亡", "給付保額實際上不是彌償，是屬於利益"], 3, ""], [1249, 3, "3.2.1(a)註", "以下哪項有關雙倍賠償利益附約(doubleIndemnity\nbenefit)的陳述是不正確的？", ["只適用於第3者保險", "引起死亡的近因對這附約很重要", "嚴格來說，它的英文術語在技術上是不正確", "它是意外保險利益附約的另一名稱"], 0, ""], [1250, 3, "3.2.1(a)註", "經常被稱爲雙倍賠償利益(doubleIndemnitybenefit)。\n“Indemnity”這英文詞彙，技術上並不準確，因為:", ["人壽保險不受彌償原則所限制", "人壽保險並不屬於賠償保險(insuranceofindemnity)", "賠償不一定是保額的兩倍", "死亡必須由意外而引發才可獲賠償"], 0, ""], [1251, 3, "3.2.1(a)註", "壽險保單中的雙倍補償利益，如果死亡由意外身體受傷引致:", ["保險人會支付相當於保單保額兩倍的金額", "在保額以外再支付殮葬費用", "支付一筆相等於現存紅利兩倍的金額", "支付一筆相等於已繳保費兩倍的退保費"], 0, ""], [1252, 3, "3.2.1(a)註", "意外導致死亡時，意外死亡保險利益附約會支付一筆與保單保額相等的額外款\n項。因此這亦稱為：", ["雙倍利益附約", "雙倍賠償利益", "意外死亡紅利", "意外死亡增值安排"], 1, ""], [1253, 3, "3.2.1(a)註", "在決定是否支付雙倍賠償利益時，由於必須確定受保生命死亡的原因，下列哪\n項保險原則變得很重要：", ["彌償", "近因", "可保權益", "最高誠信"], 1, ""], [1254, 3, "3.2.1(a)註", "以下哪項或哪些在人壽保險所附帶的「其他意外保險利益」中，其他利益包括?", ["嚴重燒傷", "每日住院津貼", "殘疾期間的每週津貼", "以上各項皆是"], 3, ""], [1255, 3, "3.2.1(b)", "下列哪項屬於意外及喪失肢體附約中，「喪失肢體」部份的一般特點？\ni)喪失肢體是指肢體的實質斷離及失去其功能\nii)其他保障不包括喪失單肢\niii)經修訂的保障為喪失單肢支付死亡保險金的規定比率\niv)對方因一宗意外而引致的傷殘，喪失肢體利益及死亡保險金同時支付", ["i,ii", "iii,iv", "i,iii", "i,ii,iii,iv"], 2, ""], [1256, 3, "3.2.1(b)", "喪失肢體附約定義為:", ["某些保險人可能會將定義延至整條手臂或臀部以下部位", "保障涉及喪失該肢體功能", "喪失一個手指關節也可得到賠償", "附有每周住院津貼保障"], 1, ""], [1257, 3, "3.2.1(b)", "意外死亡及喪失肢體附約受保生命在意外事故中可得到一筆與死亡保險金相等\n的賠償金,經修改後受保人可收取50%保險金若意外事故導致:", ["喪失一腿", "喪失一目", "喪失一手", "以上各項皆是"], 3, ""], [1258, 3, "3.2.1(b)", "意外死亡及喪失肢體保險附約使保險人在受保人意外中喪失肢體時給付賠償,提\n供經修改後的保障,則需:", ["喪失一肢或一目失明,提供賠償為保額雙倍", "喪失一手指或腳指,提供賠償為保額全數", "喪失一腿部或臂部,提供賠償為保額某個百分比", "喪失一肢或一目失明,提供賠償為保額一半"], 3, ""], [1259, 3, "3.2.1(b)", "根據意外死亡及喪失肢體附約，經修改的保障意外死亡保險收益，保險人亦可\n以包括以下情況：", ["喪失手指或腳趾會賠償保障金額", "臂部斷離會賠償保障金額", "喪失單肢會賠償保障金額的一半/規定比率", "單目失明會賠償兩倍保障金額"], 2, ""], [1260, 3, "3.2.1(b)", "根據意外死亡及喪失肢體附約中，「喪失肢體」是指?", ["嚴格地指喪失雙臂", "必須喪失一雙肢體(雙臂或雙腿)", "往往適用於單目失明(同時適用於喪失肢體)", "可用於雙目失明"], 2, ""], [1261, 3, "3.2.1(b)", "下列哪項屬於意外及喪失肢體附約中，「喪失肢體」部份的一般特點:\ni)喪失肢體是指肢體的完全斷離或喪失肢體的功能\nii)喪失單肢給付額等於意外死亡保險金的規定比率\niii)喪失視力\niv)對方因一宗意外而引致的傷殘，喪失肢體利益及死亡保險金同時支付", ["只有i,ii", "只有iii,iv", "只有i,ii,iii", "i,ii,iii,iv"], 2, ""], [1262, 3, "3.2.1(b)", "在意外死亡保險收益，喪失肢體在於實際喪失由手腕或足踝關節處以上完全斷\n離作定義。但保險人亦可以包括以下情況：", ["臂部及肩斷離開始才作賠償", "一根手指或腳指之斷離也作賠償", "包括喪失肢體功能", "喪失任何2肢才作出賠償"], 2, ""], [1263, 3, "3.2.1(b)", "下列哪項與意外死亡及喪失肢體(AD&D)附約有關的評論是正確的？\ni)喪失一肢可解釋作實際失去，或失去其功能\nii)喪失一肢，則給付相當於死亡金的數額\niii)喪失兩肢，則給付相當於死亡金的數額\niv)喪失肢體利益也適用於意外引致的失明", ["i,ii", "i,iii", "i,iii,iv", "ii,iii,iv"], 2, ""], [1264, 3, "3.2.2(a)", "附加於人壽保險的「其他意外保險利益」的意外身體損傷利益給付表，通常列\n出下列哪項或哪些情況下應付的利益？", ["死亡而已", "死亡及喪失視力的受傷而已", "死亡、喪失視力及喪失主要肢體的受傷而已", "上述所有各項，連同各種指定的較輕程度的傷殘"], 3, ""], [1265, 3, "3.2.2(b)", "意外保險利益的其他利益包括：\ni)嚴重燒傷\nii)每週津貼\niii)住院津貼\niv)雙倍賠償", ["i,ii", "ii,iii", "i,ii,iii", "以上各項都是"], 3, ""], [1266, 3, "3.2.2c", "附加於人壽保險的˹其他意外保險利益˼之除外責任,以下哪項並不包括:", ["被保險人被謀殺", "自殺", "參加違法活動時造成的傷殘", "疾病(除非由意外引致)"], 0, ""], [1267, 3, "3.2.2c", "以下哪項並不屬於其它意外保險利益的除外責任？", ["被搶劫時引致的受傷", "自殺", "自殘身體", "疾病(並非由意外引致)"], 0, ""], [1268, 3, "3.3", "提前支付死亡保險利益還可提供預先支付死亡保險金的一項附加保險，以下哪\n種情況可行使此項權利：", ["保險金可以支付給受保保單所有人", "會影響受益人的期望", "在極度悲傷的生命受到威脅情況下可提取", "以上各項皆是"], 2, ""], [1269, 3, "3.3", "容許全部或部分死亡保險金支付給仍然在生的保單所有人的條文為:", ["意外死亡及喪失肢體附約", "生前支付保險利益附約", "死前補償附約", "特許死亡保險金附約"], 1, ""], [1270, 3, "3.3", "提前支付死亡權益附約可附加在人壽保險單中，以下哪項描述是正確的？", ["只適用於分紅保單", "只適用於保障額較少的保單", "只適用於保障額較大的保單", "在是次申請，必須經過第二次體檢"], 2, ""], [1271, 3, "3.3", "一份保單包含提前提前支付死亡保險利益附約,這代表:", ["這份保單可轉換為儲蓄壽險", "這份保單已加入殘疾利益", "受保保單所有人可於生命結束前支取保險利益", "受保保單所有人年屆100歲時,可支取保險利益"], 2, ""], [1272, 3, "3.3", "「提前支付死亡保險利益」又稱為:", ["生前支付保險利益", "快捷給付保險利益", "儲蓄保險", "死前給付保險利益"], 0, ""], [1273, 3, "3.3", "有時候壽險保單會加上生前支付保險利益附約，這種附約較普通的名稱稱為：", ["保費退還計劃", "死亡前利益計劃", "純生存形式保險利益", "生前支付保險利益附約"], 3, ""], [1274, 3, "3.3", "一份保單包含提前支付死亡保險利益附約,這代表:", ["這份保單可轉換為儲蓄壽險", "這份保單已加入殘疾利益", "受保保單所有人可於生命結束前支取保險利益", "受保保單所有人年屆100歲時,可支取保險利益"], 2, ""], [1275, 3, "3.3", "有時候壽險保單會加上生前支付保險利益附約，以下哪項為這種附約較普遍的\n名稱？", ["保費退還計劃", "死亡前利益計劃", "純生存形式保險利益", "提前支付死亡保險利益附約"], 3, ""], [1276, 3, "3.3(d)", "某份保險單附加了提前支付死亡利益保障，當保險人支付提前支付死亡利益時\n，發現該份保單已轉讓給承讓人，那麼：", ["不可給付任何保單利益", "承讓人需要簽署棄權聲明，方可提前支付死亡保險利益", "承讓人可從利益獲得者處得到補償", "與提前支付死亡保險利益的支付無關"], 1, ""], [1277, 3, "3.3.1", "以下哪項正確描述危疾保險利益附約支付利益?", [" 有關保證可保選擇，容許受保人作出購買增額保障的選擇，以下那項描述是不\n正確的：", ["自動獲得增額保障的選擇", "如不及時作出選擇，便會喪失權利", "部分保險人於備擇日期內提供定期壽險", "只可在指定限期內作出選擇"], 0, ""], [1307, 3, "3.5.1", "壽險保單容許保單持有人，在指定的日期購買增額保險，而毋須提供可保證明\n，稱為：", ["可保性選擇(InsurabilityOption)", "保證可保利益(GuaranteedInsurabilityBenefit)", "保證保險選擇(GuaranteedInsuranceOption)", "不可拒絕可保利益(Non-rejectedInsurabilityBenefit)"], 1, ""], [1308, 3, "3.5.1(a)", "保證可保利益的定義為：", ["保單所有人有權在指定的備擇日期購買增額保險，無需遞交可保證明", "保單所有人有權在任何時候購買增額保險，無需遞交可保證明", "保單所有人有權在指定的備擇日期購買增額保險，必需遞交可保證明", "保單所有人有權在任何時候購買增額保險，必需遞交可保證明"], 0, ""], [1309, 3, "3.5.1(a)", "保證可保利益有時附加於人壽保險單中,意思是:", ["附加保費以接受次標準風險", "付款以符合索償時的限制保額", "於特定日期時自動提供保險", "毋須提供可保性證明下購買增額保險"], 3, ""], [1310, 3, "3.5.1(c)", "已購買保證可保利益的保單所有人在指定的備擇日期沒有作出增額的選擇，會\n：", ["喪失未來所獲保證增額的權利", "喪失有關增額的權利", "可於任何時間再行使權利", "自動行使權利"], 1, ""], [1311, 3, "3.5.1(c)", "保證可保利益：", ["保單所有人有權在指定的備擇日期購買增額保險", "備擇日期沒有作出購買增額保障的選擇，就會喪失該項約定的權利", "增額保險的金額不能超過原有保單的面額", "以上各項皆是"], 3, ""], [1312, 3, "3.5.1(d)", "已購買預批購買選擇的保單所有人，可在以下哪個或哪些指定的備擇日期作出\n增額的選擇？", ["結婚", "子女的出生", "特定的日子或特定的事件", "以上各項皆是"], 3, ""], [1313, 3, "3.5.1(e)", "保證可保權益是指保單所有人在指定時間內可提高保險金額而毋須提供可保證\n明。在行使期間保單所有人若不幸死亡：", ["保險金額立即增加", "取回保單原有保額", "部份保險人會自動提供定期壽險額外保障", "死者親人可於三十天內向保險公司辦理手續"], 2, ""], [1314, 3, "3.5.1(f)", "如保險已加有豁免保費及預批購買選擇附約，而保單所有人在可以行使購買權\n時發現遭致傷殘，在此情況下，下列哪項為正確？", ["預批購買選擇會被取消", "豁免保費附約會被取消", "豁免保費及保證可保利益附約會被取消", "可自動獲得該額外保障，豁免保費附約也可以豁免所有保費"], 3, ""], [1315, 3, "3.5.1(f)", "如果一項保單有「保證可保權益」附約，被保險人可選擇增額的保障，而且保\n證接納；如果該份保單同時附帶「豁免保費支付」附約，而被保險人在決定行\n使該選擇權時，遭致殘障，那麼:", ["有關「保證可保權益」會取消", "增額的保障會自動生效", "直至被保險人康復，才會提供增額的保障", "被保險人可要求增額的保障，但可能獲拒絕"], 1, ""], [1316, 3, "3.6", "通貨膨脹可能會重大的降低壽險利益的購買能力，為了解決這個難題而設的特\n定條文或獨立的附約稱為：", ["購買能力條文", "生活指數調整利益利益", "通脹條文", "通脹調整條文"], 1, ""], [1317, 3, "3.6", "通貨膨脹對下列哪項保單的實質價值帶來負面影響？\ni)保額\nii)保費\niii)利益\niv)現金價值", ["i,iv", "i,iii", "i,ii,iii", "i,iii,iv"], 1, ""], [1318, 3, "3.6", "由於通貨膨脹關係，受保保單所有人擔心保額會受影響，他可以怎樣辦？", ["購買一份與綜合消費者物價指數掛鈎的保險計劃", "購買附有保證可保權益的保險計劃", "購買分紅保單以加大將來的保額", "預先購買高保障的保險計劃"], 0, ""], [1319, 3, "3.6", "通貨膨脹會降低貸幣的購買力，哪類保險應對此嚴加注意？", ["終身壽險按照指定的方式增加", "儲蓄壽險每年增加保額的5%", "殘疾收入保險生活指數調整利益附約，會定期增加保險賠償的利益，以下哪項是正確的？跟隨特定指數或獨立指數(例如綜合消費者物價指價)掛鈎", "按照保險公司的保費的百分比增加"], 3, ""], [1320, 3, "3.6.1", "稱為生活指數調整利益的附約的原意是：", ["對抗經濟週期的影響每年增加百分之五", "對抗通貨膨脹和通貨收縮兩者的影響通貨膨脹", "為罹患終末疾病的人發放部份保額包含了生活指數調整利益(COLA)的保單條款,為遭致殘疾的受保保單所有人提供周期性增加的殘疾收入保險利益,而增加的數目一般相等於:綜合消費者物價指數", "受保保單所有人薪金調整的幅度"], 3, ""], [1321, 3, "3.6.1", "遭致殘疾的受保保單所有人之日常醫療費用會因通貨膨脹而不斷增加,哪項保單\n條款可抵銷這項影響?", ["意外死亡保險利益", "豁免保費利益", "生活指數調整利益", "保證可保權益"], 2, ""], [1322, 3, "3.6.1", "以下哪三項是對生活指數調整利益附約的正確描述？\ni)等候期相等於1至6月不等\nii)它提供對被保人的殘疾收入增加的保障\niii)當被保人遭致殘疾期間，其殘疾收入會隨特定指數(例如綜合消費者物價指\n數)增加\niv)被保險保單持有人於殘疾後，其殘疾收入會定期增加", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 3, ""], [1323, 3, "3.6.1", "稱為生活指數調整利益的附約的原意是：", ["對抗物價通脹及物價通縮", "對罹患終末疾病的人支付部份保額", "於保險人盈利低於一般水平時，當補充紅利", "以上各項皆不是"], 3, ""], [1324, 3, "3.6.1", "COLA的英文全寫是：", ["壽險成本調整CostofLifeInsuranceAdjustment", "壽險/年金合同的補償CompensationofLife/AnnuityContract", "壽險利益補償CompensationofLifeAssuranceBenefit", "生活指數調整利益CostofLivingAdjustment"], 3, ""], [1325, 4, "4.4", "人壽保單通常允許保單所有人在保單有效時變更受益人的指定，在這情況下，\n該指定受益人稱為:", ["第一順位受益人", "第二順位受益人", "次順位受益人", "可撤換受益人"], 3, ""], [1326, 4, "4.11", "下列哪項或哪些不屬於壽險保單的賠付選擇？", ["保險人有權選擇賠付方法", "通常是整筆過支付", "用利益購買年金", "將收益保留在保險人處以賺取利息"], 0, ""], [1327, 4, "4.3", "下列哪項或哪些有關寬限期條款的陳述是不正確的？", ["它不適用於保單的首期保費", "繳付的保費被視作準時繳付", "寬限期一般為30日或31日", "寬限期可長達60日"], 3, ""], [1328, 4, "4.9", "以下哪項就保單轉讓的描述是正確的?", ["轉讓保單的人是承讓人也適用於自願變性的情況", "獲轉讓保單的人是轉讓人只容許保單利益向上調整", "轉讓保單涉及代價，是構成合約不能缺少的元素就誤報年齡或性別方面，人壽保險單通常：只容許保單利益向下調整", "試圖改變保單條款至以符合應有情況"], 3, ""], [1329, 4, "4.12.1", "根據「自殺條款」，當受保人死因有可疑，", ["舉證責任落在受益人身上", "舉證責任落在保險人身上", "舉證責任落在警方身上", "可假定死亡是由自殺引起"], 1, ""], [1330, 4, "4.10", "以下哪項屬於分紅保單的紅利選擇?\ni.用以購買保險公司股份\nii.以現金方式支付紅利\niii.如果保單所有人沒有作出紅利選擇，保單會採用「自動紅利選擇」的做法\niv.分紅保單於生效一段指定時間後可轉換成不分紅保單", ["iii,iv", "i,ii,iii", "ii,iii", "i,ii,iv"], 2, ""], [1331, 4, "4.1", "除非得到保單所有人的同意，否則不能修改該合約，這是包括在人壽保險合約\n的哪一項條款?", ["不可異議條款", "完整合約條款", "不能作廢條款", "寬限期條款"], 1, ""], [1332, 4, "4.8", "因混淆外國人名字，人壽保單簽發一段時間後，才發現該保單將女性受保人誤\n以為是男性，經相討後，如果保單所有人願意支付相同的保費金額，保險人會\n作出以下哪項修改？", ["退還由投保當日起計的所有保費", "將保單保額調高", "調低保單保額，以反映已繳付保費相符的正確保額", "調高保費，以反映保單少付的保費"], 1, ""], [1333, 4, "4.11", "在傳統的保單條文，以下哪項是給付保單利益時，給受益人或保單所有人的賠\n付選擇?", ["以保險公司的股份取代以現金方式支付保單利益", "以保單利益購買一份定期壽險作替代壽險", "在一段時期內，分期支付保單收益及利息", "以上各項皆是"], 2, ""], [1334, 4, "4.3", "下列哪項或哪些有關寬限期條款的陳述是不正確的？", ["它不適用於保單的首期保費", "繳付的保費被視作準時繳付", "這並非免費保險期", "寬限期一般為14日"], 3, ""], [1335, 4, "4.3", "通常保單條文指明一段的時間範圍，允許在保費到期日之後繳付而不受處罰，\n這樣的時間範圍通常稱為:", ["等候期", "續保期", "寬限期", "不可異議期"], 2, ""], [1336, 4, "4.7", "根據傳統人壽保險條文，保單復效可獲批準:", ["必須得到保險人的同意", "被保險人身故之前的任何時間", "被保險人的權利(受保單條文所約束)", "保單生效不少於兩年"], 2, ""], [1337, 4, "4.1", "人壽保險單是一份重要的合約，該合約是一份完整合約，以下哪項有關完整合\n約的描述是正確的?\ni.完整的合約包括保險單、任何夾附的附約及夾附的投保單複印本\nii.保險公司某些指定的高級職員才有權改保險合約\niii.必須得到保單所有人的同意才可修改合約內容\niv.保單合約已經是一份完整的合約，並無需要附加其他的檔案", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 0, ""], [1338, 4, "4.1", "以下哪項關於「完整合約」條款的描述是正確的？", ["在人壽保險索償時毋需出示保單的正本", "除非得到保單所有人的同意，否則不能對保險合約作出任何修改", "保險公司的指定高級職員有權對保單作出更改", "保單的內容已是一份完整的合約，並不包括其他文件"], 1, ""], [1339, 4, "4.2", "以下有關不可異議條款，哪項陳述是不正確的？", ["保單生效兩年後即不可異議", "保單生效首兩年為可異議期", "根據香港法律，即使是有欺詐的情況存在都不可以推翻該條款", "該條款規定了一段可異議期"], 2, ""], [1340, 4, "4.2", "一項典型的「不可異議」條款，為其目的訂下兩年的期限，該期限稱為：", ["無訴訟期", "不可異議期", "可異議期", "超出期"], 2, ""], [1341, 4, "4.4(c)", "張生買了一張人身意外壽險保單，自己為受保人，並訂明他的兒子為受益人，\n根據《已婚者地位條例》，張先生的保單，將達到建立一個（法定）信託的效\n用嗎?", ["會，《已婚者地位條例》明文合適用於人壽保險及人身意外保險", "會，但大前題下該保單由人壽保險人所發出", "不會，除非張先生就其配偶及或子女的利益而購買壽險單", "不會，除非該人身意外保險以附約形式加入於人壽保單"], 2, ""], [1342, 4, "4.4(c)", "張生買了一張人身意外壽險保單，自己為受保人，並訂明他的兒子為受益人，\n根據《已婚者地位條例》，此舉會否建立建立一個（法定）信託的效用嗎?", ["會，《已婚者地位條例》明文合適用於人壽保險及人身意外保險", "會，但大前題下該保單由人身意外保險人所發出", "不會，除非張先生就《已婚者地位條例》訂明，被保險人就自身生命購買保單", "不會，除非張先生所購買的是一份附有人身意保險附約的壽險保單"], 2, ""], [1343, 4, "4.4(c)", "如某壽險單符合《已婚者地位條例》所指明的情況，將會產生以下甚麼的法律\n效用?", ["所指定的受益人如為保單所有人的其配偶及/子女，將成為該保單的受託人", "這是條例隱含的法定轉讓，並惠及保單所有人的指定受益人", "信託效用自動產生，並惠及保單所有人的的其配偶及/子女等指定受益人", "所指定的受益人如為保單所有人的其配偶及/子女，將成為該保單的實益擁有"], 2, ""], [1344, 4, "4.4(c)", "人，直至保單所有人更改受益人為止\n如某壽險單符合《已婚者地位條例》所指明的情況，將會產生以下甚麼的法律\n效用?", ["所指定的受益人如為保單所有人的其配偶及/子女，將成為該保單的法定所有人", "所指定的受益人如為保單所有人的其配偶及/子女，將成為該保單的受託人", "所指定的受益人如為保單所有人的其配偶及/子女，將成為該保單的實益擁有人，直至保單所有人更改受益人為止", "信託效用自動產生，並惠及保單所有人的的其配偶及/子女等指定受益人"], 3, ""], [1345, 4, "4.4(c)", "黃生就自身生命購買壽險保單，自己為受保人，並指明他最小的兒子為該保單\n受益人，根據《已婚者地位條例》，此舉起了甚麼的法律效用?", ["該受益人成為該保單的法定保單所有人", "該受益人成為該保單的法定保單所有人，直至黃先生修訂其他受益人為止", "信託效用並不用適指定子女成為受益人", "該受益人成為該保單的實益擁有人"], 3, ""], [1346, 4, "4.5", "以下哪項是不能作廢條款的常規規定?", ["保單所有人可中止保單時獲付退保現金價值", "保單不會因為中斷繳付保費而失效，除非收到相反指示，否則保單的現金價值會被用作支付到期保費直至用完為止", "利用淨現金價值作為整付保費，購買與原保額相同的定期壽險", "利用淨現金價值作為整付保費，購買與原保單所提供的計劃相同的但保額較"], 1, ""], [1347, 4, "4.5", "低的人壽保險\n甚麼是「不能作廢」條款?", ["當保單已生效超過兩年，保險人無權取消保單", "當續保保費尚未繳交，現金價值可用以保持保單有效性", "保單所有人在沒有保險人的同意下無權終止保單", "當保單已全部索償，保單仍繼續生效"], 1, ""], [1348, 4, "4.5", "以下哪一項不是不能作廢條款下可作出的選擇?", ["接受一份減額清繳保險", "收回已支付的保費", "退保以取回保單內的現金價值", "以上各項皆不是"], 1, ""], [1349, 4, "4.5", "如果保單的持有人決定不再繳付任何保費，以下哪一項不是他有權選取的處理\n方法?", ["減額清繳保險", "退保取回現金價值", "以現金價值購買定期壽險", "要求保險人發放免息貸款支付保費"], 3, ""], [1350, 4, "4.7", "若要把已失效的人壽保單復效，以下哪項不是復效條件?", ["繳一筆復效費", "保險人書面同意", "繳付已到期而未繳清的保費及利息", "提供可保性證明"], 1, ""], [1351, 4, "4.7", "要保單復效，以下哪一項不是保單所有人受到的條件限制？", ["規定期間內提出復效要求", "只適用於已失效保單", "提供持續可保性", "只有現金價值的保單才可復效"], 3, ""], [1352, 4, "4.9", "以下哪項法律條文容許藉訂明手續來轉讓據法權產?", ["法律改革(綜合)條例", "衡平法的原則", "轉讓(據法權產)條例", "法律修訂及改革(綜合)條例"], 3, ""], [1353, 4, "4.9", "以下哪項有關抵押轉讓的描述是正確的?", ["它是永久性的轉讓安排", "承讓人對保單擁有單的一切擁有權", "保單仍可用作貸款", "以上各項皆不是"], 3, ""], [1354, 4, "4.9", "對保單權益屬轉讓需通過以下甚麼條件才可進行轉讓?", ["該項權益無論於一般保險或人壽保險單都屬復歸權益", "該項權益須屬現時的", "該項權益須透過訂明手續來轉讓據法權產", "該項權益屬轉屬轉讓人的可保權益"], 1, ""], [1355, 4, "4.9", "對保單權益屬轉讓需通過以下甚麼條件才可進行轉讓?", ["該項權益須透過訂明手續來轉讓據法權產", "該項權益須屬於轉讓據法權產", "該項權益屬轉屬轉讓人的可保權益", "擬轉讓的據法權產須屬現時的，延遲的或未來的"], 1, ""], [1356, 4, "4.9", "為什麼說一張壽險保單所有人只具有有限的權利轉讓該保單的產權？", ["轉讓一張保單的權利屬該保單的受益人而非保單所有人所有", "如果保單受益人已取得保單的權利，不得侵犯任何受益人既得的權利", "轉讓壽險單必須保險人的批准", "在典型壽險保單所規定的初段時間內轉讓保單必需保險人的批准"], 1, ""], [1357, 4, "4.9", "為什麼說一張壽險保單所有人只具有有限的權利轉讓該保單的產權？", ["轉讓一張保單的權利屬該保單的受益人而非保單所有人所有", "轉讓壽險單必須保險人的批准", "不得侵犯任何受益人，尤其是任何不可撤換受益人的任何既得權利", "在典型壽險保單所規定的初段時間內轉讓保單必需保險人的批准"], 2, ""], [1358, 4, "4.10註", "如果保單所有人沒有作出選擇，“自動紅利選擇”是指:", ["以現金方式支付", "儲存於保險人處以賺取利息或購買清繳增額保險", "用以購買保險公司股份", "用紅利繳付未來保費"], 1, ""], [1359, 4, "4.11", "人壽保險支付保險利益的方式:", ["必須是整筆支付", "必須包含一項以現金方式一次性支付的選擇", "總是以一連串的方式分期給付", "可按照保單訂明方式，選擇其中一種方法支付"], 3, ""], [1360, 4, "4.11(e", "終身收益選擇，是分期支付約定的保單收益(及利息)，這項選擇實際上是以該\n項保單收益作為整付保費，購買了甚麼?", ["儲蓄壽險", "投資相連壽險", "終身年金", "終身壽險"], 2, ""], [1361, 4, "4.12", "保險公司通常就索償提供的一種給付，出於善意或恩恤的目的，保險公司在法\n律上並沒有義務就這些索償提供給付，這給付稱為:", ["解除賠付", "恩恤賠付", "通融賠付", "額外賠付"], 2, ""], [1362, 4, "4.12", "以下哪項就自殺除外責任的描述是正確的?\ni.自殺屬除外責任\nii.保單生效初期，自殺被列為除外責任\niii.證明受保人死亡是由自殺引起的責任便落在保險公司身上\niv.受保人於自殺免責期自殺可能退還已付保費", ["i,ii", "i,ii,iii", "ii,iii,iv", "i,ii,iii,iv"], 2, ""], [1363, 4, "4.3", "以下哪兩項有關寛限期描述是正確的？\ni寬限期一般為30日或31日\nii適用所有保單，包括首期保費\niii就美式而言，除非繳清保費，否則保單會在寬限期後失效\niv就美式而言，如在寛限期未繳清保費，保單會在保費到期日失效", ["i,ii", "i,iii", "ii,iii", "ii,iv"], 1, ""], [1364, 4, "4.4(b)", "保單中的指定受益人有第一順位受益人及次順位受益人。第一順位受益人於受\n保人在生期間過身，受保人過世時，次順位受益人仍然在生。那麼保險金將分\n配給:", ["成為保單所有人的遺產", "由次順位受益人所擁有", "由保單所有人之繼承人所擁有", "由次順位受益人及保單所有人之繼承人平均分配"], 1, ""], [1365, 4, "4.5", "以下哪項不屬於不能作廢條款的選擇?", ["購買清繳保險", "取回保費", "購買展期保險以取代原有保單", "取回現金價值"], 1, ""], [1366, 4, "4.5(a)", "自動保費貸款(APL)是以什麼作為繳交保費的一種貸款？", ["以保單中的現金價值", "以樓宇作為抵押之貸款", "以私人貸款", "以上所有各項"], 0, ""], [1367, 4, "4.5(a)", "保單不會因為停止繳付保費而失效，這是指什麼條款?", ["不可異議條款", "不能作廢條款", "代位權", "彌償"], 1, ""], [1368, 4, "4.7", "要保單復效，保單所有人必須受到下列哪項或哪些條件限制？", ["繳付一筆復效費用", "補付已到期但未繳付的保費及利息", "重新計算可異議期", "以上皆是"], 3, ""], [1369, 4, "4.7(d)", "以保單條文而言，以下哪些或哪項對一個保單復效的要求很大可能不接納？", ["一份已失效二十年的保單", "一份在兩年前已失效的保單", "一份在寬限期結束後兩個月内提出", "以上各項皆是"], 0, ""], [1370, 4, "4.8(a)", "如果保單於提出索償後，才被發現誤報年齡或性別資料，保險人會如何處理？", ["向上或向下調整利益金額", "不會作出任何調整", "退回全數已繳保費", "即時取消保單，並控告受保保單所有人"], 0, ""], [1371, 4, "4.9", "錢先生將他的人壽保單轉讓給ABC公司，ABC公司現在要求保險人支付紅利，卻\n遭保險人拒絕，保險人極可能拒絕的原因是：", ["ABC公司並不是合約的一方", "保險人沒有收到就轉讓的書面通知", "轉讓只限於支付死亡保險利益", "錢先生並沒有更改受益人為ABC公司"], 1, ""], [1372, 4, "4.9", "以下哪一條例容許轉讓據法權產?", ["法律修訂及改革條例", "法律修訂及(綜合)條例", "法律修訂及改革(綜合)條例", "衡平法中的轉讓法則"], 2, ""], [1373, 4, "4.9", "對於一個保單所有人來說，如果他對產權的權益是復歸的，那：", ["仍未取得該項權益", "雖然對產權有獲得認可的權益，財產的享用將延遲至將來的某一天或某事發生時", "肯定會在將來取得該權益", "該權益屬於受益人權益"], 1, ""], [1374, 4, "4.9(e)(ii)", "對於壽險保單之抵押轉讓：", ["這安排是永久性的", "承讓人對該保單取得無限制的權利", "該份保單仍可取得保單抵押貸款或退保", "以上所有各項皆不是"], 3, ""], [1375, 4, "4.10", "如果保單所有人沒有作出紅利選擇，大多數保單會採用一種稱為___________的\n方式。", ["自動紅利選擇", "現金紅利選擇", "保單紅利選擇", "以上皆不是"], 0, ""], [1376, 4, "4", "在死亡索償中,在哪種情況下,死因對索償來說屬於重要事項?", ["該份保單設有意外死亡保險利益附約", "自殺條款可能仍然生效", "受益人謀殺受保生命", "以上所有各項"], 3, ""], [1377, 4, "4.1", "一個典型的人壽保險中「完整合約」條款，以下哪項是正確?", ["保險公司提出便可修改", "只有保單持有人同意才可修改", "須在14天內提交保單", "必須全份合約修改"], 1, ""], [1378, 4, "4.1", "以下哪項關於「完整合約」條款的描述是不正確的？", ["完整合約包括保單正本、任何夾附的附約及投保單的複印本", "只有在保單所有人同意下才可更改保單", "只有保險公司的指定高級職員才有權對保單作出更改", "保單的內容已是一份完整的合約，並不包括其他文件"], 3, ""], [1379, 4, "4.1", "下列哪一項有關香港典型壽險保單「完整合約」條款的陳述是不正確的？", ["一份完整的合約包括保險單、任何夾附的附約以及夾附的投保單的複印本", "除非得到保單所有人同意，否則不能對合約作出任何修改", "儘管保險人不同意，保單所有人仍有權利輕微地修改合約", "只有保險公司中指明的高級職員才有權更改合約"], 2, ""], [1380, 4, "4.1", "根據人壽保單「完整合約」的條款中，除以下情況外，均不得對保險合約作出\n任何的修改？", ["任何情況下均不得修改", "只可在保單持有人同意下", "保單生效後首兩年內", "除非有關保單被取消，並由另外一份保單取代"], 1, ""], [1381, 4, "4.1", "根據典型壽險保單的完整合約條款，唯一有權更改合約的人是：", ["保單所有人", "高等法院的法官", "保險中介人", "保險公司指明的高級職員"], 3, ""], [1382, 4, "4.1", "一個典型的人壽保險中「完整合約」條款，以下哪項或哪些是正確?", ["合約中包括保單、任何夾附的附約及夾附的投保單的複印版本", "只有由指明保險公司高級職員才可修改合約", "除非得保單持有人同意，否則不得更改合約條款", "以上各項皆是"], 3, ""], [1383, 4, "4.1", "在人壽保單中的完整合約條款下，更改合約:", ["是完全不可能的", "在保險人同意下便可作出", "要在保單所有人同意下才可作出", "不論保險人是否同意都可隨意作出"], 2, ""], [1384, 4, "4.1", "下列哪項不是「完整合約」條款的特點？", ["合約有效期可持續數十年", "所有保險公司中的職員可獲權更改保險契約", "指定的保險公司高級職員可獲權更改保險契約", "完整保單合約包括保險單、任何夾附的附約及投保單的複印本"], 1, ""], [1385, 4, "4.2", "按照香港普遍採用的「不可異議條款」，儘管違反「最高誠信原則」(假設按照\n香港法律)，保險人對以下哪項仍不可能拒絕有關之死亡索償？", ["保單生效了只有一年", "保單生效了20個月,但死亡6個月後才向保險人索償", "保單生效了4年，違反最高誠信原則涉及故意隱瞞有重要意義的的醫療資料", "保單生效了4年，違反最高誠信原則涉及到沒有披露重要資料，而投保人真誠"], 3, ""], [1386, 4, "4.2", "地認為此資料是無關的\n一款典型的不可異議條款，為其目的訂下兩年的限期，該限期稱為:", ["無訴訟期", "不可異議期", "可異議期", "超出期"], 2, ""], [1387, 4, "4.2", "一名男子以免體驗的方式安排一份人壽保險單，並無意地誤導了保險人其健康\n狀況，如當時披露這些事實，保險人是不會提供保險。這名男子死去及真相被\n發現，在此情況下，下列哪項是不正確的？", ["無論死亡何時出現,保險人有權推翻合約", "如死亡於兩年內發生,保險人可推翻合約", "如死亡於兩年後發生,保險人便不可異議", "如不涉及欺詐,保險人很難不承認保單"], 0, ""], [1388, 4, "4.2", "根據香港法律，下列哪項有關不可異議條款的陳述是正確的？", ["壽險保單生效兩年便變為不可異議", "被保險人的欺詐行為可推翻該項不可異議條款", "受保生命必須在異議期內仍然生存", "以上所有各項"], 3, ""], [1389, 4, "4.2", "下列有關不可異議條款陳述不正確的是？", ["保單過兩年變不可異議", "保單在首兩年仍是不可異議", "如投保人違法最高誠信，保單過兩年仍不可異議", "若保單生效不足兩年，保險人可使保單無效"], 1, ""], [1390, 4, "4.2", "不可異議條款規定保險人不能對保單有效性提出異議，該可異議期為：", ["十二個月", "三個月", "二年", "一個月"], 2, ""], [1391, 4, "4.2", "某項保單條文規定受保生命仍然生存期間，保單已經生效最少兩年的話，不涉\n及任何欺詐行為的情況下，保險人不能以違反最高誠信原則為理由而推翻合約\n，稱為:", ["復效條款", "不能作廢條款", "不可異議條款", "完整合約"], 2, ""], [1392, 4, "4.2", "假設一份人壽保險保單的被保人仍然生存，保險合約生效的2年後，如投保人沒\n有涉及任何欺詐行為，保險人並不可以以違反最高誠信的規則，推翻有關合約\n，這是基於：", ["不可作廢條款", "不可異議條款", "復效條款", "超越期條款"], 1, ""], [1393, 4, "4.2", "由保單生效至不可異議期是2年，2年後保單仍然可異議是因為：", ["死亡原因是意外事故", "受保人死亡是由自殺引致", "涉及欺詐", "被保人在2年期間過去前已經死亡"], 2, ""], [1394, 4, "4.2", "不可異議條款包括：\ni)保險合約生效2年後，保險人不能對合約的有效性提出爭議\nii)受保保單所有人必須在保險合約生效首2年內仍然生存\niii)按照香港法律：若證實存在欺詐行為，保險人便可對保險合約的有效性提\n出爭議\niv)按照香港法律：若證實存在欺詐行為，保險人亦不可對保險合約的有效性提\n出爭議", ["i及iii", "i及iv", "i,ii及iii", "i,ii及iv"], 2, ""], [1395, 4, "4.2", "一名男子以免體驗的方式安排一份人壽保險單,並無意地誤導了保險人其健康狀\n況,如當時披露這些事實,保險人是不會提供保險.這名男子死去及真相被發現,\n在此情況下,下列哪項是不正確的?", ["無論死亡何時出現,保險人有權推翻合約", "如死亡於兩年內發生,保險人可推翻合約", "如死亡於兩年後發生,保險人便不可異議", "如不涉及欺詐,保險人很難不承認保單"], 0, ""], [1396, 4, "4.2", "一個人購買免體檢保險，他無意地誤導了保險人，若將事實表明，他的身體狀\n況是得不到保障的，後來他死亡並被知道真相，下列哪項在此情況下為不正確\n呢？", ["在任何情況下也不得異議", "若保單生效不足兩年，保險人可使保單無效", "若保單生效兩年，保險人便不可異議該保單", "保單生效已兩年，因並非欺詐情況，保險人很難不承認保單"], 0, ""], [1397, 4, "4.3", "下列哪項或哪些有關寬限期條款的陳述是不正確的？", ["該期間一般最少30或31天", "它不適用於保單的首期保費", "於寬限期內繳付保費可維持保單的保障繼續有效", "於寬限期內繳付保費須另外繳付利息"], 3, ""], [1398, 4, "4.3", "在香港，壽險保單所容許的「寬限期」一般為:", ["最多7天", "最多14天", "最少30/31天", "最少3個月"], 2, ""], [1399, 4, "4.3", "對保險人來說,受保保單所有人在寬限期內繳交過期保費即表示:", ["準時繳付保費", "受保保單所有人須額外繳付過期保費的利息", "在未繳付保費的期間出現了保障真空期", "續保時會收取所有未繳付之保費"], 0, ""], [1400, 4, "4.3", "以下哪項或哪些有關「寬限期」描述是不正確的:", ["一般為期14天", "是一個免費保險期", "適用於保單的首期保費", "以上全屬不正確"], 3, ""], [1401, 4, "4.3", "以下哪項寬限期的說明是正確的？", ["適用於保單的首期保費", "保險人必須在賠償付款前的期限", "保單所有人索償的一段時間", "在保費到期日仍未繳交後，保單仍然有效的一段時間"], 3, ""], [1402, 4, "4.3", "對保險人來說，被保險人在寬限期內繳交過期保費，即表示:", ["須額外繳付過期保費的利息", "當作準時繳付保費", "續保時會收取所有未繳付之保費", "在未繳付保費的期間出現了保障真空期"], 1, ""], [1403, 4, "4.3", "下列哪兩項有關寬限期的陳述是正確的？\ni)寬限期一般為期至少三十或三十一日\nii)寬限期適用於所有保費，包括首期\niii)按照美式保單，除非已經繳清保費，否則保單便會於寬限期屆滿時失效\niv)按照美式保單，如果於寬限期內仍未繳清保費，那麼保單便會由保費到期即\n失效", ["i,ii", "i,iii", "ii,iii", "ii,iv"], 1, ""], [1404, 4, "4.3", "按照英式保單處理方法，如寬限期內仍未繳清保費，而保單沒有現金價值，那\n英式保單會於何時開始失效?", ["寬限期過後", "寬限期後的十四天", "保費到期日後的十四天", "保費到期日開始"], 3, ""], [1405, 4, "4.3", "通常保單條文指明一段的時間範圍，允許在保費到期日之後繳付而不受處罰，\n這樣的時間範圍通常稱為:", ["等候期", "不作廢條款", "續保期", "寬限期"], 3, ""], [1406, 4, "4.3", "假設沒有不能作廢條款情況下，寬限期內沒有繳付保費，則保單便：", ["失效", "被取消", "變成不可異議", "需要繳交較高保費，保單才可繼續生效"], 0, ""], [1407, 4, "4.3", "以下哪項正確描述寬限期？", ["寬限在15日以內", "它不是免費保險期", "保費可於寬限期滿及死亡前退還", "以上各項皆是"], 1, ""], [1408, 4, "4.3", "根據美式寬限期的規定，在於寬限期內死亡而保險保費尚未付清，以下哪項是\n採取的措施？", ["不能獲取死亡保險金", "死亡保險金可獲給付，但未繳清之保費可獲豁免", "死亡保險金可獲給付，但未繳清之保費將會從中扣減", "該保險合約屬於無效"], 2, ""], [1409, 4, "4.3", "如果於寬限期過後仍未繳交保費(假定沒有不能作廢條款保障)美式保單於何時\n開始失效？", ["寬限期結束之日", "保費到期後5日", "保費到期後7日", "保費到期日"], 0, ""], [1410, 4, "4.4", "一份典型的壽險保單中獲指名的(受益人)是：", ["該受保生命", "該受保生命的配偶", "保險金的準收款人", "巳承讓該保單的人士"], 2, ""], [1411, 4, "4.4", "以下哪項關於受益人的描述是正確的？", ["所有受益人必須要有可保權益", "只有第三者保單可用概括式的指定", "除非保單特別指定，數位指定的受益人將平均分配保險金", "如果受益人比受保保單所有人較早發生死亡，他的繼承人將於適當時候提取"], 2, ""], [1412, 4, "4.4", "保險金\n獲指定為收取壽險保單保險金的人士稱為：", ["被保險人", "受益人", "受保生命", "保單持有人"], 1, ""], [1413, 4, "4.4", "以下哪項不屬於受益人的「概括式指定」？", ["「本人的妻子」", "「本人的子女」", "「本人的兄弟姊妹」", "「本人第一段婚姻的子女」"], 0, ""], [1414, 4, "4.4", "某人在訂立某份人壽保險合約時，指定瑪莉為受益人。兩年後，他更改保單，\n致令萬一瑪莉比他早過世，莉莉便會成為受益人。莉莉在該份保險計劃中稱為:", ["後備受益人", "次順位受益人", "第二受益人", "第一順位準受益人"], 1, ""], [1415, 4, "4.4(b)", "如果已指定兩名受益人,但沒有顯示他們分別所佔的比例,在需要給付保單利益\n時:", ["會平均分配保險利益", "第一順位受益人可取得兩倍的分配", "第二順位受益人可取得兩倍的分配", "第一順位受益人可取得所有保險利益"], 0, ""], [1416, 4, "4.4(b)", "假若受益人在保單受保人之前死亡，在需要給付利益時，保險金全數會給付：", ["繼任受益人", "次順位準受益人", "第二受益人", "受益人"], 3, ""], [1417, 4, "4.5", "保單條款指出可利用保單現金價值使保單維持有效，條款稱為「不能作廢」及\n：", ["續保保費貸款", "自動保費貸款", "自動保費透支", "自動清繳貸款"], 1, ""], [1418, 4, "4.5", "很多壽險保單均有不能作廢條款，但它在以下哪項或哪些保險產品並不適用：", ["年金", "定期壽險", "未擁有現金價值的保單", "以上所有各項"], 3, ""], [1419, 4, "4.5", "簡單來說，不能作廢條款規定:", ["雖然投保人未能到期支付保費，該保單亦不會作廢", "除非該保單沒有取得現金價值，保險人不能取消該保單", "保額不能調低", "雖然投保人沒有能力償還貸款，該保單亦不會失效"], 0, ""], [1420, 4, "4.5", "如未能及時繳交保費，某些保單有現金價值可以自動用作墊付保費以繼續保單\n運作稱為:", ["提前保費貸款", "自動保費貸款", "額外保費貸款", "提供經濟援助"], 1, ""], [1421, 4, "4.5", "人壽保單中通常具有一些條文，把保單的現金價值即時用於支付尚未繳交的保\n費，從而避免保單失效，部分保險人不認為這是不能作廢條款，而稱之為?", ["一筆強制性的保單貸款", "一筆自動的保費貸款", "一項延續保單條款", "一項自動保單復效條款"], 1, ""], [1422, 4, "4.5", "對於停止供款的保單持有人，保單條文訂明了若干權力，以下哪項不正確？", ["接受一份減額清繳保險", "退保以取回保單內的現金價值", "以現金價值購買一份定期壽險", "要求保險人發放免息貸款以繳交保費"], 3, ""], [1423, 4, "4.5", "壽險合約中，不能作廢條款的首要目的是:", ["不得扣減保額的價值", "保險人無權取消保單", "保單不會在沒有繳付保費的情況下失效", "保單不會因為被保險人無法償還貸款而作廢"], 2, ""], [1424, 4, "4.5", "壽險保單中自動保費貸款：", ["貸款用途由保險人任意決定的", "貸款在所有壽險保單中，都是常見的", "貸款只可用作保單規定的指定用途", "以上各項描述均不是"], 2, ""], [1425, 4, "4.5", "有些保險人指定某些保單條文(APL)。藉此，寬限期過後仍未繳交到期保費，保\n單便可利用該保單的現金價值支付保費。該APL的意思是：", ["輔助保單貸款(AssistedPolicyLoan)", "自動保單貸款(AutomaticPolicyLoan)", "輔助保費貸款(AssistedPremiumLoan)", "自動保費貸款(AutomaticPremiumLoan)"], 3, ""], [1426, 4, "4.5", "自動保費貸款(APL)是以什麼作為繳交保費的一種貸款？", ["以保單中的現金價值", "以樓宇作為抵押之貸款", "以私人貸款", "以上各項皆是"], 0, ""], [1427, 4, "4.5", "保單不會因為停止繳付保費而失效，這是指什麼條款？", ["不可異議條款", "不能作廢條款", "代位權", "彌償"], 1, ""], [1428, 4, "4.5", "自動保費貸款的意思是?", ["保險人自動地發放無抵押貸款,以付繳保費", "保險人自動地發放貸款,以付尚未清繳的保費", "保險人豁免首月保障的保費", "被保險人可要求貸款,以繳付保費"], 1, ""], [1429, 4, "4.5", "APL的英文全寫為：", ["自動保費貸款AutomaticPremiumLoan", "調整保費貸款AdjustedPremiumLoan", "自動付款貸款AutomaticPaymentLoan", "調整付款貸款AdjustedPaymentLoan"], 0, ""], [1430, 4, "4.5", "根據壽險保單中常見的不能作廢條例，下列哪一項不屬於決定不再繳付任何保\n費的保單所有人的選擇?", ["退保並收取保單現金價值", "利用保單價值作為保費，接受一份減額清繳保險", "利用現金價值購買與原本保單保額相同的定額壽險", "暫停保障，但有權在任何時間恢復保險"], 3, ""], [1431, 4, "4.5", "一份完全清繳的保單是指：", ["以往所有到期保費已給支付", "保費由第三者(如僱主)支付", "保單一經生效必須支付所有保費", "保單保費已全數支付，但保單仍然維持有效"], 3, ""], [1432, 4, "4.6", "向保險人借入款項，保單持有人可以利用以下哪樣作爲抵押？", ["現金價值", "現金", "現金或其他有價值的實質資產", "上述所有各項"], 0, ""], [1433, 4, "4.6", "以下哪項是對保單抵押貸款的正確描述？", ["貸款用途由保單所有人決定", "貸款通常是保險人任意決定的", "唯一受到保單條款約束的是定期壽險", "保單貸款的用途只能用作繳付未來保費之用"], 0, ""], [1434, 4, "4.6", "以下哪項對保單抵押貸款條款的描述是不正確的?", ["貸款金額上限為現金價值（扣除一年貸款利息）", "貸款用途必須經保險人許可", "要求使用保單抵押貸款,是在保單上列名的保單所有人的權利", "有關利息可在保單利益應付時償還"], 1, ""], [1435, 4, "4.6", "以下哪項或哪些有關保單抵押貸款的陳述不正確?", ["沒有限定保單抵押貸款的用途", "需要獨立的抵押品", "貸款可於保額發放前償還或不償還", "以上所有皆不正確"], 1, ""], [1436, 4, "4.6", "哪一項是有關典型壽險保險的保單抵押貸款條款的正確陳述？", ["借款用途無任何限制", "保單持有人有權向保險人借入款項", "貸款需要的抵押是保單的現金價值", "以上各項皆是"], 3, ""], [1437, 4, "4.6", "以下哪項正確描述保單抵押貸款？\ni)保單所有人有權向保險人借入款項\nii)貸款的用途無一定限制\niii)需要以保單現金價值作為抵押\niv)貸款可於保單生效期內或外償還", ["i,ii,iii", "i,iii,iv", "ii,iii,iv", "以上各項都是"], 3, ""], [1438, 4, "4.6", "關於人壽保單的保單抵押貸款：", ["貸款通常是保險人任意決定的", "就任何種類的壽險而言，貸款都是常見的", "貸款只獲允許用於保單指定的某些用途", "以上所有各項均不正確"], 3, ""], [1439, 4, "4.6", "下列哪項或哪些屬於保單抵押貸款中慣用條文的特點:", ["該筆貸款用途無任何限制", "該筆貸款唯一需要的抵押品就是保單現金價值", "於保單生效期內可以償還或不償還該筆貸款", "上述所有各項"], 3, ""], [1440, 4, "4.6", "就合資格的壽險保單的保單貸款而言：", ["要求貸款是一種權利，而不是權益", "貸款毋須在提供索償前償還", "除保單價值以外，保單持有人毋須提供其他抵押", "以上所有各項皆正確"], 3, ""], [1441, 4, "4.6", "以下哪項是對保單抵押貸款的不正確描述？", ["還款與否全由保單所有人決定", "貸款與否必須由保險公司單方面作出決定", "此條款不適用於定期壽險保單", "貸款之用途並沒有限制"], 1, ""], [1442, 4, "4.6", "如果抵押貸款在投保生命死亡時仍未清還，那麼:", ["有關的死亡索償便會無效", "有關的保險人可豁免該筆保費的償還", "受益人於支付該保險利益前,要先繳清該筆貸款", "有關的抵押貸款及相關的利息會在保單利益中扣減"], 3, ""], [1443, 4, "4.6", "保單抵押貸款條款是：", ["貸款的用途必要用作繳交未來的保費", "若不償還貸款，金額及其利息會在所給付的保險金中扣除", "貸款金額須要在借貸後之一年內歸還", "貸款金額須在續保時歸還"], 1, ""], [1444, 4, "4.6", "下列哪項屬於保單抵押貸款中不大可能是正確的?", ["該筆貸款用途無任何限制", "該筆貸款唯一需要的抵押品就是保單的現金價值", "若是意外死亡，不須償還該筆貸款", "貸款金額須在受保生命死亡時在保額內扣除"], 2, ""], [1445, 4, "4.6", "下列哪項或哪些屬於保單抵押貸款中慣用條文的特點?", ["該筆貸款必須用於繳交未來的保費", "該筆貸款唯一需要的抵押品就是保單的定期保險", "於保單生效期內可以償還或不償還該筆貸款", "保單的貸款由保險人決定"], 2, ""], [1446, 4, "4.6", "以下哪項關於保單抵押貸款的描述是正確的？", ["貸款必須用作清繳保費之用", "貸款必須於保單完結時償還", "貸款必須於下個保單周年日前全數償還", "貸款可於任何時間償還"], 3, ""], [1447, 4, "4.6", "如果抵押貸款在投保生命死亡時仍未清還，以下哪項描述是正確的？", ["有關的死亡索償便會無效", "有關的保險人可豁免該筆貸款的償還", "受益人必須先繳清該筆貸款才能獲得支付保險利益", "有關的抵押貸款及利息會在保單利益中扣減"], 3, ""], [1448, 4, "4.7", "英式人壽保險慣例中的「保單復效」(Policy\nrevival)一詞，在香港通常被稱為：", ["續保(Renewal)", "不能作廢(Non-forfeiture)", "復效(Reinstatement)", "重新建立(Pre-establishment)"], 2, ""], [1449, 4, "4.7", "一份壽險保單的復效:", ["是違法的", "適用於已失效或退保的保單", "有條件性的限制,是保單條文中的一項權利", "只可在保險人於復效時同意的一刻進行"], 2, ""], [1450, 4, "4.7", "以下哪項為復效的正確描述:", ["是違法的", "適用於已失效或退保的保單", "具保單條款限制,是保單條文中的一項權利", "只可在保險人單方面提出下才可進行"], 2, ""], [1451, 4, "4.7", "若要把已失效的人壽保單復效，以下哪項或哪些是限制條件?", ["繳一筆復效費", "繳付已到期而未繳清的保費及利息", "引入另一段可異議期", "以上各項皆是"], 3, ""], [1452, 4, "4.7", "受某些條件的限制下，一份已失效的壽險可以恢復有效，這個過程稱為：", ["續保", "復原", "復效", "條件重訂"], 2, ""], [1453, 4, "4.7", "跟據英式人壽保險的慣例，「復效」稱為?", ["重新訂立合約", "保單復效", "不能作廢", "保單續保"], 1, ""], [1454, 4, "4.7", "有意復效保險單必須於規定時間內提出，一般為:", ["1年", "2年", "3年", "5年"], 3, ""], [1455, 4, "4.7", "以下哪項不是有意復效保險單的條款？", ["提供持續可保性的證明", "保險人的書面同意", "繳付一筆復效費", "補付已到期但未繳清的保費及利息"], 1, ""], [1456, 4, "4.7", "按照英式人壽保險慣例，在某些情況下，己失效的保單可以重獲「生命」，此\n稱為：", ["恢復保單", "復效", "轉保", "生效"], 1, ""], [1457, 4, "4.7", "在什麼情況下，保單所有人已失效的保單有機會可以復效？", ["保險人單方面同意下", "補付未繳清的保費及利息", "保單曾生效兩年或以上", "任何時間都可以"], 1, ""], [1458, 4, "4.7", "當保單失效時，客人可申請「保單復效」，以下哪項描述是不正確的？", ["退保的保單會自動重新生效", "客人須提供連續可保性證明", "客人須繳付任何未繳清的貸款及利息", "保單復效是有條件性的申請"], 0, ""], [1459, 4, "4.7", "要保單復效，保單所有人必須受到下列哪些條件限制？\ni)提供連續可保性證明\nii)繳付任何未繳清貸款利息\niii)從復效日計起的另一段自殺免責期\niv)從復效日計起的另一段可異議期", ["i及ii", "i及iii", "ii及iii", "i,ii,iii及iv"], 3, ""], [1460, 4, "4.7", "以下哪項最不可能符合保單復效條件？", ["保單兩年前已失效", "保單五年前已失效", "保單八年前已失效", "以上所有皆不符合"], 2, ""], [1461, 4, "4.8", "在香港，一般就誤報年齡或性別，若保險公司在發出保單後才發覺通常會如何\n處理：", ["不會作出任何調整", "保單將會失效", "只容許保單利益向下調整", "利益或保費會向上或下調整"], 3, ""], [1462, 4, "4.8", "誤報年齡或性別資料的情況，如果保單於提出索償後才被發現，保險人會如何\n處理？", ["不會作出任何調整", "保單將會失效", "退回全數已繳保費", "向上或向下調整利益金額"], 3, ""], [1463, 4, "4.8", "如果保單於提出索償時，才發現有關受保生命的真實年齡較保單顯示的為高：", ["保單自動無效", "調整利益，支付比保單較低的保額", "調整利益，支付比保單較高的保額", "維持保額不變，退回多繳的保費"], 1, ""], [1464, 4, "4.8", "大部分的香港保險公司都是美式保單，在誤報年齡或性別的情況下，如果於提\n出索償後才被發現，保險人不會如何處理？", ["不會調高保費亦不會退回保費", "如果保單上顯示的年齡較真實為低，可能獲得的利益便調低", "如果保單上顯示的年齡較真實為高，可能獲得的利益便調高", "以上各項都有可能"], 0, ""], [1465, 4, "4.8", "如果一份已簽發的壽險保單顯示受保人的年齡不正確,而該錯誤是於提出任何索\n償前發現,那麼以下哪項描述是正確的?", ["必須取消該份保單而簽發一份新保單", "其中一項選擇是支付任何差額保費(或獲退回多繳保費)", "要更改保額或任何合約條款,實屬太遲", "基於不可異議條款,不必有所作為"], 1, ""], [1466, 4, "4.8", "在投保時，虛報年齡/性別會影響投保人支付的保費及利益，這違反了最高誠信\n並且:", ["保單即時取消", "保單由保日起失效", "在實務上，這違反行為可轄免，(不需作出任何調整)", "在實務上跟據保單條文，保費或利益任何一項可作出調整"], 3, ""], [1467, 4, "4.8", "如果於保單簽發後數年(在出現索償前)發現有關受保生命的真實年齡較保單顯\n示的高：", ["有關保單便自動宣告無效", "由於保單已是不可異議，因此無須作任何修改", "便必須調整有關保額或保費的其中一項", "便取消有關保單，並退回全部保費"], 2, ""], [1468, 4, "4.8", "因為保單所有人外語名字，保單資料被誤將女性填寫為男性，此為終身壽險保\n單，當發現錯誤時，被保人堅持支付現時保費金額，保險人該如何處理？", ["調整保單保額，以反映已繳付保費相符的正確保額", "退回多收保費", "撤銷保單", "保單保額向下調整"], 0, ""], [1469, 4, "4.8", "保險人對於誤報資料的保單，在索償前通常也有一些常規條款，下列哪項為正\n確的？", ["不會收取增加之保費及退回保費", "若年齡在保單上過輕，則降低保額", "若年齡在保單上過大，則退回多交之保費連利息", "以上各項均不成立"], 1, ""], [1470, 4, "4.8", "人壽保險理賠時發現受保人年齡應較小，按美式保險傳統做法，會賠償較大的\n金額，同樣情況下，英式傳統做法為以下哪項？", ["與美式並無分別", "賠償死亡保險金額，不會退回多付保費", "賠償死亡保險金額，退回多付的保費", "由於違反最高誠信，沒有任何賠償"], 2, ""], [1471, 4, "4.8", "在美國，若處理索償時才發現受保人年齡不符，則:", ["保單無效", "調整保費(收取或退保保費)", "調整保險利益的金額", "可收取50%保額"], 2, ""], [1472, 4, "4.8", "就誤報年齡或性別方面，人壽保險單通常：", ["也適用於自願變性的情況", "只容許保單利益向上調整", "只容許保單利益向下調整", "調整保險利益以符合確定情況"], 3, ""], [1473, 4, "4.8", "若受保保單所有人誤報年齡或性別，於索償前被發現，保額會被如何處理？", ["保額或保費必須更正", "保額及保費必須更正", "經雙方同意後，可以決定更正或否", "若年齡在保單上過輕，則退回多交之保費連利息"], 0, ""], [1474, 4, "4.8", "在申請索償時發現被保人的性別及年齡誤報，那麼該份保險合約：", ["可能涉及罰款", "通常變成無效", "通常可於死亡保險金上作出調整以反映正確情況", "假設被保人存在欺詐"], 2, ""], [1475, 4, "4.9", "如果進行壽險保單的轉讓，獲轉讓保單的人士是:", ["轉讓人", "承讓人", "被轉讓人", "轉讓受益人"], 1, ""], [1476, 4, "4.9", "如果把一個人在一項保險合約中所具有的權益形容為復歸的,這表示:", ["該權益可能在未來某個時候出現", "該權益在繳交所有保費後出現", "在繳交最後一期保費後出現的合法權利", "以上所有皆不是"], 3, ""], [1477, 4, "4.9", "錢先生把他的人壽保單轉讓了給ABC有限公司，ABC有限公司現在要求保險人支\n付紅利，卻遭保險人拒絕。下面哪項是保險人這麼做的最可能原因？", ["保險人沒有收過該轉讓發出的書面通知", "轉讓通知書說明已把保單一切權益轉讓，但並沒有明確地提及紅利", "錢先生沒有把受益人改成ABC有限公司", "必須由錢先生提出這種要求，在合約被成功轉讓後他還是保險合約的一方"], 0, ""], [1478, 4, "4.9", "保單所有人將權益轉讓的方式為哪一項或哪些：\ni)絕對轉讓\nii)部分轉讓\niii)抵押轉讓\niv)有效轉讓", ["i", "i,ii,iv", "i,iii", "i,iv"], 2, ""], [1479, 4, "4.9", "有一種轉讓是永久性的，而承讓人是新的保單持有人，這種轉讓是：", ["長遠的轉讓", "絶對轉讓", "不可取消的轉讓", "永久性的轉讓"], 1, ""], [1480, 4, "4.9", "以下哪項或哪些有關人壽保險單的轉讓是不正確？", ["轉讓保單的人稱為承讓人", "獲轉讓保單的對象稱為轉讓人", "所有轉讓必須涉及代價，這是合約元素之一", "以上所有皆不正確"], 3, ""], [1481, 4, "4.9", "以下哪項對轉讓的評論並不正確？", ["保單所有人是轉讓人", "第三者是承讓人", "保單可當作出售或作為禮物", "必須獲得保險人的同意"], 3, ""], [1482, 4, "4.9", "保單轉承中的承讓人，只能得「淨保險金」，是指:", ["他沒有取得任何紅利或英式紅利", "保險人有權扣減過期未清繳的保費和尚欠的貸款", "退保時，他只能取回部分保額", "保險人不用交付未來的保費的佣金"], 1, ""], [1483, 4, "4.9", "保單經過轉讓後，保險人持有優先收回欠款的權利。承讓人在索償時可收回：", ["凈保額", "凈保單收益", "保額餘款", "扣除還款後的餘額"], 1, ""], [1484, 4, "4.9", "人壽保險的轉讓方式分為兩大類其中一種稱為絕對轉讓，另一種則是?", ["部分轉讓", "抵押轉讓", "有條件轉讓", "優先轉讓"], 1, ""], [1485, 4, "4.9", "下列哪一項關於絕對轉讓和抵押轉讓的陳述是不正確?", ["絕對轉讓是永久性安排", "如果抵押轉讓已經存在，保單抵押貸款或者退保是不可能的", "在抵押轉讓中，承轉人就保單享有無限權益", "抵押轉讓可能以保單作為貸款的抵押品"], 2, ""], [1486, 4, "4.9", "以下哪項絶對轉讓和抵押轉讓的描述不正確？", ["兩者完全相同", "抵押轉讓以保單為抵押品", "絶對轉讓屬永久性轉讓", "以上各項皆是"], 0, ""], [1487, 4, "4.9", "壽險保單的絕對轉讓是指：", ["將保單轉給另一名保險人", "有關保單即時變為不可異議", "原有的保單所有人已被宣佈破產", "不可撤銷地轉讓對某份壽險保單的一切擁有權"], 3, ""], [1488, 4, "4.9", "當壽險保單轉讓時，保險人對下列哪項較承讓人擁有優先權?", ["任何逾期未付的保費", "任何尚欠的保單貸款", "任何尚欠的貸款利息", "以上所有各項"], 3, ""], [1489, 4, "4.9", "下列哪項不屬於壽險保單的轉讓限制？", ["有關轉讓不能因為非法目的而安排", "有關轉讓不以金錢為代價", "有關轉讓不能選其他賠付選擇可能限於一次過整筆支付", "不得侵犯任何不可撤換受益人的既得利益"], 1, ""], [1490, 4, "4.9", "以下哪項有關保單轉讓的描述是正確的？", ["只可以轉讓保險保單價值", "轉讓可能要付出代價（即付款）或作為禮物贈送", "承讓人必須有可保權益", "毋須通知保險人"], 1, ""], [1491, 4, "4.9(e", "以下哪項對絕對轉讓的描述是不正確的?", ["所有權益歸於新的保單所有人", "轉讓是永久性的", "要以抵押品作為貸款低押", "新的保單所有人稱為承讓人"], 2, ""], [1492, 4, "4.9(e", "一種屬於暫時性質的轉讓(例如利用保單作為一項貸款的抵押品)稱為？", ["暫時性轉讓", "絕對轉讓", "抵押轉讓", "附條件轉讓"], 2, ""], [1493, 4, "4.10", "如果在一份保險合約中具有的權益形容成復歸，這表示：", ["權益在繳交所有保費後才支付", "權益在事件是偶遇的情況下出現時才支付", "權益在繳交最後一期的保費後才支付", "以上各項都不是"], 3, ""], [1494, 4, "4.10", "在人壽保單的分紅中，下列哪項是不常見的方法？", ["以現金支取", "購買增額保險", "在保險公司中積存以賺取利息", "購買有關保險公司之股份"], 3, ""], [1495, 4, "4.10", "分紅人壽保險下的現金紅利，通常何時須支付給保單所有人？", ["即時", "按照保險人決定的時間", "如果他作出書面要求，便會即時成為可動用資產", "只有在需要支付全部保單利益的時候"], 0, ""], [1496, 4, "4.10", "採用英式壽險方式而非美式壽險方式的保單，較有可能取以下兩種用詞：\ni)保單紅利\nii)有利潤保單\niii)分紅保單\niv)復歸紅利", ["i,ii", "ii,iii", "iii,iv", "ii,iv"], 3, ""], [1497, 4, "4.10", "一名保險單持有人在保單中持有擁有權，然而有某些權益只會在較後時間才可\n享有的，可稱之為：", ["遞延權益", "延期權益", "預期權益", "復歸權益"], 3, ""], [1498, 4, "4.10", "如保單所有人沒有註明 2", "以下哪項是「自殺條款」的不正確描述？", ["自殺被列為除外責任", "此條款通常為期一年", "保單生效初期被列為除外責任", "保單生效首年自殺將獲退回所繳保費"], 0, ""], [1516, 4, "4.12", "以下哪項是形容自殺條款的？", ["任何時間自殺為除外責任", "保單生效初期(通常一年)自殺列為除外責任", "保單生效後自殺可取得50%死亡金", "任何時間下自殺均不會影響死亡金給付"], 1, ""], [1517, 4, "4.12", "在香港，自殺條款的免責期一般為：", ["一個月", "一年", "二年", "十年"], 1, ""], [1518, 5, "5.2.2(b)", "就立約保費收據，以下哪項描述不正確?", ["也稱為不附條件保費收據", "可視為與保險人的臨時保險協議", "保險人不可提前結束終止具有約束力的保險保單", "保障具有約束力，保障期最長只限於指定的日數"], 2, ""], [1519, 5, "5.2.11", "根據送贈禮品指引（指引25），以下哪項不屬內指明的許可禮品?", ["獲分配的基金單位花紅", "獎勵計劃下累積的積分", "為客戶提供的贊助和支援", "現金禮券"], 3, ""], [1520, 5, "5.6.2(d)", "某人壽保險單訂明由陳大民作為受託人，假如被保險人逝世後保險金將全數支\n付給他，最終被保人被陳大民所殺害，請問陳大民可獲得保險金賠償嗎?", ["殺人犯會喪失對所有人的權利，故此不能提出申索", "保險業條例某項條文訂明殺人犯不能提出申索", "人壽保險賠償只會賠付予受益人，並非受託人，故此不能提出申索", "以上各項皆不正確"], 3, ""], [1521, 5, "5.2.10", "以下哪項不屬《重要資料聲明書－內地人士在港投購人身╱壽險保單》涵蓋的\n部分?", ["整個銷售過程必須在香港境內進行", "銷售人員", "投資風險", "保險回報率"], 2, ""], [1522, 5, "5.2.6", "以下哪項不是投資壽險保單利益說明文件的具體規定獲授權保險人可選擇闡述\n的假設淨回報率?", ["0", "2%", "4%", "以上各項皆不是"], 2, ""], [1523, 5, "5.6.2", "以下哪項是一項法律原則容許法庭對有損害公眾利益或公共秩序的傾向的行為\n或交易，可予以廢除或不接受?", ["程序不當", "政策公正", "公共政策", "以上各項皆不是"], 2, ""], [1524, 5, "5.3.1(a)", "人壽保險根據實質危險及道德危險核保確定有關風險程度，以下哪項因素是正\n確的描述?", ["與實質危險相比，道德危險較難確定", "實質危險涉及較主觀的因素，環繞準被保人的基本誠信或正直意向，道德危險主要考慮到可能增加受保事件發生率的", "實質危險主要考慮誠信因素，道德危險主要考慮家族遺傳因素", "實質危險主要考慮正直意向因素，道德危險主要考慮高危職業或消閒活動因"], 0, ""], [1525, 5, "5.3.1(b)", "素\n人壽保險傾向將建議風險分門別類，以便能夠確定公平的保費。以下哪項不屬\n將建議風險的類別?", ["標準風險", "次標準風險", "優良風險", "以上各項皆不是"], 3, ""], [1526, 5, "5.1(a)", "以下哪項是對「相互」保險公司的正確描述？\ni.它沒有股東\nii.公司在法律上由分紅保單所有人擁有\niii.由董事局及高級管理層控制\niv.相互公司不能轉變成為營利公司", ["ii,iii,iv", "i,ii", "ii,iii", "i,ii,iii"], 3, ""], [1527, 5, "5.1.1(d)", "以下哪項較可能直接涉及理賠部門功能？", ["監管由公司支付的所有款項", "紀錄由公司支付及收取的所有款項", "近因的調查核証工作", "以上各項皆是"], 2, ""], [1528, 5, "5.2.7", "一名謹慎的保險人，只會在以下哪情況下宣佈發放紅利？", ["保險人投資表現優於市場表現", "保險人投資表現不差於市場表現", "得知了實際的業績情況比其之前所作的精算和財務假設更有利後才宣佈保單紅利的", "期望匯集基金業績優於市場表現"], 2, ""], [1529, 5, "5.2.6", "以下哪項是投資壽險保單利益說明文件的具體規定獲授權保險人可選擇闡述的\n假設淨回報率?", ["3%", "8%", "1%", "以上各項皆是"], 0, ""], [1530, 5, "5.2.6", "就於下列哪項類別的人壽保險保單而言，可由獲授權保險人選擇是否發出有效\n利益說明?", ["清繳保險保單核保部", "分紅保單精算部", "具現金價值的保單負責決定所需的再保險程度並針對個別風險情況，作出適當的再保險安排的部門是:理賠部", "市場行銷部"], 3, ""], [1531, 5, "5.2.6", "以下哪項是投資壽險保單利益說明文件的具體規定獲授權保險人可選擇闡述的\n假設淨回報率?", ["0%", "1%", "8%", "以上各項皆是"], 0, ""], [1532, 5, "5.2.6", "就於下列哪項類別的人壽保險保單而言，可由獲授權保險人選擇是否發出有效\n利益說明?", ["清繳保險保單", "分紅保單", "所有類別人壽保單", "投資相連壽險計劃（“投連壽險”）保單"], 3, ""], [1533, 5, "5.2.3", "以下哪項是提供優質顧客服務所考慮的因素?\ni.提高客戶忠誠度\nii.不得提供敏感資訊\niii.不得承擔責任\niv.提高生產及盈利能力", ["i,ii", "i,ii,iii", "i,iv", "ii,iii,iv"], 2, ""], [1534, 5, "5.2.7", "相對投資相連保單，分紅保單的好處是︰\ni.有保證的現金價值及死亡利益\nii.保單所有人所承受的投資風險較低\niii.有獨立的精算師監管\niv.分紅保單的回報一般是平均派發", ["i,ii,iii", "i,ii,iv", "ii,iii,iv", "i,iii,iv"], 1, ""], [1535, 5, "5.1.1(a)", "保險公司會計部的主要職能和責任包括：\ni)記錄公司收入\nii)監管公司支出\niii)遵守(保費守則)\niv)遵守(保險代理操守守則)", ["i,ii", "i,iii", "iii,iv", "ii,iii"], 0, ""], [1536, 5, "5.2.4(g)", "保單持有人於已購買人壽保險保單的情況下，可能在期後會考慮購買另一份人\n壽保險保單以取代（全部還是部分的）最初所購買的人壽保險保單，此行為稱\n為:", ["保單失效", "轉保", "不能作廢", "以上各項皆不是"], 1, ""], [1537, 5, "5.2.8", "《承保長期保險業務（類別C業務除外）指引》指引16適用於:", ["銷售有利潤保單的獲授權保險人", "銷售非保證保單的獲授權保險人", "銷售儲蓄壽險的獲授權保險人", "承保長期保險業務（類別C業務除外）的獲授權保險人"], 3, ""], [1538, 5, "5", "就人壽保險而言，判斷一項可保性的基本因素可能是:", ["準投保生命的性別", "準投保生命的年齡", "準投保生命的健康狀況", "較大的投保額"], 2, ""], [1539, 5, "5.1.1(b)", "保險公司的精算部很有可能負責以下那項：", ["產品定價", "理賠及再保險", "資產及負債估值", "以上所有各項"], 3, ""], [1540, 5, "5.1.1(c)", "以下哪項或哪些不屬代理培訓與管理部門的職能？", ["代理隊伍的培訓需要", "保險公司的定價策略", "專業考試", "事業發展中的資源和設施"], 1, ""], [1541, 5, "5.2.1(c)", "準受保保單所有人在投保時，除了要填寫投保書外，有時亦需要提供補充資料\n，以下哪一項不屬需要提供補充資料?\ni.投保人的風險管理計劃\nii.有否兼職\niii.繳付保費方式\niv.對某些疾病或其他事項填寫問卷提供額外資料", ["i,ii", "i,iii,iv", "iii,iv", "i,ii,iii,iv"], 0, ""], [1542, 5, "5.2.2", "人壽保單投保人連同首期保費投保，人壽保險人已簽發保費收據。因詢問過程\n需時，剛巧在保險交付前投保人遇上交通意外身故，後來證實投保人按照標準\n條款是屬於可保的:", ["不論任何的保費收據類型索償均屬無效", "不論任何的保費收據類型索償均屬有效", "只有附條件保費收據索償有效", "只有立約(不附條件)保費收據索償有效"], 1, ""], [1543, 5, "5.2.2(b)", "就立約保費收據而言，下列哪幾項是正確的?\ni)它們亦稱為不附條件保費收據\nii)它們構成一份獨立於任何其後簽發之保單的合約\niii)於投資相連投險業務普遍不適用\niv)是否提供保障並不以投保人的可保性為條件", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "以上各項都是"], 1, ""], [1544, 5, "5.2.4", "投保人可就新購買的人壽保單更改購買意願，或取消保單並取回已繳保費，此\n做法是符合以下哪項規定？", ["冷靜期", "免保期", "等候期", "寬限期"], 0, ""], [1545, 5, "5.2.4", "在冷靜期指引中，所有投資相連保單及非投資相連整付保費保單，保險人可從\n退還保費中減去市值調整。對於其他非投資相連保單，以下哪項是正確的描述", ["不允許退還已繳保費", "可退還已繳保費的50%", "可退還已繳保費的100%", "所退還百分比按取消保單的日期而變動"], 2, ""], [1546, 5, "5.2.6a", "以下哪項是投資壽險保單利益說明文件的具體規定獲授權保險人可選擇闡述的\n假設淨回報率?", ["2%", "3%", "7%", "以下各項皆是"], 3, ""], [1547, 5, "5.2.6(a)", "根據投資壽險保單利益說明文件的具體規定，文件反映費用及收費必須:", ["只需包括基金經理收取的基金管理費用", "包括所有保單層面的費用，包括基金經理收取的基金管理費用", "反映所有保單層面的費用及收費(但不包括基金管理費用)", "以上各項皆正確"], 2, ""], [1548, 5, "5.2.6a", "保險計劃建議書根據甚麼預期保費抵銷?", ["預期所有的現金紅利購買減額清繳保險", "每年支付的均衡保費", "對未來的投資表現有利", "以上各項皆不是"], 0, ""], [1549, 5, "5.2.8", "《承保長期保險業務(類別C業務除外)指引》根據以下哪項/些機構頒布的保險\n核心原則而制定？", ["國際保險監督聯會", "特區政府", "保險監督聯合會", "國際保險業聯會及國際保險監督聯會"], 0, ""], [1550, 5, "5.2.7a", "下面有關宣佈紅利金額的陳述中，哪項是正確的？\ni.通貨膨脹期間保險人只會派發最低額的紅利\nii.保險人一般保留釐定紅利金額的權利\niii.紅利金額是基於獲委任精算師的意見，並經董事會批准而釐定\niv.傳統分紅保單規定了上升的紅利率", ["i,ii", "ii,iii", "ii,iv", "i,ii,iii,iv"], 1, ""], [1551, 5, "5.2.7a", "下面有關宣佈紅利金額的陳述中，哪項是正確的？\ni.保險人一般會將紅利平均派發，以減低短期大幅波動\nii.紅利金額是基於獲委任精算師的意見而釐定的\niii.紅利金額是基於獲委任精算師的意見，並經董事會批准而釐定\niv.保險人一般保留釐定紅利金額的權利", ["i,ii", "ii,iii", "i,iii,iv", "i,iii"], 2, ""], [1552, 5, "5.2.7a", "一個謹慎的保險人會根據以下甚麼情況才宣佈保單紅利?", ["保險人的投資表現優於市場表現", "保險人的投資表現不差於市場表現", "於滙集基金的表現優於市場表現", "以上皆非"], 3, ""], [1553, 5, "5.2.7b", "派發紅利方式共有三種，其中一種是:", ["即時紅利", "期終額外紅利", "延遲紅利", "以上各項皆是"], 1, ""], [1554, 5, "5.2.7c", "以下哪些不是關於保費抵銷的正確描述？\ni)將現金紅利存放於保險人\nii)對未來業績表現有利\niii)保單持有人有權選擇停止繳付保費\niv)將來的保費開支特別低", ["i,ii", "i,ii,iii", "ii,iv", "i,iii"], 2, ""], [1555, 5, "5.2.8", "《承保長期保險業務(類別C業務除外)指引》由哪個機構制訂?", ["香港保險業聯會", "國際保險業聯會", "保險監督聯會", "保險業監管局"], 3, ""], [1556, 5, "5.2.8", "根據《承保長期保險業務(類別C業務除外)指引》,銷售有關萬用壽險的保險人\n必需予以披露：", ["未來的預期派息率", "過往派息率", "非保證紅利的實現率", "保險人所提供的保證息率"], 1, ""], [1557, 5, "5.2.8", "按照指引16的規定，銷售分紅（或有利潤）保單或萬用壽險保單的保險人，應\n披露每個近期曾發出新保單的產品系列的非保證紅利/英式紅利實現率是怎樣計\n算的?", ["某個產品的實現率是指按「實際派發的保證紅利」除以銷售時「利益說明所述數額」的平均數計算。", "某個產品的實現率是指按「實際派發的非保證紅利/英式紅利」除以銷售時「利益說明所述數額」的平均數計算。", "某個產品的實現率是指按「保險人的實際盈利」除以銷售時「利益說明所述數額」的平均數計算。", "某個產品的實現率是指按「保險人的實際盈利」除以銷售時「利益說明所承"], 1, ""], [1558, 5, "5.2.8", "諾數額」的總額計算。\n根據《承保長期保險業務類別C業務除外）指引》(指引16)，當銷售分紅（或有\n利潤）長期保單時，必須告知客戶:", ["過往的投資表現非分紅產品未來表現的指標", "過往的紅利派發表現並非分紅產品未來表現的指標", "過往的紅利派發表現僅指非分紅產品未來表現的指標", "保險人不是承擔任何投資風險"], 1, ""], [1559, 5, "5.2.8", "《承保長期保險業務（類別C業務除外）指引》，對以下哪些作出披露規定?", ["投資相連壽險", "儲蓄壽險", "新承保長期保險業務類別（類別C業務除外）", "分紅保單"], 3, ""], [1560, 5, "5.2.10", "《重要資料聲明書－內地人士在港投購人身╱壽險保單》，以下哪些人須遵守\n？", ["經營投資相連長期業務以外的長期業務的獲授權保險人", "經營投資相連長期業務以外的長期業務的獲授權保險代理人及保險經紀", "經營長期業務的獲授權保險人", "提供人身及包括意外險在內的壽險的人士"], 2, ""], [1561, 5, "5.3.1", "與技術性核保相比，財務性核保較為著重保險的金額，尤其關於下列哪項或哪\n些?", ["預期受保保單所有人繳付保費的能力", "審慎保險人需安排再保險的可能性", "就一個人已累積購買的保單計劃", "以上各項均需考慮"], 3, ""], [1562, 5, "5.3.1(a)", "以下哪項屬於人壽保險的核保考慮因素？原因何在？", ["身體明顯過重是核保考慮因素，因可能與其他疾病有聯繫", "在卡拉OK，酒吧或賭場工作並不屬於核保考慮因素，保險人不會就這些職業而收取較高的保費", "體重過輕不屬於核保考慮因素，因這並不涉及任何其他疾病", "經營香煙業務是核保考慮因素，他們可以平價買香煙"], 0, ""], [1563, 5, "5.3.1(a)", "下列哪些或哪項可被視為影響一項風險的實質危險因素?", ["明顯超重", "中量吸煙者", "飲酒者", "以下各項皆是"], 3, ""], [1564, 5, "5.3.1(b)", "為確定公平的保費，保險人一般會將建議風險分為哪些類別？\ni.違約風險\nii.標準風險\niii.次標準風險\niv.優良風險", ["i,ii", "i,ii,iii", "ii,iii,iv", "i,ii,iii,iv"], 2, ""], [1565, 5, "5.5.1", "以下哪項是一份壽險保單最常見的保單更改事項?", ["保險保障類型", "保額", "受益人", "以上各項皆是"], 3, ""], [1566, 5, "5.6.2(d)", "就死亡索償而言，就下列哪項受保生命的死亡情況，可能會引起保險人的特別\n關注，或在例行詢問時需要進一步調查?\ni.受保生命遭鎗擊死亡\nii.受保生命於保單簽發後不久便死亡\niii.受保生命80歲的自然死亡\niv.受保生命可能遭妻子(指名受益人)謀殺", ["i,ii,iii", "ii,iii,iv", "i,ii,iv", "i,ii,iii,iv"], 2, ""], [1567, 5, "5.6.2(d)", "某人壽保險單訂明由陳大民作為受託人，假如被保險人逝世後保險金將全數支\n付給他，最終被保人被陳大民所殺害，請問陳大民可獲得保險金賠償嗎?", ["會，保險條款中訂明受託人可得到賠償", "不會，人壽保險保險金祗會賠付予受益人，並不是受託人", "不會，跟據公律(公共政策)是不容許殺人本人獲益", "不會，賠償金將被充公"], 2, ""], [1568, 5, "5.6.2(d)", "某人壽保險單訂明由陳大民作為受託人，假如被保險人逝世後保險金將全數支\n付給他，最終被保人被陳大民所殺害，請問陳大民可獲得保險金賠償嗎?", ["會，保險條款中訂明受託人可得到賠償", "不會，基本法不容許殺人犯本人獲益", "不會，香港法律不容許殺人犯成為受益人", "以上各項皆不是"], 3, ""], [1569, 5, "5.6.3", "以下哪一項不大可能屬於退保索償時考慮之因素?", ["所有權證明", "死亡證", "照顧任何受益人的權益", "調整未清繳的保費"], 1, ""], [1570, 5, "5.6.3", "以下哪項保險種類會提供「保險憑證」及「成員登記卡」？", ["終身保險", "儲蓄保險", "團體保險", "以上皆不是"], 2, ""], [1571, 5, "5.6.3", "下列哪項或哪些正確描述「保單退保」 ", ["國際市場因素", "匯集基金業績", "經濟展望", "如何公平的對待匯集基金内並存的各類保單持有人及在不同時間投保的保單"], 0, ""], [1635, 5, "5.2.7a", "持有人\n就保單紅利的派發而言,什麼是匯集基金?", ["它是指相關的保險人隨著提供了分紅保單而在其資產負債表上顯示出來的資產的全部,而之後保險人須為這些保單管理該等資產", "它是指相關的保險人隨著經營一切類型的長期保險業務而在其資產負債表上顯示出來的資產的全部", "它是指相關的保險人隨著提供了分紅保單而在其保費收入的全部顯示出來的資產的全部", "它是指相關的保險人隨著提供了分紅保單而在已扣除日常開支的保費收入的"], 0, ""], [1636, 5, "5.2.7a", "全部顯示出來的資產的全部\n就保單紅利的派發而言,什麼是匯集基金?", ["它是指相關的保險人隨著經營一切類型的長期保險業務而在其資產負債表上顯示出來的資產的全部", "它是指保險人的股本的全部", "它是指相關的保險人隨著提供了分紅保單而在其資產負債表上顯示出來的資產的全部,而之後保險人須為這些保單管理該等資產", "它是指相關的保險人隨著顯示出來的已扣除日常開支的保費收入的全部"], 2, ""], [1637, 5, "5.2.7a", "下面有關宣佈紅利金額的陳述中，哪項是正確的？", ["個別公司的紅利政策須遵守具體的自我規管政策", "典型的分紅保單在首三個年度不會派發紅利", "個別公司一般保留釐定紅利金額的權利", "典型的分紅金額必然為持上升趨勢"], 2, ""], [1638, 5, "5.2.7a", "就紅利金額派發，匯集基金在特定期間的業績情況與同一段期間三個因素關係\n密切。一般而言，以下哪項對分派紅利額有最大的影響？", ["匯集基金的費用", "匯集基金的賠付金", "匯集基金的投資回報", "證券市場的平均表現"], 2, ""], [1639, 5, "5.2.7a", "按照派發方式，保單紅利共有三種，包括：", ["延遲紅利", "即時紅利", "現金紅利", "最後紅利"], 2, ""], [1640, 5, "5.2.7b", "相對投資相連保單，分紅保單的好處是︰", ["高透明度保險制度", "保單價值由精算師監管", "較投資相連保單風險低", "靈活性"], 2, ""], [1641, 5, "5.2.7c", "以下哪項是分紅保單的好處？", ["靈活性", "高透明度保險制度", "平均派發", "保單價值由精算師監管"], 2, ""], [1642, 5, "5.2.7c", "指引十六所涵蓋的主要範圍如下:", ["產品設計", "合適性評估", "給客戶提供的意見", "以上各項皆是"], 3, ""], [1643, 5, "5.2.8", "以下哪項規定保險人必須向客戶披露的資料必須準確?", ["實現率及回報率", "實現率及過往派息率", "過往派發紅利金額的資料", "回報率及過往派息率"], 1, ""], [1644, 5, "5.2.9", "以下哪個組織制訂了《財務需要分析指引》（指引30）,讓適用於所有經營長期\n保險業務或就長期保險業務提供意見的獲授權保險人遵從?", ["壽險總會", "保險代理登記委員會", "香港專業保險經紀協會", "保險業監管局"], 3, ""], [1645, 5, "5.2.10", "以下哪項或哪些解釋是「核保」的合理(即使不是最完美的)定義？", ["確定投保風險的可保性", "為提供保險所進行的風險評估", "決定所投買保險應採用的條款", "以上各項皆是"], 3, ""], [1646, 5, "5.3", "人壽保險核保工作的重要性，遠高於一般保險風險的核保工作，主要原因是：", ["人壽保險涉及的風險的金額較高", "人壽保險合約不可由保險人取消", "人壽保險所面對的是生死存亡的重大問題", "人壽保險的核保工作要求詳盡的醫學知識"], 1, ""], [1647, 5, "5.3", "風險評估、選擇、評級以及按需要附加限制條款。決定所需的再保險程度並針\n對個別保險情況,而作出適當的再保險安排,屬於哪個部門的活動?", ["理賠部", "核保部", "保單條款制定部", "精算部"], 1, ""], [1648, 5, "5.3", "以下哪項或哪些說明是正確?", ["壽險的核保工作是每個保單年度必須的工作", "壽險的核保工作只涉及有關保費", "核保涉及可保性和合約條款的修改", "以上各項皆是"], 2, ""], [1649, 5, "5.3", "為何在人壽保險保單中，正確地評核風險是非常重要呢？", ["因為人壽保險保單的保額一般較高", "因為人壽保險保單的風險核保只能進行一次", "因為人壽保險保單的賠償一定會發生", "因為受保人在保單更改前已死"], 1, ""], [1650, 5, "5.3", "為了決定採用甚麼保險條款而進行的風險評估稱為：", ["理賠", "核保", "承保", "投保"], 1, ""], [1651, 5, "5.3", "保險公司對於特定風險，核保人不僅需留意該風險所代表的道德及實質危險，\n還需注意保險金額及有關個人對保險人有否任何累積影響，其中後者可被描述\n為：", ["財務性核保", "額外危險核保", "非技術性核保", "外來因素核保"], 0, ""], [1652, 5, "5.3.1", "核保的兩大主要階段，是確定風險程度，以及：", ["將建議風險分類", "提供合適計劃", "安排足夠再保險", "建議次標準措施"], 0, ""], [1653, 5, "5.3.1", "核保時需要考慮兩個部份，包括確定風險程度及：", ["將建議風險分類", "適用的其他保險計劃", "安排購買再保險", "確定具有多少可保權益"], 0, ""], [1654, 5, "5.3.1(a)", "核保的過程主要針對風險的兩方面，其中一方面是道德危險，另一方面則是:", ["實際危險", "實體危險", "實質危險", "非道德危險"], 2, ""], [1655, 5, "5.3.1(a)", "有一類人壽保險核保的元素，與風險的主觀因素較為有關(尤其是準受保保單所\n有人的個人素質及態度)，這類元素稱為：", ["道德危險", "實質危險", "行為分析", "人性因素評估"], 0, ""], [1656, 5, "5.3.1(a)", "下列哪項陳述是不正確的？", ["核保過程評估實質及道德兩方面的危險", "在一般情況下，道德危險的評估較實質危險的容易", "在一般情況下，實質危險的評估較道德危險的容易", "人壽保險的核保工作並不單與實質危險有關"], 1, ""], [1657, 5, "5.3.1(a)", "以下哪項屬於或不屬於人壽保險的核保考慮因素?為什麼這樣說?", ["體重過輕不屬於核保考慮因素，這並不涉及任何其他疾病", "在卡拉OK，酒吧或賭場工作並不屬於核保考慮因素，保險人不會就這些職業收取較高的保費", "體重過高是核保考慮因素，因可能與其他疾病有聯繫", "經營香煙商務是核保考慮因素，這是定價因素"], 2, ""], [1658, 5, "5.3.1(b)", "以下哪幾種是人壽保險的風險類型︰\ni)標準風險\nii)次標準風險\niii)拒保風險\niv)優質風險", ["i,ii,iii", "i,ii,iv", "i,iii,iv", "ii,iii,iv"], 0, ""], [1659, 5, "5.3.1(b)", "保險人在核保時對某特定的風險，由於投保人的健康或其他因素使這些投保不\n可能被接受，此類核保稱為：", ["不承保風險", "拒保風險", "不可保風險", "不接受風險"], 1, ""], [1660, 5, "5.3.1(b)", "大多數保險人愛將風險進行分類，目的是為訂立公平保費，以下那項不是風險\n類別？", ["標準風險(沒有異常風險，收費標準)", "次標準風險（風險較大，增加保費）", "拒保風險（由於健康或其它因素使投保不可能被接受）", "最高級風險（索償機會不大，保費極低）"], 3, ""], [1661, 5, "5.3.1(b)", "為確定公平的保費，保險人一般會將建議風險分為哪些類別？\ni)標準風險\nii)次標準風險\niii)拒保風險\niv)優良風險", ["i,ii及iii", "i,ii及iv", "ii,iii及iv", "以上各項都是"], 3, ""], [1662, 5, "5.3.1註", "核保包括兩類型。其一是技術性核保，這是將個別風險的潛在危機及預期危險\n進行評估。另一類是計算就同一受保生命已累積購買的保單金額及對建議的保\n險金額作出評估，此類核保稱為：", ["標準核保", "實際風險核保", "財務性核保", "全面性核保"], 2, ""], [1663, 5, "5.3.1註", "以下哪項屬於財務性的核保，而非技術性的核保：", ["身體健康狀況", "受保生命的行為", "保額明顯過高", "以上各項皆是"], 2, ""], [1664, 5, "5.3.1註", "有時候合資格醫務人員所有的資料要進一步調查，保險公司除了向主診醫生索\n取醫療資料外，還可以向哪位索取：", ["護理醫生", "體檢醫生", "保險公司指明醫生", "非主診醫生"], 1, ""], [1665, 5, "5.3.2", "以下哪項或哪些原因需要主診醫生的醫療報告?", ["所要求的保額十分高", "已超過某指明的年齡", "就投保書上所披露的某些健康資料作進一步調查", "以上各項皆是"], 3, ""], [1666, 5, "5.3.2", "根據壽險核保的術語，「主診醫生」及「體檢醫生」兩項名稱均為經常採用的\n。以下哪項有關陳述是正確的？", ["兩項名稱的意義完全相同", "體檢醫生是指個人本身的醫生", "主診醫生是指保險人委派的醫生", "它們分別指個人醫生及保險人委任的醫生"], 3, ""], [1667, 5, "5.3.2", "就人壽保險概念而言，保險人通常會透過那一類醫生索取有關醫療資料作核保\n及理賠時之應用：\ni)主診醫生\nii)體檢醫生\niii)經法庭法官委任的醫務官\niv)享有豐富醫學經驗之病理報告", ["i,ii", "i,iv", "iii,iv", "以上各項"], 0, ""], [1668, 5, "5.3.2", "通常或曾經對投保人提供醫療護理的醫生或其他合格醫務人員被稱為：", ["護理醫生", "主診醫生", "體檢醫生", "機密醫生"], 1, ""], [1669, 5, "5.3.2", "保險人最常要求的醫療報告APS的全寫為：", ["輔助的醫療報告(AncillaryPhysicalStatement)", "實質醫療的聲明(AcutalPhysicalStatement)", "附加的醫療聲明(AdditionalPhysicalStatement)", "主診醫生報告(AttendingPhysician'sStatement)"], 3, ""], [1670, 5, "5.3.2", "許多人壽保險是在免體檢的基礎上安排的。但保險人亦可以要求投保人作合理\n的身體檢查。而且投保人在進行身體檢查時有權知道：", ["進行什麼檢查", "檢查資料的目的", "任何檢查的結果", "以上各項皆是"], 3, ""], [1671, 5, "5.3.2", "經過保險人核保後，指一項拒絕有關風險的投保，而不能提供任何類型保障這\n種做法一般被稱為：", ["業務拒絶", "拒保", "取消", "不可接受"], 1, ""], [1672, 5, "5.3.3", "在處理一項次標準人壽的投保時，下列哪些屬於保險人的可能採取的核保措施?\ni)拒絕提供保險\nii)增加(附加)保費\niii)提供其他保單計劃\niv)在保單上設置一項按年遞減的「負債」", ["i,ii", "ii,iii", "ii,iii,iv", "i,ii,iii,iv"], 3, ""], [1673, 5, "5.3.3", "以下哪項或哪些是核保人評估一項次標準人壽投保時的可能選擇？", ["拒保該項風險", "要求額外保費", "投資另一保險計劃", "以上各項皆是"], 3, ""], [1674, 5, "5.3.3", "如果證實個別投保人的風險低於標準(Sub-standard)核保人可以：", ["選擇一些回應的核保措施", "必須以正常保費率接受", "拒絶提供任何保障情況下", "延遲決定於一年後"], 0, ""], [1675, 5, "5.3.3", "對於保險人就一項次標準風險不能提供任何類型保障這種做法一般被稱為：", ["拒保", "放棄", "保單拒絶", "業務拒絶"], 0, ""], [1676, 5, "5.3.3(b)", "為何人壽保單的簽發及交付尤其重要？", ["不容許有任何的錯誤", "其他的保險公司有更有效的方法", "在保單發出後才修改屬非常尷尬的事情", "由於沒有保單所有人的同意是不能取消或修改保單"], 3, ""], [1677, 5, "5.4", "人壽保險保單的準備及交付十分重要，因為：", ["只適用於替配偶購買保單", "以防競爭者將來有一套較有效律的制度", "避免將來的麻煩", "保單的更改需要保單所有人的同意，否則不可更改或取消"], 3, ""], [1678, 5, "5.4.1", "下列哪項人壽保險保單的簽發及交付的陳述是不正確的?", ["保險人有良好的系統處理客戶紀錄", "保險人能夠以極快的速度及極高的準確度製造保單文件", "保單大多數都是根據有關類別和計劃以標準形式印製的", "人壽保險核保人需查證是否已經收到首期保費"], 3, ""], [1679, 5, "5.4.1", "保險人在安排團體保險合約時，除了總保單外，還會為每名成員印製：", ["總保單複印本", "保險憑證也許還有成員登記卡", "總保單若干部分的複印本", "核實成員身份的掛號信件"], 1, ""], [1680, 5, "5.4.1(a)", "保險人會提供保險憑證/登記卡予下列哪種產品的受保人呢？", ["團體保單保險", "儲蓄壽險", "個人壽險", "以上各項都是"], 0, ""], [1681, 5, "5.4.1(b)", "發出團體保單文件時，保險公司通常會印製下列哪份或哪些文件給受保人?", ["準備多份總團體保單的複印本", "每名受保人的成員登記卡", "準備多份保單的複印本", "以上所有各項"], 1, ""], [1682, 5, "5.5", "保單持有人服務(或英文縮寫‘POS’)，是下列哪一個部門的另一名稱：", ["對我們的服務為傲", "保單所有人服務", "優先辦公室服務", "個人運作服務"], 1, ""], [1683, 5, "5.5", "以下哪項為售後服務部的業務範圍?", ["文件管理", "通訊", "權益管理", "以上各項皆是"], 3, ""], [1684, 5, "5.5", "以下哪項服務或程序，不大可能屬於保險所有人服務部(POS)的職能:", ["索償處理", "文件整理，如複印保單", "調整保單", "聯絡顧客與溝通等工作"], 0, ""], [1685, 5, "5.5", "保單所有人服務(或英文縮寫‘POS’)，是下列哪一個部門的另一名稱：", ["售後服務部", "保單簽發部", "保單交付部", "行政及人事部"], 0, ""], [1686, 5, "5.5", "售後服務是一個重要因素。它是由顧客服務部或下列哪個部門負責：", ["POS(PolicyownerService)保單所有人服務", "ASS(after-SalesService)售後服務", "BCS(bettercustomerService)更好客戶服務", "ICO(ImprovecustomerService)改善客戶服務"], 0, ""], [1687, 5, "5.5", "保單持有人服務(或英文縮寫‘POS’)部門主要負責？", ["對我們的服務為傲", "保單所有人服務", "優先辦公室服務", "個人運作服務"], 1, ""], [1688, 5, "5.5", "下列哪項較不可能屬於最常見的保單更改事宜?", ["更改保單種類", "更改保單所有人身份", "更改受益人身份", "更改地址"], 1, ""], [1689, 5, "5.5.1", "在人壽保險合約中，以下哪項是不大可能是常見的更改：", ["保單保障的類型", "受保生命的身份", "受益人", "以上沒有一項不大可能是常見更改"], 1, ""], [1690, 5, "5.5.1", "下列哪項或哪些關於更改壽險保單的陳述是正確的：", ["更改一般由保單所有人服務部職員處理", "一些更改非常重要﹝如：受益人的更改﹞", "有些要求的更改可能涉及核保考慮", "上述所有各項"], 3, ""], [1691, 5, "5.5.1", "保單的更改事宜須小心處理，因為:", ["可能需要再保險", "可能有重大的法律後果", "可能涉及洗黑錢", "以上各項皆有可能"], 3, ""], [1692, 5, "5.5.1", "一份壽險保單最常見的保單更改事宜包括：", ["更改地址", "更改受益人", "更改保單所有人", "以上所有各項"], 3, ""], [1693, 5, "5.5.1", "對於壽險保單來說，有多個協定的更改可於保單簽發後出現（透過雙方同意）\n。然而下列哪項較不可能屬於這類更改？", ["更改受益人", "更改有關受保生命", "更改保單所有人地址", "更改保單擁有權"], 1, ""], [1694, 5, "5.5.1", "下列哪項功能較不可能直接涉及理賠部？", ["就一份投保單進行核保的工作", "日常理賠的行政和處理工作以及有關的查詢", "核証近因的調查工作", "審閱已去世受保保單所有人的驗屍報告"], 0, ""], [1695, 5, "5.6", "下列哪項索償只會在儲蓄壽險中出現？", ["期滿索償", "死亡索償", "退保索償", "以上所有各項"], 0, ""], [1696, 5, "5.6.1", "期滿索償出現於下列哪類或哪些保險中？", ["定期壽險", "終身壽險", "儲蓄壽險", "以上所有各項"], 2, ""], [1697, 5, "5.6.1", "處理索償時，保險人會從保險金中扣除甚麼項目？", ["保單抵押貸款", "未繳清的保費", "尚欠的利息", "以上各項都是"], 3, ""], [1698, 5, "5.6.1", "對於大部份壽險保單而言，若保單到期日即將迫近，保險公司會﹕\ni)通知客人到期日將到\nii)通知客人到期日大約可領取的金額\niii)通知客人到期滿後所須安排的手續及文件\niv)附上適當形式的解除責任憑證(release)", ["i,ii,iii", "i,iii", "ii,iii,iv", "i,ii,iii,iv"], 3, ""], [1699, 5, "5.6.1", "對於儲蓄壽險保單的期滿索償，若保單到期日即將迫近，保險公司會﹕\ni)通知保單所有人將利益付給受益人\nii)提醒保單期滿的日期；\niii)說明應付金額及列出支付保險金的條件；\niv)附上適當形式的解除責任憑證(release)", ["i,ii,iii", "i,iii", "ii,iii,iv", "i,ii,iii,iv"], 2, ""], [1700, 5, "5.6.3", "以下哪三項對於退保索償來說是最重要的？\ni)所有權證明\nii)死亡證明書的正本\niii)合適的解除責任憑證及給付證明文件\niv)就任何尚未繳清的保費、保單抵押貸款及利息作出調整", ["i,ii,iii", "i,ii,iv", "ii,iii,iv", "i,iii,iv"], 3, ""], [1701, 5, "5.6.3", "處理退保索償時最重要是證明索償人具有收取退保現金價值的法定權利，這證\n明的通過通常被稱為：", ["遺囑認證", "所有權證明", "退保證明", "授予所有權的憑證"], 1, ""], [1702, 5, "5.6.2", "就死亡索償提出時，死亡證明方式為：", ["死亡證明書正本", "死亡證明書副本", "受益人簽署證明", "以上任何一項"], 0, ""], [1703, 5, "5.6.2", "在死亡索償中，因為下列哪項或哪些原因，死因可能屬於重要事項?", ["該保單可能設有意外死亡保險利益附約", "自殺條款可能仍然生效", "受益人可能謀殺該受保生命", "以上所有各項"], 3, ""], [1704, 5, "5.6.2", "死亡日期對下列哪項保險計劃有重要的影響？", ["遞減定期壽險", "分紅壽險", "快將到期的定期壽險", "以上各項都是"], 3, ""], [1705, 5, "5.6.2", "就死亡索償提出時，死亡證明方式為：", ["死亡證明書正本", "死亡證明書副本", "受益人簽署証明", "以上任何一項"], 0, ""], [1706, 5, "5.6.2", "某人生前為自己購買了一份人壽保險，受保人出現死亡索償，而受益人為其配\n偶，保險人賠付時會出現問題為：", ["被保險人是在夜總會打鬥中意外被刺身亡", "被保險人是在銀行持械案中受害人", "被保險人的妻子蓄意謀殺他，目的為保險利益", "由於家人拒絕支付贖金，被保險人被綁匪撕票"], 2, ""], [1707, 5, "5.6.2", "就受保生命的死亡原因，可能會引起保險人的關注，除了一般查詢外，以下那\n種情況會軀使保險人作進一步調查？\ni)受保人自殺身亡\nii)受保人年屆80歲自然死亡\niii)受保人可能被妻子(指名受益人)謀殺\niv)保單生效後不久受保人便告死亡", ["i,ii", "i,ii,iii", "i,iii,iv", "i,ii,iii,iv"], 2, ""], [1708, 5, "5.6.2(d)", "近因指某一索償個案中造成損失的主要有效原因。以下哪項索償不會受近因所\n影響？", ["一份壽險保單生效五年後，被保人自殺", "一份受雙倍賠償利益約束的保單", "死因有可或保單生效不足（兩個月）便自殺的索償", "一份壽險包含有意外死亡及喪失肢體附加保障利益"], 0, ""], [1709, 5, "5.6.2(d)(i)", "如果證實殺人犯是受益人的話，以下哪項法律是不會容許殺人犯本人獲益？", ["合約法", "公共政策", "衡平法", "人權法"], 1, ""], [1710, 5, "5.6.2(d)(iv)", "有份人壽保險保單列明了將死亡保險利益支付給作為受託人之陳大民先生,陳先\n生謀殺了受保生命,以下哪項是正確的?", ["基於保險業條例的規定,陳先生不能向保險公司提出申請", "保險利益只會支付給受益人,而非受託人", "信托人無效", "以上各項皆不正確"], 2, ""], [1711, 5, "5.6.2(d)(iv)", "如果一名客戶暗示，他正在考慮將本身的保單退保，保險中介人應採取以下哪\n項或哪些行動？", ["有禮地詢問為何作出這個決定", "小心地解釋保單退保的權利或影響", "略述各種其
