<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IIQE 卷一 · 保險原理及實務</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#159a9c; --teal-d:#0c7173; --ink:#1c2b2d; --muted:#7b8a8c;
  --bg:#f3f6f6; --card:#ffffff; --line:#e3eaea;
  --green:#1aa463; --green-bg:#e7f6ee; --red:#d8453e; --red-bg:#fbeceb;
  --amber:#e0a106;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;overscroll-behavior:none;
}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:24px;}
.serif{font-family:"Noto Serif TC",serif;}

/* ---- Top bar ---- */
.topbar{
  position:sticky;top:0;z-index:20;background:var(--teal);color:#fff;
  padding:14px 18px;display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 14px rgba(12,113,115,.25);
}
.topbar .back{font-size:22px;width:30px;cursor:pointer;line-height:1;}
.topbar .ttl{font-weight:700;font-size:17px;flex:1;}
.topbar .timer{font-variant-numeric:tabular-nums;font-size:14px;opacity:.9;font-weight:500;}

/* ---- Home ---- */
.hero{
  background:linear-gradient(135deg,var(--teal),var(--teal-d));color:#fff;
  padding:26px 22px 30px;border-radius:0 0 26px 26px;position:relative;overflow:hidden;
}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:170px;height:170px;
  border:18px solid rgba(255,255,255,.08);border-radius:50%;}
.hero .badge{display:inline-block;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);
  font-size:11px;letter-spacing:2px;padding:4px 10px;border-radius:20px;font-weight:700;}
.hero h1{font-size:27px;margin:12px 0 4px;font-weight:900;}
.hero p{font-size:13px;opacity:.85;}
.hero .stat{display:flex;gap:18px;margin-top:18px;}
.hero .stat div{background:rgba(255,255,255,.12);border-radius:14px;padding:10px 14px;flex:1;}
.hero .stat b{font-size:22px;display:block;font-weight:900;}
.hero .stat span{font-size:11px;opacity:.8;}

.section-h{font-size:13px;color:var(--muted);font-weight:700;letter-spacing:1px;margin:24px 20px 10px;}

.menu{padding:0 16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.menu .tile{
  background:var(--card);border-radius:18px;padding:18px 16px;cursor:pointer;
  border:1px solid var(--line);transition:.18s;display:flex;flex-direction:column;gap:6px;
}
.menu .tile:active{transform:scale(.97);}
.menu .tile.wide{grid-column:span 2;flex-direction:row;align-items:center;}
.menu .tile .ico{font-size:24px;}
.menu .tile .nm{font-weight:700;font-size:15px;}
.menu .tile .sub{font-size:12px;color:var(--muted);}
.menu .tile.accent{background:var(--teal);color:#fff;border-color:var(--teal);}
.menu .tile.accent .sub{color:rgba(255,255,255,.8);}

/* chapter list */
.chaps{padding:6px 16px;}
.chap{
  background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;
  margin-bottom:11px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.15s;
}
.chap:active{transform:scale(.98);}
.chap .num{width:38px;height:38px;border-radius:11px;background:var(--teal);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;flex-shrink:0;}
.chap .info{flex:1;min-width:0;}
.chap .info .t{font-weight:700;font-size:15px;}
.chap .info .d{font-size:11.5px;color:var(--muted);margin-top:2px;}
.chap .bar{height:6px;background:var(--line);border-radius:6px;margin-top:7px;overflow:hidden;}
.chap .bar i{display:block;height:100%;background:var(--green);border-radius:6px;transition:.4s;}
.chap .pct{font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0;}

/* ---- Quiz ---- */
.qwrap{padding:16px;}
.qmeta{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--muted);margin-bottom:10px;}
.qmeta .tag{background:#e6f2f2;color:var(--teal-d);padding:3px 9px;border-radius:8px;font-weight:700;}
.progressline{height:5px;background:var(--line);border-radius:5px;margin-bottom:16px;overflow:hidden;}
.progressline i{display:block;height:100%;background:var(--teal);transition:.3s;}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px 18px;}
.qno{display:inline-block;background:var(--ink);color:#fff;font-size:12px;font-weight:700;border-radius:7px;padding:3px 9px;margin-bottom:10px;}
.qtext{font-size:16.5px;line-height:1.65;font-weight:500;white-space:pre-line;}
.opts{margin-top:16px;display:flex;flex-direction:column;gap:10px;}
.opt{
  display:flex;gap:12px;align-items:flex-start;background:#fafcfc;border:1.5px solid var(--line);
  border-radius:14px;padding:13px 14px;cursor:pointer;transition:.13s;font-size:14.5px;line-height:1.5;
}
.opt:active{transform:scale(.99);}
.opt .lab{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--muted);color:var(--muted);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;transition:.13s;}
.opt .txt{flex:1;padding-top:2px;white-space:pre-line;}
.opt.correct{background:var(--green-bg);border-color:var(--green);}
.opt.correct .lab{background:var(--green);border-color:var(--green);color:#fff;}
.opt.correct .txt{color:#137a4b;font-weight:700;}
.opt.wrong{background:var(--red-bg);border-color:var(--red);}
.opt.wrong .lab{background:var(--red);border-color:var(--red);color:#fff;}
.opt.wrong .txt{color:#b5322c;font-weight:700;}
.opt.disabled{cursor:default;}

/* analysis */
.analysis{margin-top:16px;border-top:1px dashed var(--line);padding-top:16px;animation:fade .3s;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.analysis h3{font-size:14px;color:var(--muted);font-weight:700;margin-bottom:12px;letter-spacing:.5px;}
.arow{display:flex;gap:8px;font-size:14px;margin-bottom:9px;line-height:1.6;}
.arow .k{color:var(--muted);flex-shrink:0;min-width:74px;}
.arow .v{font-weight:700;}
.arow .v.ok{color:var(--green);} .arow .v.no{color:var(--red);}
.arow .v.exp{font-weight:400;color:var(--ink);}
.verdict{display:flex;align-items:center;gap:8px;font-weight:900;font-size:16px;margin-bottom:14px;}
.verdict.ok{color:var(--green);} .verdict.no{color:var(--red);}
.fav{margin-left:auto;font-size:13px;color:var(--muted);font-weight:500;cursor:pointer;border:1px solid var(--line);
  border-radius:8px;padding:4px 10px;}
.fav.on{color:var(--amber);border-color:var(--amber);background:#fdf6e3;}

.navbtns{display:flex;gap:10px;margin-top:16px;}
.btn{flex:1;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:.13s;}
.btn:active{transform:scale(.98);}
.btn.primary{background:var(--teal);color:#fff;}
.btn.ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line);}
.btn:disabled{opacity:.4;cursor:default;}

/* result */
.result{padding:30px 22px;text-align:center;}
.result .ring{width:150px;height:150px;margin:10px auto 18px;position:relative;}
.result .ring svg{transform:rotate(-90deg);}
.result .ring .mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.result .ring .mid b{font-size:38px;font-weight:900;line-height:1;}
.result .ring .mid span{font-size:12px;color:var(--muted);margin-top:4px;}
.result h2{font-size:22px;font-weight:900;margin-bottom:6px;}
.result p{color:var(--muted);font-size:14px;margin-bottom:22px;}
.result .rstats{display:flex;gap:12px;margin-bottom:22px;}
.result .rstats div{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;}
.result .rstats b{font-size:24px;font-weight:900;display:block;}
.result .rstats span{font-size:12px;color:var(--muted);}

/* learn / content */
.content{padding:16px;}
.ccard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:14px;}
.ccard h3{font-size:16px;font-weight:900;color:var(--teal-d);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.ccard h3 .n{background:var(--teal);color:#fff;width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.ccard table{width:100%;border-collapse:collapse;font-size:13.5px;}
.ccard td{padding:8px 6px;border-bottom:1px solid var(--line);vertical-align:top;line-height:1.5;}
.ccard td.h{font-weight:700;color:var(--teal-d);width:34%;white-space:nowrap;}
.ccard td:last-child{color:#3a4a4c;}
.ccard tr:last-child td{border-bottom:none;}
.tip{background:#fdf8ec;border:1px solid #f0e2bd;border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.6;color:#6b5a1f;margin-bottom:12px;}
.tip b{color:#9a7a10;}

.empty{text-align:center;color:var(--muted);padding:60px 30px;font-size:14px;line-height:1.7;}
.empty .big{font-size:42px;margin-bottom:12px;}
.hidden{display:none!important;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================
   DATA — 100 questions from AFS 5月份每月精選試題 (試卷一)
   ============================================================ */
const CH = {
  1:{t:"風險及保險",d:"風險的意義、類別與管理",w:"12%"},
  2:{t:"法律原則",d:"合約定義、種類與代理法",w:"16%"},
  3:{t:"保險原則",d:"可保權益、最高誠信、近因、彌償、分擔、代位",w:"30%"},
  4:{t:"保險公司的主要功能",d:"產品、核保、理賠、再保險、精算",w:"9%"},
  5:{t:"香港保險業結構",d:"法定/實務/學術分類、行業機構",w:"5%"},
  6:{t:"保險業規管架構",d:"保險業條例、保監局、投訴局、發牌制度",w:"21%"},
  7:{t:"職業道德及其他",d:"私隱、歧視、洗錢、防賄、防詐騙",w:"7%"},
};
// q:[id, ch, ref, question, [A,B,C,D], correctIndex, explanation]
const Q = [
[1,1,"1.1.1","如果一名由保險人聘請的檢驗人，提出他必須就某項「風險」進行檢驗，那麼「風險」一詞在這方面有下列哪項或哪些含義？",["將要成為被保險人的繳付保費的能力","將要承保的財產","將要成為被保險人的人的信貸資料","以上任何一項"],1,"保險從業員使用「風險」一詞時，可能指：1. 正在承保或考慮承保的受風險財物或人身；2. 所保危險即造成損失的原因或成因。"],
[2,1,"1.1.1","對保險人而言，描述受保損失的成因，受保財產的字眼是：",["風險","危險","被保險人","保單持有人"],0,"保險從業員使用「風險」一詞時，可指正在承保或考慮承保的受風險財物或人身，以及所保危險即造成損失的原因或成因。"],
[3,1,"1.1.1註","保險人提供「全險」保障時，所提及的風險是指：",["造成損失的原因","所承保的財物","正在考慮承保的人身","正在考慮承保的財物或人身"],0,"「全險」意思是除非出事原因屬保障範圍以外，否則任何原因造成的任何損失均屬受保，所以釐清造成損失的原因或成因相當重要。"],
[4,1,"1.1.2b","汽車意外、個人損傷等情況，最有可能屬於＿＿＿＿＿",["特定風險","基本風險","純粹風險","投機風險"],0,"特定風險造成的後果是相對有限，例如汽車意外、個人損傷就是例子。"],
[5,1,"1.1.2a","從可保程度的角度來看，以下哪項關於純粹風險的描述是正確的？",["屬於必然可保","屬於必然不可保","比投機風險可保性為低","比投機風險可保性為高"],3,"商業保險人所承保的主要是特定風險及純粹風險，投機風險一般不可保。故純粹風險比投機風險可保性為高。"],
[6,1,"1.1.2a","以下哪項是屬於投機風險的？",["投資股票","兩輛汽車相撞","雷電打擊造成建築物嚴重的破壞","以上的沒有一項是"],0,"投機風險能產生收益、損失兩種可能的結果，包括賭博、業務開創及投資活動等。"],
[7,1,"1.1.2b","如果根據風險所帶來的影響區別，風險可以分為：",["純粹風險及投機風險","可保風險及不可保風險","投機風險及特定風險","特定風險及基本風險"],3,"根據風險所帶來的影響區別，風險可分為特定風險及基本風險。（按財務後果則分純粹/投機風險）"],
[8,1,"1.1.2b","特定風險是一種：",["相當可能影響大量數量人數的風險","在核保時需要特別考慮風險","相當可能帶來比較有限的後果的風險","相當可能產生嚴重或災難性後果的風險"],2,"特定風險的後果相對有限，只影響個人或為數較少的人，這類風險包括汽車意外、個人損傷及類似情況。"],
[9,1,"1.1.2b","有一種風險，是很多財產保單中的除外責任，這種風險稱為：",["純粹風險","特定風險","基本風險","以上各項皆是"],2,"商業保險人所保的主要是特定風險，基本風險一般不可保，故基本風險常是財產保單的除外責任。"],
[10,1,"1.2","以下哪項是保險的基本功能／好處而非輔助功能？\ni) 把個人的潛在財務損失轉移給保險人\nii) 損失的控制／防範\niii) 儲蓄／投資\niv) 使商家倖免於嚴重火災、沉重法律責任等造成的巨大損失",["i, ii","ii, iii","i, iv","iii, iv"],2,"保險本質上是風險轉移機制——把個人潛在財務損失轉移給保險人，並讓商家倖免巨大損失。儲蓄/投資及損失防範屬輔助功能。"],
[11,1,"1.2(a)","以下哪項或哪幾項是保險的基本的好處？",["為保單持有人提供財務補償","增加就業機會","以人壽保險及年金作為儲蓄","金融服務的發展"],0,"保險的基本功能及好處是：當災害發生時為被保險人提供財務補償。其餘屬輔助功能。"],
[12,1,"1.2(a)","以下哪一項屬風險轉移措施？",["取消建築項目","為建築項目安排保險","加強工地的安全措施","禁止員工在工地食煙"],1,"保險是風險轉移機制，為建築項目安排保險就是把潛在財務損失轉移給保險人的例子。"],
[13,2,"2.1.1","社交中，朋友的晚飯約會：",["並非法律上可執行的合約","有兩位以上朋友參與便可稱為合約","若果有書面上的來往便可稱為合約","在法律上被承認為有效的合約"],0,"社交約會協議在法律上不被承認為有效，任何一方爽約，另一方不能採取法律行動。"],
[14,2,"2.1.2(a)","以下哪項陳述是正確的？",["保險合約屬於契據","大部分的保險合約屬簡單合約，因它可以用口頭或書面形式訂立","保險合約有效性必須以書面合約為證","保險合約屬於簡單合約，因內容淺白令一般人易於明白"],1,"絕大部分保險合約屬「簡單」合約。簡單只意味訂立簡單、容易，可口頭或書面形式訂立；技術上保險合約無需書面證明也能生效。"],
[15,2,"2.1.2(a)","一個人在店鋪內購買物件時，放下金錢並取走物件，過程中不發一言，在這種情況下：",["屬於違法事件","以行為証明下訂立了合約","因為沒有蓋章及簽署，故此訂立了契據","已訂立了一份記錄合約"],1,"合約已透過付錢與收錢等行為訂立，無需任何言語或文字，這是從行為中推斷出來的合約例子。"],
[16,2,"2.1.2","一種與非常正式並需要簽署、蓋章及送遞形式有別，易於構成的合約稱為：",["契約","簡單合約","紀錄合約","不複雜合約"],1,"簡單合約意味訂立簡單、容易，分為口頭合約、不經蓋章的書面合約，及從行為中推斷出來的合約。"],
[17,2,"2.1.3","以下哪項使無效的保險合約之陳述是正確的？",["可使無效的合約是永遠不能變為有效的","可使無效與無效兩者的含義完全相同","受屈的一方可於合理時間內把合約視為無效的決定","只有被保險人才能把保單視作可使無效（即可予以取消）"],2,"可使無效的合約是明顯有法律效力的合約，效力一直維持，除非及直至受屈一方在合理時間內把合約視為自訂立時起即屬無效。"],
[18,2,"2.1.3(a)","如果保險人指出除非有關保險上限縮短為半年，否則不會接受某項口頭的投保，這項因保險人提出的建議可以構成？",["反承約","相反的要約","反要約","有條件的承約"],2,"要約人可以是有意投保的一方，也可以是保險人以反要約的形式提出續保或承保的條件。"],
[19,2,"2.1.3(a)","以下哪項有關保單的要約描述是正確的？",["根據普通法規定，投保人寫投保書給被遞交表格的保險人已構成要約的行為","適用於保險合約的要約法，明顯有別於非保險合約的要約法","沒有要約就沒有合約","非人壽保險的要約法已匯入保險業條例之中"],2,"要約是訂立合約的起點，沒有要約就沒有合約。"],
[20,2,"2.1.3(c)","蘇先生在電話要求一份機器全險保障，保險人承諾在一星期後發出保單。電話對話一小時後，該組機器在火災中被毀。請問有否一份有效的機器全險合約保障？",["沒有，因未曾出現承諾","沒有，因保單未發出","有，因保障在承諾一刻生效","有，追溯性保單保障機器損失"],2,"代價是被保險人支付保費的承諾，及保險人付款或補償的承諾。即使保費尚未支付，保障在承諾一刻已生效，被保險人仍享有索償權。"],
[21,2,"2.2","代理法：",["只適用於保險中介人","適用於保險代理人而不是保險經紀","適用於保險經紀而不是保險代理人","適用的範圍比應用於保險為廣泛"],3,"代理法適用的範圍比它在保險代理人方面的應用廣泛得多。"],
[22,2,"2.2","「透過他人行事與自己親自執行並無分別」法律原則是來自：",["合約法","代理法","侵權法","保險業條例"],1,"這是代理法的法律原則：代理人代表委託人行事，經授權或沒授權的行為都會對委託人產生約束力。"],
[23,2,"2.2.2","以下哪項是追認的正確描述？",["作出追溯性的授權批准一些事前沒有授權的行為","給予代理的一項明確的授權","出於緊急情況的授權行為","根據經蓋章的合約給予的權限"],0,"追認是對某行為授予追溯權：代理人行事時並未取得授權，但委託人事後確認，便有效產生追溯性的授權。"],
[24,2,"2.2.2","代理關係可以透過以下哪些途徑產生？\ni. 明示協議  ii. 隱含協議  iii. 追認  iv. 代理人出錯",["i, ii","i, ii, iii","iii, iv","以上皆是"],1,"代理關係可以透過明示、隱含或追認方式產生。"],
[25,2,"2.2.3(a)","明示權限是：",["由委託人迅速地給予的","談判經蓋章的合約的授權","祇可談判書面的合約的授權","委託人明確地以口頭或書面形式賦予的授權"],3,"明示權限是委託人明確地以口頭或書面形式賦予的授權。"],
[26,2,"2.2.3(c)","某人在某時為他人的最佳利益而行事，雖然他事前並沒有獲得授權，但在法律上卻持有這種權限，並被視為",["必要代理人","緊急情況下代理人","具有追溯性授權的代理人","自動獲授權的代理人"],0,"在迫切危害而無機會通報的情況下，現有代理人持有必要權限作出該等行為，並透過該等行為成為必要代理人。"],
[27,2,"2.2.3(d)","若保險人根據被保險人的行為，合理地判斷一位（其實沒有被授權的）事務律師具備授權來替被保險人行事，那麼根據以下哪項原則，被保險人受該事務律師的行為所約束？",["明示權限","不容反悔的代理權","追認代理","必要權限"],1,"不容反悔的代理權：如有人允許他人表示另一人是其代理人，便不能否定該代理人的權限。"],
[28,2,"2.2.5","代理人代表委託人行事時招致的費用，委託人應：",["只支付與交通有關的費用","只支付委託人事前同意的費用","向代理人報銷行事時適當及合理地招致的費用及開支","只支付在符合代理協定條件下的費用"],2,"在符合代理協定任何明示條件下，委託人必須對代理人適當及合理地招致的費用及開支予以償還。"],
[29,2,"2.2.6","以下哪項或哪些有關由於精神錯亂而導致代理人關係的終止的描述是正確的？",["只有代理人可終止而不能是委托人","只有委托人一方可終止而不能是代理人","代理人和委托人（自然人）均可終止","代理人和委托人均沒有權力終止"],2,"如委託人和代理人任何一方因精神錯亂不再能夠履行協議，則協議會自動終結。"],
[30,3,"3.1.3","在香港，每一名對下列哪項人士的生命不具有可保權益？（為個人本身的利益購買人壽保險）",["個人的妹夫","個人的配偶","個人的本身","上述各項均存在可保權益"],0,"每人對自己、配偶的生命享有可保權益，亦可就未滿18歲的子女或受監護人購買保險。個人的妹夫不存在可保權益。"],
[31,3,"3.1.4","彌償及可保權益兩個原則的關係：",["均與財務利益有密切關係","兩者完全沒有共通之處","意向完全不同","尋求真正造成損失且具有影響力的原因"],0,"可保權益是對保險標的的財務「權益」，全損時應賠付其價值以完全補償保單持有人，故兩原則均與財務利益密切相關。"],
[32,3,"3.1.4(b)","阿倫給予他的朋友玫瑰一個他所擁有的單位免費住兩個月，請問玫瑰有權為該單位購買保險？理由何在？",["有，合法地佔有某單位的任何人有權以所有人的代理人的身份就該單位購買保險","沒有，因為她沒有付出代價","有，她是以單位託管人的身份對該單位具有權益的","沒有，因為她並非擁有該單位"],2,"受託保管人持有次於絕對擁有權的權利，在得到擁有人或其代理人同意下管有貨品，可對所保管的貨品進行投保。"],
[33,3,"3.1.4(d)","就可保權益的定義而言，一家物業管理公司可否就所管理的大廈投買火險？為什麼？",["不可以，因物業管理公司對該大廈不存在可保利益","不可以，因物業管理公司不是大廈業主","可以，因物業管理公司有法律責任購買","可以，只要獲大廈業主的授權替委託物業購買保險，便會構成可保權益"],3,"除絕對擁有權外，遺囑執行人、遺產管理人、信託人、承按人等持有次於絕對擁有權的權利；受託保管人亦可投保。獲授權替委託物業購買即構成可保權益。"],
[34,3,"3.1.5","人壽保險與其他保險一樣要求可保權益的存在，但對人壽保險而言可保權益必須存在於：",["只是索償出現的時候","只是保單開始的時候","只是保單可能轉讓的時候","保單開始及索償出現的時候"],1,"人壽保險的可保權益必須存在於保單開始的時候。（水險/其他彌償保險則於損失時存在）"],
[35,3,"3.1.6","收取保險金的轉讓，意思是指：",["必須把保單應該支付的金錢轉付予指定的第三者","把保單轉讓予另一保險公司","把保單的擁有權轉讓予他人","讓另一個人替代原本的被保險人"],0,"收取保險金的轉讓，意思是把保單應該支付的金錢轉付予指定的第三者。"],
[36,3,"3.1.6","以下哪一項有關保單轉讓的描述是正確的？",["轉讓人不會把保險合約中的責任轉移到承讓人的身上","承讓人將取得收款人的權利，而非訴訟權","承讓人承諾支付未來的保費","承讓人承諾支付未來的保費，包括保單轉讓時未有支付的保費"],0,"保單「轉讓」通常指權利的轉移；轉讓不會讓轉讓人在保險合約的責任轉移到承讓人身上。"],
[37,3,"3.2.1","以下哪項有關一般誠信的描述是不正確？\ni. 資訊必須實質上真實，且沒有主動披露的責任\nii. 資訊可以真實或虛假，不可信賴\niii. 資訊必須百分百真實\niv. 必須主動披露一切可能影響訂立合約的重要資訊",["i, ii, iii","ii, iii, iv","i, ii","iii, iv"],1,"一般誠信指合約各方須誠實行事，提供的資訊須實質上真實，但沒有主動披露重要資訊的責任。選項 ii、iii、iv 都不正確。"],
[38,3,"3.2.3","下列哪項或哪些毋須在人壽保險合約的最高誠信責任下披露？",["健康紀錄","年齡及性別","準受保人是非抽煙者","以上所有各項"],2,"準受保人是非抽煙者屬於減低風險的事實，不屬於必須披露的重要事實。"],
[39,3,"3.2.3(b)","以下哪項是最高誠信原則下無須披露的事實？\ni. 木材是易燃的  ii. 保安系統被拆除  iii. 倉庫內是容許吸煙的  iv. 操作機器的工人訓練有素",["i, ii, iv","i, iv","i, iii, iv","ii, iii, iv"],1,"木材易燃屬常識範圍，操作機器工人訓練有素屬減低風險的事實，兩者都無須披露。"],
[40,3,"3.2.4","如果保險人要求保證所有披露資料，不論重要與否，均需完全真實，這表示：",["違反法例並不能強制執行","延伸普通法中的最高誠信的要求","這合約受制於而非最高誠信","這合約受制於最高誠信"],1,"保險受到比普通法最高誠信更為嚴格的要求所約束，這是延伸普通法中最高誠信的要求。"],
[41,3,"3.2.4","在非人壽保險單續保時，最高誠信的責任：",["要再履行","無須履行","不再適用","只對保險人適用"],0,"一些非人壽保單要求在保險期限內如有風險變更或續保時（例如轉職）必須予以披露，即最高誠信責任要再履行。"],
[42,3,"3.2.6","某投保人在投保火險保單時忘記披露某些重要事實，保費為港幣一萬二千元，保險人在起保一個月後發現。以下哪項為受屈的保險人可享用的補救：",["可選擇推翻保單，並保留所有保費","可選擇推翻保單，但須將已付的保費退回","可選擇推翻保單，並保留一個月的保費（一千元）","可選擇取消合約，並保留一個月的保費（一千二百元）"],1,"一般情況下，在不知道保險無效的情況下繼續支付的保費是可退回的，故保險人推翻保單須將已付保費退回。"],
[43,3,"3.2.6","如果投保人違反最高誠信：",["保險人可不作追究","除非牽涉詐騙成份，保險人才可得到補救","除非牽涉詐騙或疏忽成份，保險人才可得到補救","保險保單會自動取消"],0,"違反最高誠信時，受屈保險人的補救包括：1.自始推翻整個合約；2.如屬欺詐/疏忽性失實陳述可另提侵權訴訟；3.對違反不予追究（合約有追溯效力生效）。"],
[44,3,"3.2.6","就保單而言，非欺詐性不披露：",["投保人無意地違反了保險條款","該保險人可以推翻保單","受屈的保險人僅可以訴訟提出損害賠償申索","投保人對重要事實作出失實陳述"],1,"非欺詐性不披露是無意地或疏忽地漏了披露重要事實，受屈保險人可在合理時間內自始推翻整個合約。"],
[45,3,"3.3.1","以下哪項屬於近因中的「危險」？",["電單車","身體受傷","受傷僱員","盜竊"],3,"危險指造成有關損失的成因，盜竊造成損失就是其中例子。"],
[46,3,"3.3.2","除外危險＿＿＿＿＿：",["保單不承保的危險","與不保危險有相同的對待","除超額保障以外，將承保的危險","例如各種天災、地震等"],0,"除外危險是被除外責任條款豁免承保的危險。"],
[47,3,"3.3.3","以下哪項是描述「既不是受保也不是除外責任的危險，而是在保單保障的範圍以外」？",["受保危險","除外危險","不保危險","非受保特定危險"],2,"不保危險是「既不是受保也不是除外責任的危險，而是在保單保障的範圍以外」。"],
[48,3,"3.3.4","就保單除外責任所採用字眼規定某成因「直接或間接」引致的損失皆除外，以下哪幾項陳述是正確的？\ni. 無法用於修改近因原則的應用\nii. 與除外危險關係疏遠的損失也可能是除外的\niii. 這有利於被保險人\niv. 直接由除外成因引致的損失也是不受保障",["i, ii","ii, iii, iii","i, ii, iii","ii, iv"],3,"保險人可借助保單措詞更改近因法則。用上「間接地」一詞時，即使除外危險只構成較遠的「近因」，有關損失也不獲賠償。選項 ii、iv 正確。"],
[49,3,"3.4.2","人壽與人身意外保險都不受彌償的原則約束，因為：",["人命是可以財務計算價值","不可能以財務方法精確計算人命","保險人不願意作出十足的財務補償","以上各項"],1,"壽險及個人意外保險是提供利益的保單，不是提供彌償的保單；因人命損失不可能以財務方法精確計算，只能按死亡或損傷訂明的數額支付利益。"],
[50,3,"3.4.2","人壽保險不受彌償的原則約束，原因是：",["無法精確計算人命價值","無限額的可保權益","無論支付多少錢不能精確地作出彌償","以上各項皆成立"],3,"人壽及人身意外保險針對人的傷亡，沒有方法精確地用金錢量度人命損失，故一般不適用彌償原則。以上各項皆成立。"],
[51,3,"3.4.4","更換一件受摧毀或失掉的受保物件作為提供彌償的形式，這種安排適合以下哪項情況？",["每類型的索償","僅限於汽車保險","完全沒有或只有少許折舊的物件","只有在盜竊是損失的近因時"],2,"就全新、不受或幾乎不受折舊影響的物件而言，給被保險人一件替換物件是非常合適的彌償方法。"],
[52,3,"3.4.5","在多數的財產保險索償中標的有時還有剩餘價值，該價值應於賠償給付中計算在內，稱為：",["損餘","分擔","比例分攤","代位"],0,"剩餘價值應於賠償給付中計算在內，稱為損餘。"],
[53,3,"3.4.6","以下哪項形容委付是正確的？",["大多數出現在水險中","於火險單中，通常剔除委付","將損餘交付保險人","以上各項皆正確"],3,"委付大多出現在水險，指在某些情況下向保險人交出保險標的，作為索取全損賠償的條件。其他財產保單通常列明不容許委付。以上描述皆正確。"],
[54,3,"3.4.7(b)","以下哪項阻止了保單作出彌償？\ni. 起賠額  ii. 免賠額  iii. 起賠期限  iv. 重複保險",["i, ii","i, ii, iii","iii, iv","以上皆是"],1,"分擔適用於理賠時遇上重複保險的情況，更有效達到彌償效果，故 iv 不正確。"],
[55,3,"3.4.8","一份海上船體保單寫明：「保額$1,000,000；約定價值$1,000,000」，意味着：",["當損失發生時，保額是賠償金額","約定價值將被視為損失時的實際價值，但只限於全損索償目的","約定價值一律被視為損失時的實際價值","這是一份重置保險"],2,"水險保單和海上貨物保單以定值方式提供保障，約定價值一律被視為損失時的實質價值。"],
[56,3,"3.5.1","在「海上保險條款」中，關於「重覆保險」這一項普通法的原則，與以下哪項原則有關？",["彌償","代位","分擔","可保權益"],2,"重複保險與分擔原則有關：若每份保單均含分擔條款，被保險人就不能單靠一個保險人獲全額賠償。"],
[57,3,"3.5.1","銀行借錢給「A」購買物業，該銀行對該物業的權益購買保險，而「A」亦自行投保。如果投保損失發生：",["按分擔原則，兩名保險人各賠50%","分擔原則不適用，因不是保險相同的權益","A的保單將作出賠償，因他是真正擁有者","銀行的保單將作出賠償，因借貸協定給它優先權"],1,"分擔原則不適用，因業主A與銀行所購買保險所保障的權益不相同。"],
[58,3,"3.5.3","分擔必須符合以下哪些條件：\ni. 每張保單必須對損失提供彌償\nii. 必須保障相同的保險標的\niii. 必須保障相同危險所導致的損失\niv. 必須保障相同的財務利益",["i, ii, iii","i, iii, iv","ii, iii, iv","i, ii, iii, iv"],3,"以上各項皆是分擔原則必須符合的條件。"],

/* ---------- QUIZ ENGINE ---------- */
let session=null; // {list:[q...], i, picked:{}, mode}
function startQuiz(mode){
  let list;
  if(mode==='all') list=[...Q];
  else if(mode==='mock'){list=shuffle([...Q]).slice(0,30);}
  else if(mode==='wrong'){list=Q.filter(q=>store.done[q[0]]&&!store.correct[q[0]]);}
  else if(mode==='fav'){list=Q.filter(q=>store.fav[q[0]]);}
  else list=chQuestions(mode);
  if(!list.length){return;}
  session={list,i:0,picked:{},mode,score:0};
  go({name:'quiz'});
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function renderQuiz(){
  const s=session;const q=s.list[s.i];
  const id=q[0],ref=q[2],txt=q[3],opts=q[4],ans=q[5],exp=q[6];
  const picked=s.picked[id];
  const answered=picked!==undefined;
  const labels=['A','B','C','D'];
  const isMock=s.mode==='mock';
  const title= isMock?'模擬考試' : (s.mode==='all'?'全部練習':(s.mode==='wrong'?'錯題重溫':(s.mode==='fav'?'收藏題目':`第 ${s.mode} 章 · ${CH[s.mode].t}`)));
  const fav=store.fav[id];
  app.innerHTML=`
  <div class="topbar">
    <div class="back" onclick="quitQuiz()">‹</div>
    <div class="ttl">${title}</div>
    <div class="timer">${s.i+1} / ${s.list.length}</div>
  </div>
  <div class="qwrap">
    <div class="progressline"><i style="width:${(s.i+1)/s.list.length*100}%"></i></div>
    <div class="qcard">
      <div class="qmeta"><span class="qno">第 ${s.i+1} 題</span><span class="tag">參考章節 ${ref}</span></div>
      <div class="qtext">${escapeH(txt)}</div>
      <div class="opts">
        ${opts.map((o,idx)=>{
          let cls='opt';
          if(answered){
            cls+=' disabled';
            if(idx===ans) cls+=' correct';
            else if(idx===picked) cls+=' wrong';
          }
          return `<div class="${cls}" ${answered?'':`onclick="pick(${id},${idx})"`}>
            <div class="lab">${labels[idx]}</div><div class="txt">${escapeH(o)}</div></div>`;
        }).join('')}
      </div>
      ${answered?analysisHTML(id,ref,picked,ans,exp,fav):''}
    </div>
    <div class="navbtns">
      <button class="btn ghost" onclick="prevQ()" ${s.i===0?'disabled':''}>上一題</button>
      ${s.i<s.list.length-1
        ? `<button class="btn primary" onclick="nextQ()">下一題</button>`
        : `<button class="btn primary" onclick="finishQuiz()">${isMock?'交卷看成績':'完成'}</button>`}
    </div>
  </div>`;
}
function analysisHTML(id,ref,picked,ans,exp,fav){
  const L=['A','B','C','D'];const ok=picked===ans;
  return `<div class="analysis">
    <div class="verdict ${ok?'ok':'no'}">${ok?'✓ 答對了':'✗ 答錯了'}
      <span class="fav ${fav?'on':''}" onclick="toggleFav(${id})">${fav?'★ 已收藏':'☆ 收藏'}</span></div>
    <div class="arow"><span class="k">正確答案</span><span class="v ok">${L[ans]}</span></div>
    <div class="arow"><span class="k">您的答案</span><span class="v ${ok?'ok':'no'}">${L[picked]}</span></div>
    <div class="arow"><span class="k">參考章節</span><span class="v" style="color:var(--teal-d)">${ref}</span></div>
    <h3 style="margin-top:14px">答案解析</h3>
    <div class="arow"><span class="v exp" style="line-height:1.7">${escapeH(exp)}</span></div>
  </div>`;
}
function pick(id,idx){
  const s=session;if(s.picked[id]!==undefined)return;
  s.picked[id]=idx;
  const q=s.list.find(x=>x[0]===id);const correct=idx===q[5];
  // record (don't double count for mock review? we still record globally)
  store.done[id]=true;store.correct[id]=correct;save();
  if(correct)s.score++;
  render();
}
function toggleFav(id){store.fav[id]=!store.fav[id];save();render();}
function nextQ(){if(session.i<session.list.length-1){session.i++;go({name:'quiz'});}}
function prevQ(){if(session.i>0){session.i--;go({name:'quiz'});}}
function quitQuiz(){session=null;go({name:'home'});}
function finishQuiz(){
  if(session.mode==='mock'){go({name:'result'});}
  else{session=null;go({name:'home'});}
}

/* ---------- RESULT (mock) ---------- */
function renderResult(){
  const s=session;const total=s.list.length;
  const answered=Object.keys(s.picked).length;
  let correct=0;s.list.forEach(q=>{if(s.picked[q[0]]===q[5])correct++;});
  const pct=Math.round(correct/total*100);
  const pass=pct>=70;
  const r=66,c=2*Math.PI*r,off=c*(1-pct/100);
  app.innerHTML=`
  <div class="topbar"><div class="back" onclick="quitQuiz()">‹</div><div class="ttl">模擬考試成績</div></div>
  <div class="result">
    <div class="ring">
      <svg width="150" height="150">
        <circle cx="75" cy="75" r="${r}" stroke="#e3eaea" stroke-width="12" fill="none"/>
        <circle cx="75" cy="75" r="${r}" stroke="${pass?'#1aa463':'#d8453e'}" stroke-width="12" fill="none"
          stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
      </svg>
      <div class="mid"><b style="color:${pass?'#1aa463':'#d8453e'}">${pct}%</b><span>正確率</span></div>
    </div>
    <h2>${pass?'合格 🎉':'未達標準'}</h2>
    <p>${pass?'達到 70% 合格線，繼續保持！':'IIQE 合格線為 70%，再接再厲！'}</p>
    <div class="rstats">
      <div><b style="color:#1aa463">${correct}</b><span>答對</span></div>
      <div><b style="color:#d8453e">${total-correct}</b><span>答錯</span></div>
      <div><b>${total}</b><span>總題數</span></div>
    </div>
    <div class="navbtns">
      <button class="btn ghost" onclick="startQuiz('mock')">再考一次</button>
      <button class="btn primary" onclick="quitQuiz()">返回主頁</button>
    </div>
  </div>`;
}

/* ---------- WRONG / FAV LISTS ---------- */
function renderWrongList(){listView('錯題重溫','wrong',q=>store.done[q[0]]&&!store.correct[q[0]],'🎯','暫無錯題，繼續練習就會出現在這裡。');}
function renderFavList(){listView('收藏題目','fav',q=>store.fav[q[0]],'⭐','尚未收藏任何題目，答題時按「☆ 收藏」即可加入。');}
function listView(title,mode,filter,emoji,emptyTxt){
  const list=Q.filter(filter);
  app.innerHTML=`
  <div class="topbar"><div class="back" onclick="go({name:'home'})">‹</div><div class="ttl">${title}</div>
    <div class="timer">${list.length} 題</div></div>`;
  if(!list.length){app.innerHTML+=`<div class="empty"><div class="big">${emoji}</div>${emptyTxt}</div>`;return;}
  app.innerHTML+=`<div class="qwrap" style="padding-top:8px">
    <button class="btn primary" style="margin-bottom:14px" onclick="startQuiz('${mode}')">▶ 開始重溫 ${list.length} 題</button>
    ${list.map(q=>`<div class="chap" style="border-radius:14px" onclick="openSingle(${q[0]},'${mode}')">
      <div class="num" style="background:#eef4f4;color:var(--teal-d)">${q[2].split('.')[0]}</div>
      <div class="info"><div class="t" style="font-size:13.5px;font-weight:500;line-height:1.5">${escapeH(q[3].split('\\n')[0]).slice(0,46)}…</div>
      <div class="d">參考章節 ${q[2]}</div></div></div>`).join('')}
  </div>`;
}
function openSingle(id,mode){
  const q=Q.find(x=>x[0]===id);
  session={list:[q],i:0,picked:{},mode,score:0};
  go({name:'quiz'});
}

/* ---------- LEARN ---------- */
function renderLearn(){
  app.innerHTML=`
  <div class="topbar"><div class="back" onclick="go({name:'home'})">‹</div><div class="ttl">考點精講 · 章節重點</div></div>
  <div class="content">
    <div class="tip">💡 <b>答題小貼士：</b>留意題目問「肯定」還是「否定」；多組選項題先分析組合；遇上「以上所有各項」常為答案；不懂先選 D 並標記回頭再做。</div>
    ${[1,2,3,4,5,6,7].map(c=>`
      <div class="ccard">
        <div style="font-size:12px;color:var(--muted);font-weight:700;margin-bottom:4px">第 ${c} 章 · 佔卷 ${CH[c].w}</div>
        ${LEARN[c].map(sec=>`
          <h3><span class="n">${c}</span>${sec.h}</h3>
          <table>${sec.rows.map(r=>`<tr><td class="h">${r[0]}</td><td>${r[1]}</td></tr>`).join('')}</table>
          <div style="height:6px"></div>
        `).join('')}
        <button class="btn primary" style="margin-top:6px;padding:11px" onclick="startQuiz(${c})">練習本章題目 →</button>
      </div>`).join('')}
  </div>`;
}

function escapeH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'\n');}

render();
</script>
</body>
</html>
